# Cloudflare Worker config
name = "dchub-daily"
main = "cloudflare-worker.js"
compatibility_date = "2026-04-01"

routes = [
  { pattern = "daily.dchub.cloud/*", zone_name = "dchub.cloud" },
]

# Daily cron — 13:00 UTC = 09:00 US Eastern (ignores DST, adjust if needed).
# Fires POST /refresh on Railway via the scheduled() handler in the worker.
[triggers]
crons = ["0 13 * * *"]

[[r2_buckets]]
binding = "DAILY_BUCKET"
bucket_name = "dchub-daily"

[vars]
DAILY_ORIGIN = "https://dchub-daily.up.railway.app"
# REFRESH_SECRET goes in `wrangler secret put REFRESH_SECRET` — not in source.
