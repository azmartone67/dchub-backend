<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hub → AI Dashboard | DC Hub</title>
<meta name="description" content="DC Hub AI Hub has moved to the AI Agent Dashboard.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://dchub.cloud/ai-integrations">
<meta http-equiv="refresh" content="0;url=/ai-integrations">
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#09090b;--bg-card:#141417;--border:rgba(255,255,255,0.04);--text-primary:#fafafa;--text-secondary:#8a8a95;--cyan:#3478f6;--purple:#8b5cf6;--green:#10b981}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.wrap{max-width:420px;padding:2rem}
h1{font-size:1.6rem;font-weight:800;margin-bottom:.5rem;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:var(--text-secondary);font-size:.9rem;margin-bottom:1.5rem;line-height:1.5}
a{color:var(--cyan);font-weight:600;text-decoration:none}
.countdown{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--green);margin-bottom:.5rem}
</style>
</head>
<body>
<div class="wrap">
<div class="countdown" id="cd">2</div>
<h1>Page Moved</h1>
<p>AI Hub is now the <strong>AI Agent Dashboard</strong>. Redirecting automatically&hellip;</p>
<p><a href="/ai">Go to AI Dashboard &rarr;</a></p>
</div>
<script>let s=2;const el=document.getElementById('cd');const t=setInterval(()=>{s--;el.textContent=s;if(s<=0){clearInterval(t);window.location.href='/ai-integrations';}},1000);</script>
</body>
</html>
