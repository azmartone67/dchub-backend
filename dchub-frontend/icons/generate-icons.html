    <title>DC Hub Icon Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #1a1a2e; color: #fff; }
        h1 { color: #6366f1; }
        .icons { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .icon-box { text-align: center; background: rgba(255,255,255,0.04); padding: 15px; border-radius: 10px; }
        .icon-box canvas { display: block; margin: 0 auto 10px; }
        .icon-box a { color: #10b981; font-size: 12px; }
        button { background: #6366f1; color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 20px 0; }
        button:hover { background: #818cf8; }
        .instructions { background: rgba(255,255,255,0.04); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    </style>
<style>nav:not(.dchub-nav):not(.dchub-bottom-nav):not(.mobile-nav-drawer-links nav){display:none!important}.nav:not(.dchub-nav){display:none!important}</style>
<script src="/js/dchub-nav.js"></script>
</head>
<body>
    <h1>DC Hub Icon Generator</h1>
    
    <div class="instructions">
        <h3>Instructions:</h3>
        <ol>
            <li>Click "Generate All Icons" below</li>
            <li>Click "Download" under each icon</li>
            <li>Upload all icons to your /icons folder in Cloudflare</li>
        </ol>
    </div>
    
    <button onclick="generateAll()">Generate All Icons</button>
    
    <div class="icons" id="icons"></div>
    
    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        function drawIcon(canvas, size, maskable = false) {
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;
            
            if (maskable) {
                ctx.fillStyle = '#6366f1';
                ctx.fillRect(0, 0, size, size);
            } else {
                ctx.fillStyle = '#6366f1';
                const radius = size * 0.18;
                ctx.beginPath();
                ctx.roundRect(0, 0, size, size, radius);
                ctx.fill();
            }
            
            const scale = size / 100;
            const offsetX = size * 0.28;
            const offsetY = size * 0.12;
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(offsetX + 40 * scale, offsetY + 0 * scale);
            ctx.lineTo(offsetX + 8 * scale, offsetY + 42 * scale);
            ctx.lineTo(offsetX + 26 * scale, offsetY + 42 * scale);
            ctx.lineTo(offsetX + 22 * scale, offsetY + 75 * scale);
            ctx.lineTo(offsetX + 54 * scale, offsetY + 30 * scale);
            ctx.lineTo(offsetX + 36 * scale, offsetY + 30 * scale);
            ctx.lineTo(offsetX + 40 * scale, offsetY + 0 * scale);
            ctx.closePath();
            ctx.fill();
        }
        
        function generateAll() {
            const container = document.getElementById('icons');
            container.innerHTML = '';
            
            sizes.forEach(size => {
                const box = document.createElement('div');
                box.className = 'icon-box';
                
                const canvas = document.createElement('canvas');
                drawIcon(canvas, size, false);
                
                const label = document.createElement('div');
                label.textContent = `icon-${size}.png`;
                
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = `icon-${size}.png`;
                link.textContent = 'Download';
                
                box.appendChild(canvas);
                box.appendChild(label);
                box.appendChild(link);
                container.appendChild(box);
            });
            
            [192, 512].forEach(size => {
                const box = document.createElement('div');
                box.className = 'icon-box';
                
                const canvas = document.createElement('canvas');
                drawIcon(canvas, size, true);
                
                const label = document.createElement('div');
                label.textContent = `icon-maskable-${size}.png`;
                
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = `icon-maskable-${size}.png`;
                link.textContent = 'Download';
                
                box.appendChild(canvas);
                box.appendChild(label);
                box.appendChild(link);
                container.appendChild(box);
            });
        }
    </script>
</body>
