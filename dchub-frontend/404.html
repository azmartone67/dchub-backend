    <style>
        :root {
            --bg: #09090b;
            --bg2: #12121a;
            --text: #ffffff;
            --text2: #8a8a95;
            --accent: #3478f6;
            --accent-light: #5a9aff;
            --border: rgba(255,255,255,0.04);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Instrument Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        p {
            color: var(--text2);
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 2rem;
        }
        
        .links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-light);
        }
        
        .btn-secondary {
            background: var(--bg2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            border-color: var(--accent);
        }
        
        .suggestions {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            width: 100%;
            max-width: 600px;
        }
        
        .suggestions h3 {
            font-size: 1rem;
            color: var(--text2);
            margin-bottom: 1rem;
        }
        
        .suggestion-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }
        
        .suggestion-links a {
            color: var(--accent-light);
            text-decoration: none;
            padding: 6px 12px;
            background: var(--bg2);
            border-radius: 6px;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .suggestion-links a:hover {
            background: var(--border);
        }
        
        .icon-container {
            margin-bottom: 1.5rem;
        }
        
        .icon-container svg {
            width: 80px;
            height: 80px;
            opacity: 0.5;
        }
    </style>
