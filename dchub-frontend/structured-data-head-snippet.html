<!--
  DC Hub Structured Data - Paste into <head>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"> of index.html on Cloudflare Pages
  This tells Google, Gemini, and all AI crawlers what DC Hub is and how to query it.
  
  INSTALLATION:
  1. Copy everything between the <script> tags below
  2. Paste into the <head>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"> section of your index.html (and ideally every page)
  3. Deploy to Cloudflare Pages
  4. Test at: https://search.google.com/test/rich-results
-->

<!-- DC Hub Organization Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "@id": "https://dchub.cloud/#organization",
  "name": "DC Hub",
  "alternateName": "DCHub",
  "url": "https://dchub.cloud",
  "description": "Real-time data center intelligence platform tracking 20,534+ facilities across 140+ countries with M&A deal tracking, market intelligence, and energy infrastructure analysis.",
  "foundingDate": "2024",
  "founder": {
    "@type": "Person",
    "name": "Jonathan Martinez",
    "jobTitle": "Founder & Technical Consultant"
  },
  "knowsAbout": [
    "Data Centers",
    "Colocation",
    "Cloud Infrastructure",
    "Data Center M&A",
    "Energy Infrastructure",
    "Site Selection"
  ]
}
</script>

<!-- DC Hub WebSite + SearchAction Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "DC Hub",
  "url": "https://dchub.cloud",
  "description": "Data center intelligence platform providing facility search, M&A tracking, and market intelligence.",
  "publisher": {
    "@id": "https://dchub.cloud/#organization"
  },
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://dchub.cloud/api/agent/facilities?q={search_term}"
    },
    "query-input": "required name=search_term"
  }
}
</script>

<!-- DC Hub Dataset Schema (Facilities) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Dataset",
  "name": "Global Data Center Facilities Database",
  "description": "Comprehensive database of 20,534+ data center facilities across 140+ countries with 3,800+ providers.",
  "url": "https://dchub.cloud/facilities",
  "keywords": ["data centers", "colocation", "cloud infrastructure", "data center locations", "facility database"],
  "creator": {
    "@id": "https://dchub.cloud/#organization"
  },
  "spatialCoverage": {
    "@type": "Place",
    "name": "Global - 140+ countries"
  },
  "variableMeasured": [
    {"@type": "PropertyValue", "name": "Facility Count", "value": "20534+"},
    {"@type": "PropertyValue", "name": "Countries", "value": "140+"},
    {"@type": "PropertyValue", "name": "Providers", "value": "3800+"}
  ],
  "distribution": {
    "@type": "DataDownload",
    "encodingFormat": "application/json",
    "contentUrl": "https://dchub.cloud/api/agent/facilities"
  },
  "isAccessibleForFree": true
}
</script>

<!-- DC Hub WebAPI Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebAPI",
  "name": "DC Hub Data Center Intelligence API",
  "description": "REST API for data center facility search, M&A deal tracking, industry news, and energy infrastructure analysis.",
  "url": "https://dchub.cloud/api/docs",
  "documentation": "https://dchub.cloud/openapi.json",
  "provider": {
    "@id": "https://dchub.cloud/#organization"
  }
}
</script>
