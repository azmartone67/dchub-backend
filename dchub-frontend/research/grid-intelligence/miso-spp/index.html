<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Intelligence Brief | DC Hub Research</title>
<meta name="description" content="Live infrastructure intelligence for data center site selection. Powered by DC Hub's real-time data.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://dchub.cloud/js/dchub-nav.js" defer></script>
<style>
:root{--bg:#09090b;--bg-e:#111113;--bg-c:#161618;--bg-ch:#1c1c1f;--border:rgba(255,255,255,0.04);--border-a:rgba(52,120,246,0.3);--text:#e4e4e7;--text-m:#71717a;--text-d:#52525b;--accent:#3478f6;--accent-g:rgba(52,120,246,0.12);--red:#ef4444;--red-g:rgba(239,68,68,0.12);--amber:#f59e0b;--amber-g:rgba(245,158,11,0.12);--green:#22c55e;--green-g:rgba(34,197,94,0.12);--cyan:#06b6d4;--font:'Instrument Sans',-apple-system,sans-serif;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.hero{position:relative;padding:120px 24px 80px;text-align:center;overflow:hidden;border-bottom:1px solid var(--border)}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:900px;background:radial-gradient(ellipse,rgba(239,68,68,0.06) 0%,var(--accent-g) 40%,transparent 70%);pointer-events:none}
.hero-bc{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-d);margin-bottom:20px;position:relative}
.hero-bc a{color:var(--text-m);text-decoration:none}.hero-bc a:hover{color:var(--text)}
.hero-bc .sep{opacity:.4}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--accent-g);border:1px solid var(--border-a);border-radius:100px;font-size:13px;font-weight:600;color:var(--accent);margin-bottom:28px;letter-spacing:.02em}
.badge .pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.hero h1{font-size:clamp(34px,5vw,56px);font-weight:700;line-height:1.08;letter-spacing:-.035em;margin-bottom:20px;position:relative}
.hero h1 .hl{color:var(--accent)}
.hero-sub{font-size:18px;color:var(--text-m);max-width:660px;margin:0 auto 36px;line-height:1.7;position:relative}
.hero-ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative}
.btn-p{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--accent);color:#fff;font-family:var(--font);font-size:15px;font-weight:600;border:none;border-radius:var(--rs);cursor:pointer;text-decoration:none;transition:all .2s}
.btn-p:hover{background:#2563eb;transform:translateY(-1px);text-decoration:none}
.btn-s{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--bg-c);color:var(--text);font-family:var(--font);font-size:15px;font-weight:600;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;text-decoration:none;transition:all .2s}
.btn-s:hover{background:var(--bg-ch);border-color:rgba(255,255,255,.1);text-decoration:none}
.sec{max-width:1120px;margin:0 auto;padding:80px 24px}
.sec-l{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.sec h2{font-size:clamp(26px,3.5vw,38px);font-weight:700;letter-spacing:-.025em;margin-bottom:14px;line-height:1.15}
.sec>.sd{font-size:16px;color:var(--text-m);max-width:620px;margin-bottom:44px;line-height:1.7}
.sdiv{border-top:1px solid var(--border)}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;max-width:1120px;margin:-40px auto 0;position:relative;z-index:1}
.stat-c{background:var(--bg-e);padding:28px 20px;text-align:center}
.stat-v{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.stat-v.red{color:var(--red)}.stat-v.amber{color:var(--amber)}.stat-v.green{color:var(--green)}.stat-v.accent{color:var(--accent)}
.stat-l{font-size:12px;color:var(--text-m);font-weight:500}
.corridor-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:32px}
@media(max-width:768px){.corridor-grid{grid-template-columns:1fr}}
.corridor-card{background:var(--bg-c);border:1px solid var(--border);border-radius:var(--r);padding:28px;transition:border-color .3s}
.corridor-card:hover{border-color:rgba(255,255,255,.08)}
.corridor-card.extreme{border-top:3px solid var(--red)}
.corridor-card.high{border-top:3px solid var(--amber)}
.corridor-card.moderate{border-top:3px solid var(--amber)}
.corridor-card.low{border-top:3px solid var(--green)}
.ctag{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.ctag.extreme,.ctag.high{background:var(--red-g);color:var(--red)}
.ctag.moderate{background:var(--amber-g);color:var(--amber)}
.ctag.low{background:var(--green-g);color:var(--green)}
.corridor-card h3{font-size:20px;font-weight:700;margin-bottom:4px}
.corridor-card .cu{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:8px}
.corridor-card .cd{font-size:14px;color:var(--text-m);line-height:1.6;margin-bottom:16px}
.cmets{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmet{padding:12px;background:rgba(255,255,255,.015);border-radius:var(--rs);border:1px solid var(--border)}
.cml{font-size:10px;color:var(--text-d);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:3px}
.cmv{font-size:16px;font-weight:700}
.cmv.bad{color:var(--red)}.cmv.good{color:var(--green)}.cmv.warn{color:var(--amber)}
.upgrade-overlay{background:linear-gradient(135deg,var(--accent-g),rgba(168,85,247,.06));border:1px solid var(--border-a);border-radius:var(--r);padding:32px;margin-top:32px;text-align:center}
.upgrade-overlay h3{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:8px}
.upgrade-overlay p{font-size:14px;color:var(--text-m);margin-bottom:20px;line-height:1.6}
.insight{background:linear-gradient(135deg,var(--accent-g),rgba(6,182,212,.06));border:1px solid var(--border-a);border-radius:var(--r);padding:28px;margin-top:44px}
.insight h3{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--accent)}
.insight p{font-size:14px;color:var(--text-m);line-height:1.7}
.data-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:32px}
@media(max-width:768px){.data-section{grid-template-columns:1fr}}
.data-card{background:var(--bg-c);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.data-card h4{font-size:15px;font-weight:600;margin-bottom:12px}
.data-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.data-item:last-child{border-bottom:none}
.data-item .dk{color:var(--text-m)}.data-item .dv{font-weight:600}
.cta{text-align:center;padding:80px 24px;position:relative;border-top:1px solid var(--border)}
.cta::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(circle,var(--accent-g) 0%,transparent 70%);pointer-events:none}
.cta h2{font-size:clamp(26px,4vw,42px);font-weight:700;letter-spacing:-.025em;margin-bottom:14px;position:relative}
.cta p{font-size:16px;color:var(--text-m);max-width:540px;margin:0 auto 32px;position:relative;line-height:1.7}
.cta .hero-ctas{position:relative}
.footer{text-align:center;padding:36px 24px;border-top:1px solid var(--border);font-size:12px;color:var(--text-d)}
.footer a{color:var(--text-m)}
.loading{text-align:center;padding:100px 24px;color:var(--text-d);font-size:16px}
@media(max-width:640px){.hero{padding:100px 16px 60px}.sec{padding:60px 16px}.stats-bar{margin:-32px 16px 0}.cmets{grid-template-columns:1fr}}
</style>
</head>
<body>
<noscript><div style="padding:16px 24px;background:rgba(9,9,11,0.9);border-bottom:1px solid rgba(255,255,255,0.04);text-align:center"><a href="https://dchub.cloud" style="color:#e4e4e7;font-weight:700;font-size:18px;text-decoration:none">DC Hub</a></div></noscript>

<div id="app"><div class="loading">Loading Grid Intelligence Brief...</div></div>

<script>
const API_BASE = 'https://dchub.cloud/api/v1/grid-intelligence';

// Auth: try API key from localStorage, JWT token from session, or cookies
function getAuthHeaders() {
  const headers = {};
  // Try API key first
  try {
    const key = localStorage.getItem('dchub_api_key');
    if (key) { headers['X-API-Key'] = key; return headers; }
  } catch(e) {}
  // Try JWT token from session
  try {
    const session = JSON.parse(localStorage.getItem('dchub_session') || '{}');
    if (session.token) { headers['Authorization'] = 'Bearer ' + session.token; return headers; }
  } catch(e) {}
  // Try auth token directly
  try {
    const token = localStorage.getItem('dchub_token');
    if (token) { headers['Authorization'] = 'Bearer ' + token; return headers; }
  } catch(e) {}
  return headers;
}

// Detect region from URL path
function getRegionFromUrl() {
  const path = window.location.pathname;
  const parts = path.split('/').filter(Boolean);
  // /research/grid-intelligence/pjm → parts = ['research','grid-intelligence','pjm']
  return parts[parts.length - 1] || 'ercot';
}

// Congestion styling
function congestionColor(level) {
  const l = (level || '').toLowerCase();
  if (l === 'extreme') return 'bad';
  if (l === 'high') return 'warn';
  if (l === 'moderate') return 'warn';
  return 'good';
}

function congestionLabel(level) {
  const l = (level || 'unknown').toLowerCase();
  const labels = { extreme: 'Extreme', high: 'High', moderate: 'Moderate', low: 'Low' };
  return labels[l] || level;
}

async function loadBrief() {
  const regionId = getRegionFromUrl();
  const appEl = document.getElementById('app');

  try {
    const res = await fetch(`${API_BASE}/${regionId}`, { headers: getAuthHeaders(), credentials: 'include' });
    if (!res.ok) throw new Error(`Region "${regionId}" not found`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Failed to load');

    const r = data.region;
    const tier = data.tier;
    const corridors = data.corridors || [];
    const totalCorridors = data.total_corridors || corridors.length;
    const upgrade = data._upgrade;
    const energyRates = data.energy_rates_cents_kwh || {};
    const taxIncentives = data.tax_incentives || {};
    const facilityCounts = data.facility_counts_by_state || {};

    // Update page title
    document.title = `${r.name} — Grid Intelligence Brief | DC Hub Research`;

    // Build stats bar
    const queueGw = r.total_queue_gw ? `~${r.total_queue_gw} GW` : 'N/A';
    const totalFacilities = Object.values(facilityCounts).reduce((a, b) => a + (b || 0), 0);
    const stateCount = (r.key_states || []).length;

    // Build corridor cards
    let corridorHtml = '';
    corridors.forEach(c => {
      const cLevel = (c.congestion_level || 'moderate').toLowerCase();
      const cColor = congestionColor(c.congestion_level);
      const riskColor = congestionColor(c.dilution_risk);

      let metricsHtml = '';
      if (c.queue_gw !== null && c.queue_gw !== undefined) {
        metricsHtml += `<div class="cmet"><div class="cml">DC Queue</div><div class="cmv ${cColor}">${c.queue_gw} GW</div></div>`;
      }
      if (c.system_peak_gw !== null && c.system_peak_gw !== undefined) {
        metricsHtml += `<div class="cmet"><div class="cml">System Peak</div><div class="cmv">${c.system_peak_gw} GW</div></div>`;
      }
      if (c.queue_peak_ratio) {
        metricsHtml += `<div class="cmet"><div class="cml">Queue / Peak</div><div class="cmv ${cColor}">${c.queue_peak_ratio}×</div></div>`;
      }
      metricsHtml += `<div class="cmet"><div class="cml">Transmission</div><div class="cmv">${c.transmission_capacity || '—'}</div></div>`;
      metricsHtml += `<div class="cmet"><div class="cml">Excess Gen</div><div class="cmv">${c.excess_generation || '—'}</div></div>`;
      metricsHtml += `<div class="cmet"><div class="cml">Dilution Risk</div><div class="cmv ${riskColor}">${congestionLabel(c.dilution_risk)}</div></div>`;

      // Infrastructure counts (developer+)
      if (c.infrastructure && typeof c.infrastructure === 'object') {
        const inf = c.infrastructure;
        metricsHtml += `<div class="cmet"><div class="cml">Substations (50km)</div><div class="cmv accent">${(inf.substations || 0).toLocaleString()}</div></div>`;
        metricsHtml += `<div class="cmet"><div class="cml">Power Plants (50km)</div><div class="cmv accent">${(inf.power_plants || 0).toLocaleString()}</div></div>`;
      }

      corridorHtml += `
        <div class="corridor-card ${cLevel}">
          <div class="ctag ${cLevel}">${cLevel === 'low' ? '✓' : '⚠'} ${congestionLabel(c.congestion_level)}</div>
          <h3>${c.label}</h3>
          <div class="cu">${c.utility || ''} · ${c.state}</div>
          <div class="cd">${typeof c.notes === 'string' && !c.notes.startsWith('██') ? c.notes : ''}</div>
          <div class="cmets">${metricsHtml}</div>
        </div>
      `;
    });

    // Hidden corridors upgrade CTA
    let upgradeHtml = '';
    if (upgrade && upgrade.corridors_hidden > 0) {
      upgradeHtml = `
        <div class="upgrade-overlay">
          <h3>${upgrade.corridors_hidden} more corridor${upgrade.corridors_hidden > 1 ? 's' : ''} available</h3>
          <p>${upgrade.message}</p>
          <a href="${upgrade.checkout || upgrade.url}" class="btn-p">Unlock All Corridors — $49/mo</a>
        </div>
      `;
    } else if (upgrade && tier === 'developer') {
      upgradeHtml = `
        <div class="upgrade-overlay">
          <h3>Want facility names and coordinates?</h3>
          <p>${upgrade.message}</p>
          <a href="${upgrade.url}" class="btn-s">Upgrade to Pro</a>
        </div>
      `;
    }

    // Energy rates + tax incentives + facility counts
    let dataHtml = '';
    const hasRealRates = Object.values(energyRates).some(v => typeof v === 'number');
    const hasRealTax = Object.values(taxIncentives).some(v => typeof v === 'object');

    if (hasRealRates || hasRealTax || totalFacilities > 0) {
      let ratesHtml = '';
      if (hasRealRates) {
        Object.entries(energyRates).forEach(([st, rate]) => {
          if (typeof rate === 'number') {
            ratesHtml += `<div class="data-item"><span class="dk">${st} Industrial</span><span class="dv">$${(rate / 100).toFixed(3)}/kWh</span></div>`;
          }
        });
      } else {
        ratesHtml = '<div class="data-item"><span class="dk">Energy rates</span><span class="dv">██ upgrade to see</span></div>';
      }

      let facHtml = '';
      Object.entries(facilityCounts).forEach(([st, count]) => {
        if (count > 0) facHtml += `<div class="data-item"><span class="dk">${st} Facilities</span><span class="dv">${count.toLocaleString()}</span></div>`;
      });

      let taxHtml = '';
      if (hasRealTax) {
        Object.entries(taxIncentives).forEach(([st, t]) => {
          if (typeof t === 'object') {
            taxHtml += `<div class="data-item"><span class="dk">${st} Sales Tax Exempt</span><span class="dv">${t.sales_tax_exempt ? '✓ Yes' : '✗ No'}</span></div>`;
            taxHtml += `<div class="data-item"><span class="dk">${st} DC-Specific</span><span class="dv">${t.data_center_specific ? '✓ Yes' : '✗ No'}</span></div>`;
          }
        });
      }

      dataHtml = `
        <div class="data-section">
          <div class="data-card">
            <h4>Energy Rates</h4>
            ${ratesHtml}
            ${facHtml}
          </div>
          <div class="data-card">
            <h4>Tax Incentives</h4>
            ${taxHtml || '<div class="data-item"><span class="dk">Incentive data</span><span class="dv">██ upgrade to see</span></div>'}
          </div>
        </div>
      `;
    }

    // Render full page
    appEl.innerHTML = `
      <section class="hero">
        <div class="hero-bc">
          <a href="https://dchub.cloud">DC Hub</a><span class="sep">›</span>
          <a href="https://dchub.cloud/press">Research</a><span class="sep">›</span>
          <a href="https://dchub.cloud/research/grid-intelligence">Grid Intelligence</a><span class="sep">›</span>
          <span style="color:var(--text-m)">${r.name}</span>
        </div>
        <div class="badge"><span class="pulse"></span> ${r.iso} Intelligence — Live Data</div>
        <h1>${r.name}:<br><span class="hl">${r.headline}</span></h1>
        <p class="hero-sub">${r.description}</p>
        <div class="hero-ctas">
          <a href="https://dchub.cloud/land-power" class="btn-p"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Explore Land &amp; Power Map</a>
          <a href="https://dchub.cloud/pricing" class="btn-s">Run Site Analysis →</a>
        </div>
      </section>

      <div class="stats-bar">
        <div class="stat-c"><div class="stat-v red">${queueGw}</div><div class="stat-l">Total DC Queue</div></div>
        <div class="stat-c"><div class="stat-v accent">${totalCorridors}</div><div class="stat-l">Corridors Tracked</div></div>
        <div class="stat-c"><div class="stat-v accent">${totalFacilities.toLocaleString()}</div><div class="stat-l">Facilities (${stateCount} states)</div></div>
        <div class="stat-c"><div class="stat-v green">${stateCount}</div><div class="stat-l">Key States</div></div>
      </div>

      <section class="sec sdiv">
        <div class="sec-l">Corridor Analysis</div>
        <h2>Transmission corridors in ${r.iso}</h2>
        <p class="sd">Each corridor is scored by queue congestion, transmission capacity, generation access, and dilution risk. ${tier === 'free' ? 'Showing ' + corridors.length + ' of ' + totalCorridors + ' corridors.' : 'All ' + totalCorridors + ' corridors shown.'}</p>
        <div class="corridor-grid">${corridorHtml}</div>
        ${upgradeHtml}
      </section>

      <section class="sec sdiv">
        <div class="sec-l">Market Data</div>
        <h2>Energy, facilities, and incentives</h2>
        <p class="sd">Live data from EIA, HIFLD, and DC Hub's tax incentive database across ${(r.key_states||[]).join(', ')}.</p>
        ${dataHtml}
      </section>

      <section class="cta">
        <h2>Run a site analysis in ${r.iso}.</h2>
        <p>DC Hub scores any coordinate for power infrastructure, fiber, gas pipeline access, risk, and market conditions.</p>
        <div class="hero-ctas">
          <a href="https://dchub.cloud/land-power" class="btn-p">Open Land &amp; Power Map</a>
          <a href="https://buy.stripe.com/7sY5kE8F4fs13ml0PEaZi0c" class="btn-s">Developer Access — $49/mo</a>
        </div>
      </section>

      <footer class="footer">
        <p>© 2026 DC Hub · Martone Advisors LLC · <a href="https://dchub.cloud">dchub.cloud</a></p>
        <p style="margin-top:6px">Sources: ${(data.data_sources||[]).join(' · ')}</p>
      </footer>
    `;
  } catch (err) {
    console.error('Brief load error:', err);
    appEl.innerHTML = `
      <div class="loading">
        <h2 style="color:var(--text);margin-bottom:12px">Region not found</h2>
        <p>${err.message}</p>
        <p style="margin-top:20px"><a href="/research/grid-intelligence">← Back to Grid Intelligence Briefs</a></p>
      </div>
    `;
  }
}

loadBrief();
</script>
</body>
</html>
