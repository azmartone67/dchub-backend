*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans','SF Pro Text',sans-serif;background:#09090b;color:#e4e4e7;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
@keyframes squashPulse{0%{transform:scale(1);opacity:1}30%{transform:scale(.97) translateX(-2px)}60%{transform:scale(1.01);background:rgba(74,222,128,.08)}100%{transform:scale(1);opacity:1}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes progressFill{from{width:0}}
@keyframes newBadgePulse{0%,100%{opacity:1}50%{opacity:.6}}
.bug-row{transition:all .2s ease;cursor:pointer;border-radius:6px;padding:12px 16px}
.bug-row:hover{background:rgba(255,255,255,0.03)!important}
.squashing{animation:squashPulse .6s ease}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s ease;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.filter-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;background:transparent;color:#71717a;border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all .15s ease;font-family:inherit}
.filter-btn:hover{color:#a1a1aa;border-color:rgba(255,255,255,0.12)}
.filter-btn.active{background:rgba(52,120,246,0.12);color:#3478f6;border-color:rgba(52,120,246,0.3)}
.sev-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.3px}
.mar24-badge{font-size:9px;font-weight:700;letter-spacing:.5px;background:rgba(74,222,128,0.15);color:#4ade80;padding:2px 6px;border-radius:3px}
.mono{font-family:'IBM Plex Mono',monospace}
.stat-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:16px 18px;text-align:center}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-1px}
.stat-label{font-size:11px;color:#52525b;margin-top:4px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.panel{padding:20px 22px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:10px}
.bug-detail{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.04);animation:fadeSlideIn .2s ease}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.ep-card{padding:10px 14px;border-radius:6px}
.mcp-card{padding:8px 12px;border-radius:5px}
</style>

function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="className")el.className=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="innerHTML")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{if(c!=null)el.appendChild(typeof c==="string"?document.createTextNode(c):c)});
  return el;
}

function getStats(){
  const b=state.bugs;
  const total=b.length,open=b.filter(x=>x.status==="open").length,squashed=b.filter(x=>x.status==="squashed").length;
  const critical=b.filter(x=>x.severity==="critical"&&x.status==="open").length;
  const progress=Math.round((squashed/total)*100);
  return{total,open,squashed,critical,progress};
}

    // ── v4.5.0 Gating QA ──────────────────────────────────────
    function runGatingQA() {
      const container = document.getElementById('gating-qa-results');
      if (!container) return;
      container.innerHTML = '<div style="color:var(--g500);font-size:13px">Running gating checks...</div>';

      const GATED   = ['get_intelligence_index','compare_sites','analyze_site','get_infrastructure'];
      const FREE     = ['search_facilities','get_news','get_pipeline'];
      const BASE     = 'https://dchub.cloud/mcp';
      const HEADERS  = {'Content-Type':'application/json','Accept':'application/json'};

      let results = [];
      const checks = [
        ...GATED.map(t => ({tool:t, expect:'gated'})),
        ...FREE.map(t  => ({tool:t, expect:'free'})),
      ];

      Promise.all(checks.map(c =>
        fetch(BASE, {
          method:'POST',
          headers: HEADERS,
          body: JSON.stringify({jsonrpc:'2.0',method:'tools/call',id:1,params:{name:c.tool,arguments:{}}})
        })
        .then(r => r.json())
        .then(d => {
          const text = JSON.stringify(d);
          const gated = text.includes('plan_required');
          const hasResult = text.includes('"result"') && !gated;
          let pass, label;
          if (c.expect === 'gated') {
            pass = gated;
            label = pass ? '🔒 Gated ✅' : '🚨 LEAK — data exposed!';
          } else {
            pass = hasResult;
            label = pass ? '🔓 Free ✅' : (gated ? '❌ Incorrectly gated' : '⚠️ Backend err');
          }
          return {tool:c.tool, pass, label, expect:c.expect};
        })
        .catch(e => ({tool:c.tool, pass:false, label:'⚠️ fetch error: '+e.message, expect:c.expect}))
      )).then(results => {
        const passed = results.filter(r=>r.pass).length;
        const failed = results.filter(r=>!r.pass).length;
        let html = '<div style="font-size:12px;color:var(--g500);margin-bottom:10px">' +
          'v4.5.0 Gate Check — ' + passed + '/' + results.length + ' passed</div>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
        results.forEach(r => {
          const bg  = r.pass ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)';
          const bdr = r.pass ? '#22c55e' : '#ef4444';
          html += '<div style="background:'+bg+';border:1px solid '+bdr+';border-radius:8px;padding:10px 12px">' +
            '<div style="font-size:11px;font-weight:600;color:var(--g300);margin-bottom:4px">' + r.tool + '</div>' +
            '<div style="font-size:12px">' + r.label + '</div></div>';
        });
        html += '</div>';
        if (failed > 0) html += '<div style="margin-top:10px;padding:8px 12px;background:rgba(239,68,68,0.1);border:1px solid #ef4444;border-radius:6px;font-size:12px;color:#f87171">🚨 ' + failed + ' gating failure(s) — free users may be accessing paid data!</div>';
        else html += '<div style="margin-top:10px;padding:8px 12px;background:rgba(34,197,94,0.08);border:1px solid #22c55e;border-radius:6px;font-size:12px;color:#4ade80">✅ All gating checks passed — no data leakage detected</div>';
        container.innerHTML = html;
      });
    }
