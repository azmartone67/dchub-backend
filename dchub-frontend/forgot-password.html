<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — DC Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
            text-decoration: none;
            color: #fafafa;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 40px 32px;
        }

        .card h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .card p.subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fafafa;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus {
            border-color: #3478f6;
        }

        input[type="email"]::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #3478f6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn-primary:hover {
            background: #2a63d4;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }

        .message.success {
            display: block;
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid rgba(52, 199, 89, 0.2);
            color: #34c759;
        }

        .message.error {
            display: block;
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.2);
            color: #ff453a;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .back-link a {
            color: #3478f6;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 48px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
<style>nav:not(.dchub-nav):not(.dchub-bottom-nav):not(.mobile-nav-drawer-links nav){display:none!important}.nav:not(.dchub-nav){display:none!important}</style>
<script src="/js/dchub-nav.js"></script>
</head>
<body>

    <a href="/" class="logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="20" fill="#3478f6"/>
            <path d="M28 30h20c10 0 18 8 18 20s-8 20-18 20H28V30z" stroke="#fff" stroke-width="6" fill="none"/>
            <circle cx="68" cy="50" r="8" fill="#fff"/>
        </svg>
        <span>DC Hub</span>
    </a>

    <div class="card">
        <h1>Reset your password</h1>
        <p class="subtitle">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

        <form id="forgotForm">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
            <button type="submit" class="btn-primary" id="submitBtn">Send reset link</button>
        </form>

        <div id="message" class="message"></div>

        <div class="back-link">
            <a href="/login.html">&larr; Back to login</a>
        </div>
    </div>

    <div class="footer">&copy; 2026 DC Hub &middot; Martone Advisors LLC</div>

    <script>
        const form = document.getElementById('forgotForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) return;

            btn.disabled = true;
            btn.textContent = 'Sending...';
            msg.className = 'message';
            msg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok) {
                    msg.className = 'message success';
                    msg.textContent = 'If an account exists with that email, you\'ll receive a password reset link shortly. Check your inbox (and spam folder).';
                    msg.style.display = 'block';
                    form.style.display = 'none';
                } else {
                    // Always show success message to prevent email enumeration
                    msg.className = 'message success';
                    msg.textContent = 'If an account exists with that email, you\'ll receive a password reset link shortly. Check your inbox (and spam folder).';
                    msg.style.display = 'block';
                    form.style.display = 'none';
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = 'Something went wrong. Please try again or contact info@dchub.cloud.';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Send reset link';
            }
        });
    </script>
</body>
</html>
