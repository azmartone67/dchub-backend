<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Hub — Backend Diagnostics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            background: #09090b;
            color: #e0e6ed;
            padding: 24px;
            line-height: 1.6;
        }
        h1 { 
            color: #00d4aa; 
            font-size: 20px; 
            margin-bottom: 8px;
        }
        .subtitle { 
            color: #6b7280; 
            font-size: 13px; 
            margin-bottom: 24px; 
        }
        .test-group {
            background: #141417;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .test-group h2 {
            color: #818cf8;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .test {
            display: flex;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid #1f2937;
            font-size: 13px;
        }
        .test:last-child { border-bottom: none; }
        .test .status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .status.pass { background: #064e3b; color: #34d399; }
        .status.fail { background: #7f1d1d; color: #f87171; }
        .status.warn { background: #78350f; color: #fbbf24; }
        .status.pending { background: #1e3a5f; color: #60a5fa; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        .test .details { flex: 1; }
        .test .label { color: #d1d5db; font-weight: 600; }
        .test .value { color: #9ca3af; font-size: 12px; margin-top: 2px; word-break: break-all; }
        .test .timing { color: #6b7280; font-size: 11px; margin-left: 8px; }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }
        button {
            background: #1f2937;
            color: #00d4aa;
            border: 1px solid #00d4aa;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }
        button:hover { background: #00d4aa; color: #09090b; }
        .summary {
            background: #141417;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .summary.healthy { border-color: #34d399; }
        .summary.degraded { border-color: #fbbf24; }
        .summary.down { border-color: #f87171; }
        .json-output {
            background: #0d1117;
            border: 1px solid #1f2937;
            border-radius: 6px;
            padding: 12px;
            font-size: 11px;
            color: #8b949e;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 8px;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
<style>nav:not(.dchub-nav):not(.dchub-bottom-nav):not(.mobile-nav-drawer-links nav){display:none!important}.nav:not(.dchub-nav){display:none!important}</style>
<script src="/js/dchub-nav.js"></script>
</head>
<body>
    <h1>⚡ DC Hub Backend Diagnostics</h1>
    <p class="subtitle">Tests all API backends and identifies failures. Run after every deploy.</p>
    
    <div id="summary" class="summary">
        Click "Run All Tests" to begin diagnostics...
    </div>
    
    <div class="actions">
        <button onclick="runAllTests()">▶ Run All Tests</button>
        <button onclick="location.reload()">↻ Reset</button>
    </div>
    
    <div id="results"></div>

    <script>
    const REPLIT_PUBLISHED = 'https://dc-hub-replit-fixedzip--azmartone1.replit.app';
    
    const ENDPOINTS = [
        { path: '/api/health', name: 'Health Check', critical: true },
        { path: '/api/agent/news?limit=2', name: 'News API', critical: true },
        { path: '/api/v1/stats', name: 'Platform Stats', critical: true },
        { path: '/api/agent/facilities?limit=2', name: 'Facilities', critical: true },
        { path: '/api/v1/deals?limit=2', name: 'Deals/Transactions', critical: false },
        { path: '/api/ecosystem', name: 'Ecosystem', critical: false },
        { path: '/api/founding-members', name: 'Founding Members', critical: false },
        { path: '/api/news/live?limit=2', name: 'News Live', critical: true },
        { path: '/api/ai/query?type=stats', name: 'AI Query Stats', critical: false },
    ];
    
    const results = [];
    
    async function testEndpoint(baseUrl, path, label) {
        const url = baseUrl + path;
        const start = performance.now();
        
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 10000);
            
            const response = await fetch(url, { 
                signal: controller.signal,
                headers: { 'Accept': 'application/json' }
            });
            clearTimeout(timeout);
            
            const elapsed = Math.round(performance.now() - start);
            const contentType = response.headers.get('content-type') || '';
            
            if (!response.ok) {
                return {
                    status: 'fail',
                    message: `HTTP ${response.status}`,
                    timing: elapsed,
                    detail: `${label}: ${url} returned ${response.status}`
                };
            }
            
            if (contentType.includes('text/html')) {
                return {
                    status: 'fail',
                    message: 'Got HTML instead of JSON (Cloudflare error page)',
                    timing: elapsed,
                    detail: `${label}: ${url} returned HTML — backend is down or route doesn't exist`
                };
            }
            
            const text = await response.text();
            let data;
            try {
                data = JSON.parse(text);
            } catch(e) {
                return {
                    status: 'fail',
                    message: 'Invalid JSON response',
                    timing: elapsed,
                    detail: text.substring(0, 200)
                };
            }
            
            // Check for empty data
            const isEmpty = (
                (Array.isArray(data) && data.length === 0) ||
                (data.articles && data.articles.length === 0) ||
                (data.data && Array.isArray(data.data) && data.data.length === 0) ||
                (data.total === 0 && data.count === 0)
            );
            
            if (isEmpty) {
                return {
                    status: 'warn',
                    message: 'Connected but returned EMPTY data',
                    timing: elapsed,
                    detail: JSON.stringify(data, null, 2).substring(0, 500),
                    data: data
                };
            }
            
            return {
                status: 'pass',
                message: `OK (${elapsed}ms)`,
                timing: elapsed,
                detail: JSON.stringify(data, null, 2).substring(0, 500),
                data: data
            };
            
        } catch(err) {
            const elapsed = Math.round(performance.now() - start);
            const isTimeout = err.name === 'AbortError';
            return {
                status: 'fail',
                message: isTimeout ? 'TIMEOUT (>10s)' : err.message,
                timing: elapsed,
                detail: `${label}: ${url} — ${err.message}`
            };
        }
    }
    
    async function runAllTests() {
        const resultsDiv = document.getElementById('results');
        const summaryDiv = document.getElementById('summary');
        resultsDiv.innerHTML = '';
        summaryDiv.textContent = '⏳ Running tests...';
        summaryDiv.className = 'summary';
        
        let passed = 0, failed = 0, warned = 0;
        
        // Test 1: Same-origin (Cloudflare proxy)
        const proxyGroup = createGroup('Same-Origin /api/* (Cloudflare Proxy)');
        resultsDiv.appendChild(proxyGroup.el);
        
        for (const ep of ENDPOINTS) {
            const row = addTestRow(proxyGroup.body, ep.name, 'Testing...');
            const result = await testEndpoint('', ep.path, 'Proxy');
            updateTestRow(row, result, ep.critical);
            if (result.status === 'pass') passed++; 
            else if (result.status === 'fail') failed++;
            else warned++;
        }
        
        // Test 2: Direct Replit published URL
        const replitGroup = createGroup('Direct Replit Published URL');
        resultsDiv.appendChild(replitGroup.el);
        
        for (const ep of ENDPOINTS.filter(e => e.critical)) {
            const row = addTestRow(replitGroup.body, ep.name, 'Testing...');
            const result = await testEndpoint(REPLIT_PUBLISHED, ep.path, 'Replit');
            updateTestRow(row, result, ep.critical);
            if (result.status === 'pass') passed++;
            else if (result.status === 'fail') failed++;
            else warned++;
        }
        
        // Test 3: Neon database (via backend health)
        const neonGroup = createGroup('Database Health (via /api/health)');
        resultsDiv.appendChild(neonGroup.el);
        
        const healthRow = addTestRow(neonGroup.body, 'Neon PostgreSQL', 'Testing...');
        const healthResult = await testEndpoint('', '/api/health', 'Health');
        updateTestRow(healthRow, healthResult, true);
        
        if (healthResult.data) {
            const dbInfo = healthResult.data;
            if (dbInfo.facilities || dbInfo.database) {
                addTestRow(neonGroup.body, 'DB Details', 
                    JSON.stringify(dbInfo, null, 2).substring(0, 300));
            }
        }
        
        // Summary
        const total = passed + failed + warned;
        if (failed === 0 && warned === 0) {
            summaryDiv.innerHTML = `✅ <strong>ALL ${total} TESTS PASSED</strong> — Backend is healthy`;
            summaryDiv.className = 'summary healthy';
        } else if (failed > 0) {
            summaryDiv.innerHTML = `🔴 <strong>${failed} FAILED</strong>, ${warned} warnings, ${passed} passed out of ${total} tests<br><br>` +
                `<strong>Diagnosis:</strong> The backend is returning 524/errors or empty data. ` +
                `Check if Replit is running and Neon has data.`;
            summaryDiv.className = 'summary down';
        } else {
            summaryDiv.innerHTML = `⚠️ <strong>${warned} WARNINGS</strong>, ${passed} passed — Some endpoints returning empty data`;
            summaryDiv.className = 'summary degraded';
        }
    }
    
    function createGroup(title) {
        const el = document.createElement('div');
        el.className = 'test-group';
        el.innerHTML = `<h2>${title}</h2>`;
        const body = document.createElement('div');
        el.appendChild(body);
        return { el, body };
    }
    
    function addTestRow(container, label, initialStatus) {
        const row = document.createElement('div');
        row.className = 'test';
        row.innerHTML = `
            <div class="status pending">⏳</div>
            <div class="details">
                <div class="label">${label}</div>
                <div class="value">${initialStatus}</div>
            </div>
        `;
        container.appendChild(row);
        return row;
    }
    
    function updateTestRow(row, result, critical) {
        const statusEl = row.querySelector('.status');
        const valueEl = row.querySelector('.value');
        
        statusEl.className = `status ${result.status}`;
        statusEl.textContent = result.status === 'pass' ? '✓' : result.status === 'warn' ? '!' : '✗';
        
        let value = `${result.message}`;
        if (result.timing) value += ` <span class="timing">${result.timing}ms</span>`;
        if (critical && result.status === 'fail') value += ' <strong style="color:#f87171">[CRITICAL]</strong>';
        
        valueEl.innerHTML = value;
        
        if (result.detail && result.status !== 'pass') {
            const detailEl = document.createElement('div');
            detailEl.className = 'json-output';
            detailEl.textContent = result.detail;
            row.querySelector('.details').appendChild(detailEl);
        }
    }
    </script>
</body>
</html>
