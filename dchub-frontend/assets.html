        .page-btn {

            color: var(--text2);

        .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        
        .loading-state {
            padding: 60px 20px;

        .load-progress {

        @media (max-width: 768px) {
            .nav-links { display: none; }

            .assets-table { font-size: 12px; }

    </style>

    <script>
        // ── v7.9.10 FIX: Same-origin only. Route through CF Worker proxy
        //     which forwards /api/* to Railway with proper CORS headers.
        //     Removed the legacy 'web-production-e6382' Railway URL (404/CORS).
        //     Cross-origin Railway calls with credentials:include fail
        //     preflight because backend doesn't return Allow-Credentials:true.
        const API_BACKENDS = [''];  // same-origin only
        let API_BASE = API_BACKENDS[0];

        // ── Auth patch: attach JWT same-origin only (skip CORS preflight) ──
        (function() {
            const _origFetch = window.fetch;
            window.fetch = function(url, opts = {}) {
                const isSameOrigin = typeof url === 'string' &&
                    (url.startsWith('/') || url.includes('dchub.cloud'));
                if (isSameOrigin) {
                    const token = localStorage.getItem('dchub_token')
                               || localStorage.getItem('token')
                               || localStorage.getItem('jwt');
                    if (token) {
                        const headers = new Headers(opts.headers || {});
                        if (!headers.has('Authorization')) {
                            headers.set('Authorization', 'Bearer ' + token);
                        }
                        opts.headers = headers;
                    }
                }
                return _origFetch.call(this, url, opts);
            };
        })();
        // ── End auth patch ─────────────────────────────────────────────

        // Use all=true and high limit to get ALL facilities
        const FACILITY_ENDPOINT = '/api/v1/map?all=true&limit=2000';
        const STATS_ENDPOINT = '/api/v1/stats';

        let allFacilities = [];
        let filteredFacilities = [];
        let globalStats = null;
        let currentPage = 1;
        const perPage = 50;

        async function loadStats() {
            for (const base of API_BACKENDS) {
                try {
                    console.log('Loading stats from:', base + STATS_ENDPOINT);
                    const response = await fetch(base + STATS_ENDPOINT);
                    if (response.ok) {
                        const result = await response.json();
                        const s = result.stats || result.data || result;
                        globalStats = {
                            total_facilities: s.total_facilities || s.facilities || 0,
                            total_providers: s.total_providers || s.providers || 0,
                            total_power_mw: s.total_power_mw || s.total_mw || 0,
                            countries: s.countries || s.total_countries || 0
                        };
                        console.log('Stats loaded:', globalStats);
                        API_BASE = base; // sticky

                        if (globalStats.total_facilities) {
                            document.getElementById('total-facilities').textContent = globalStats.total_facilities.toLocaleString();
                            document.getElementById('nav-badge').textContent = `📊 ${globalStats.total_facilities.toLocaleString()} Facilities`;
                        }
                        if (globalStats.total_power_mw) {
                            document.getElementById('total-mw').textContent = Math.round(globalStats.total_power_mw).toLocaleString();
                        }
                        return;
                    }
                } catch (err) {
                    console.log('Stats failed on', base, ':', err.message);
                }
            }
        }

        async function loadAssets() {
            const content = document.getElementById('assets-content');
            const progress = document.getElementById('load-progress');
            content.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>Loading all facilities...</p><p class="load-progress" id="load-progress">Fetching data from server...</p></div>';
            
            // Load stats first (quick)
            await loadStats();
            
            // Supplement stats with aggregate data if providers/MW missing
            if (!globalStats?.total_providers || !globalStats?.total_power_mw) {
                try {
                    const aggResp = await fetch(API_BASE + '/api/v1/facilities/by-provider?limit=50');
                    if (aggResp.ok) {
                        const aggData = await aggResp.json();
                        const providers = aggData.data || [];
                        if (Array.isArray(providers) && providers.length > 0) {
                            if (!globalStats) globalStats = {};
                            if (!globalStats.total_providers) globalStats.total_providers = providers.length;
                            if (!globalStats.total_power_mw) {
                                globalStats.total_power_mw = providers.reduce((s, p) => s + (p.total_mw || 0), 0);
                            }
                            // Re-update display
                            if (globalStats.total_facilities) {
                                document.getElementById('total-facilities').textContent = globalStats.total_facilities.toLocaleString();
                                document.getElementById('nav-badge').textContent = `📊 ${globalStats.total_facilities.toLocaleString()} Facilities`;
                            }
                            if (globalStats.total_power_mw) {
                                document.getElementById('total-mw').textContent = Math.round(globalStats.total_power_mw).toLocaleString();
                            }
                        }
                    }
                } catch (e) { console.log('Aggregate supplement failed:', e.message); }
            }
            
            // Now load all facilities - try each backend
            let loadSuccess = false;
            for (const base of API_BACKENDS) {
                if (loadSuccess) break;
                try {
                    console.log('Fetching facilities from:', base + FACILITY_ENDPOINT);
                    document.getElementById('load-progress').textContent = 'Downloading facility database...';
                    
                    const response = await fetch(base + FACILITY_ENDPOINT);
                    if (response.ok) {
                        const data = await response.json();
                        allFacilities = data.data || data.facilities || data;
                        
                        if (Array.isArray(allFacilities) && allFacilities.length > 0) {
                            console.log('Success! Got', allFacilities.length, 'facilities from', base);
                            document.getElementById('load-progress').textContent = `Processing ${allFacilities.length.toLocaleString()} facilities...`;
                            API_BASE = base;
                            loadSuccess = true;
                        }
                    } else if (response.status === 401) {
                        console.warn('⚠️ Auth required for facilities endpoint');
                        content.innerHTML = '<div class="loading-state"><p style="font-size:18px;">🔒 Sign in to access the facility database</p><p style="color:#9ca3af;margin-top:8px;">The Asset Explorer requires a DC Hub account.</p><p style="margin-top:16px;"><a href="/" style="background:#6366f1;color:white;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:600;">Sign In</a></p></div>';
                        return;
                    } else if (response.status === 403) {
                        console.warn('⚠️ Plan upgrade required for facilities endpoint');
                        content.innerHTML = '<div class="loading-state"><p style="font-size:18px;">⚡ Upgrade to access the full facility database</p><p style="color:#9ca3af;margin-top:8px;">The Asset Explorer requires a Pro or Enterprise plan.</p><p style="margin-top:16px;"><a href="/pricing.html" style="background:#6366f1;color:white;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:600;">View Plans</a></p></div>';
                        return;
                    }
                } catch (err) {
                    console.log('Failed to load facilities from', base, ':', err.message);
                }
            }
            
            if (!loadSuccess) {
                allFacilities = [];
            }

            if (!allFacilities || !Array.isArray(allFacilities) || allFacilities.length === 0) {
                content.innerHTML = '<div class="loading-state"><p>No facilities loaded. Check console for errors.</p></div>';
                return;
            }

            filteredFacilities = [...allFacilities];
            
            updateStats();
            populateFilters();
            renderAssets();
        }

        function updateStats() {
            const loadedCount = allFacilities.length;
            const providers = new Set(allFacilities.map(f => f.provider || f.operator).filter(Boolean));
            const markets = new Set(allFacilities.map(f => f.city || f.market || f.state).filter(Boolean));
            const totalMW = allFacilities.reduce((sum, f) => sum + (parseFloat(f.power_mw || f.power || f.capacity_mw) || 0), 0);

            // Prefer globalStats from /api/v1/stats (Neon totals) over loaded array counts
            const gs = globalStats || {};
            const facilityCount = gs.total_facilities || loadedCount;
            const providerCount = gs.total_providers || providers.size;
            const mwTotal = gs.total_power_mw || gs.total_mw || totalMW;
            const marketCount = gs.total_countries || markets.size;

            document.getElementById('total-facilities').textContent = facilityCount.toLocaleString();
            document.getElementById('nav-badge').textContent = `📊 ${facilityCount.toLocaleString()} Facilities`;
            document.getElementById('total-mw').textContent = Math.round(mwTotal).toLocaleString();
            document.getElementById('total-providers').textContent = providerCount.toLocaleString();
            document.getElementById('total-markets').textContent = marketCount.toLocaleString();
            
            // Update nav badge
            document.getElementById('nav-badge').textContent = `📊 ${facilityCount.toLocaleString()} Facilities`;
        }

        function populateFilters() {
            const providers = [...new Set(allFacilities.map(f => f.provider || f.operator).filter(Boolean))].sort();
            const markets = [...new Set(allFacilities.map(f => f.city || f.market).filter(Boolean))].sort();

            const providerSelect = document.getElementById('filter-provider');
            providerSelect.innerHTML = '<option value="">All Providers (' + providers.length + ')</option>' + 
                providers.slice(0, 100).map(p => `<option value="${p}">${p}</option>`).join('');

            const marketSelect = document.getElementById('filter-market');
            marketSelect.innerHTML = '<option value="">All Markets (' + markets.length + ')</option>' + 
                markets.slice(0, 100).map(m => `<option value="${m}">${m}</option>`).join('');
        }

        function filterAssets() {
            const search = document.getElementById('search').value.toLowerCase();
            const provider = document.getElementById('filter-provider').value;
            const market = document.getElementById('filter-market').value;
            const status = document.getElementById('filter-status').value;

            filteredFacilities = allFacilities.filter(f => {
                const name = (f.name || f.facility_name || '').toLowerCase();
                const prov = (f.provider || f.operator || '');
                const mkt = (f.city || f.market || '');
                const stat = (f.status || 'active').toLowerCase();

                if (search && !name.includes(search) && !prov.toLowerCase().includes(search) && !mkt.toLowerCase().includes(search)) return false;
                if (provider && prov !== provider) return false;
                if (market && mkt !== market) return false;
                if (status && stat !== status.toLowerCase()) return false;
                return true;
            });

            currentPage = 1;
            renderAssets();
        }

        function formatCapacity(f) {
            const mw = parseFloat(f.power_mw || f.power || f.capacity_mw);
            if (!mw || isNaN(mw)) return '--';
            return Math.round(mw) + ' MW';
        }

        function getMarket(f) {
            return f.city || f.market || f.state || f.region || 'Unknown';
        }

        function renderAssets() {
            const content = document.getElementById('assets-content');
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageData = filteredFacilities.slice(start, end);

            if (pageData.length === 0) {
                content.innerHTML = '<div class="loading-state"><p>No facilities found matching your filters.</p></div>';
                document.getElementById('pagination').style.display = 'none';
                document.getElementById('results-count').textContent = '0 results';
                return;
            }

            let html = `<table class="assets-table">
                <thead>
                    <tr>
                        <th>Facility</th>
                        <th>Market</th>
                        <th>Capacity</th>
                        <th>Country</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>`;

            pageData.forEach(f => {
                const status = (f.status || 'active').toLowerCase();
                const capacity = formatCapacity(f);
                const market = getMarket(f);
                const country = f.country || 'USA';
                
                html += `<tr>
                    <td>
                        <div class="facility-name">${f.name || f.facility_name || 'Unnamed'}</div>
                        <div class="facility-provider">${f.provider || f.operator || 'Unknown'}</div>
                    </td>
                    <td>${market}</td>
                    <td class="capacity-value">${capacity}</td>
                    <td>${country}</td>
                    <td><span class="status-badge ${status}">${status}</span></td>
                </tr>`;
            });

            html += '</tbody></table>';
            content.innerHTML = html;

            // Update pagination - show total from stats if more exist than loaded
            const totalFromStats = globalStats?.total_facilities || 0;
            const shownCount = filteredFacilities.length;
            if (totalFromStats > shownCount) {
                document.getElementById('results-count').textContent = `${shownCount.toLocaleString()} of ${totalFromStats.toLocaleString()} facilities`;
            } else {
                document.getElementById('results-count').textContent = `${shownCount.toLocaleString()} results`;
            }
            document.getElementById('pagination').style.display = 'flex';
            document.getElementById('pagination-info').textContent = `Showing ${start + 1}-${Math.min(end, filteredFacilities.length)} of ${shownCount.toLocaleString()}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = end >= filteredFacilities.length;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderAssets();
                document.querySelector('.assets-section').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function nextPage() {
            if (currentPage * perPage < filteredFacilities.length) {
                currentPage++;
                renderAssets();
                document.querySelector('.assets-section').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function exportCSV() {
            if (filteredFacilities.length === 0) {
                alert('No data to export');
                return;
            }
            
            const headers = ['Name', 'Provider', 'City', 'State', 'Country', 'Power (MW)', 'Status', 'Region', 'Latitude', 'Longitude'];
            const rows = filteredFacilities.map(f => [
                f.name || f.facility_name || '',
                f.provider || f.operator || '',
                f.city || '',
                f.state || '',
                f.country || 'USA',
                f.power_mw || f.power || f.capacity_mw || '',
                f.status || 'active',
                f.region || '',
                f.lat || f.latitude || '',
                f.lng || f.lon || f.longitude || ''
            ]);

            const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dc-hub-facilities-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        document.addEventListener('DOMContentLoaded', loadAssets);
    </script>
</body>
</html>
