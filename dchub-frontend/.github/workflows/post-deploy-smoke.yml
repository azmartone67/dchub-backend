name: Post-Deploy Map Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Wait for Cloudflare Pages deploy (~90s)
        run: sleep 90
      - name: Smoke test production map pages
        run: python tests/smoke_map_pages.py --base https://dchub.cloud --json
