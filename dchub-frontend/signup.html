<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — DC Hub</title>
<meta name="description" content="Create a free DC Hub account. Access 20,000+ data center facilities, M&A deals, and AI-powered site selection tools.">
<script>
// Redirect to login.html with signup mode + preserve any plan param
const params = new URLSearchParams(window.location.search);
const plan = params.get('plan');
const dest = plan ? `login.html?mode=signup&plan=${encodeURIComponent(plan)}` : 'login.html?mode=signup';
window.location.replace(dest);
</script>
<style>
/* Fallback display if JS redirect takes a moment */
body {
  margin: 0; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: #09090b; color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.loading {
  text-align: center;
}
.loading h2 {
  font-size: 1.5rem; font-weight: 700; color: #f8fafc; margin-bottom: 12px;
}
.loading p {
  color: #94a3b8; font-size: 0.95rem; margin-bottom: 24px;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.04);
  border-top-color: #6366f1; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
a {
  color: #6366f1; text-decoration: none; font-weight: 600;
}
a:hover { text-decoration: underline; }
</style>
<style>nav:not(.dchub-nav):not(.dchub-bottom-nav):not(.mobile-nav-drawer-links nav){display:none!important}.nav:not(.dchub-nav){display:none!important}</style>
<script src="/js/dchub-nav.js"></script>
</head>
<body>
<noscript>
  <meta http-equiv="refresh" content="0;url=login.html">
</noscript>
<div class="loading">
  <div class="spinner"></div>
  <h2>Creating your account...</h2>
  <p>Redirecting to sign up. <a href="login.html?mode=signup">Click here</a> if not redirected.</p>
</div>
</body>
</html>
