<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Press Release | DC Hub — Data Center Intelligence</title>
    <meta name="description" id="page-desc" content="DC Hub press releases and company announcements.">
    <link rel="canonical" id="page-canonical" href="https://dchub.cloud/press">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #050810;
            --surface: #0a0f1e;
            --surface2: #0c0c0f;
            --border: rgba(255,255,255,0.06);
            --text: #e2e8f0;
            --text2: rgba(255,255,255,0.45);
            --text3: rgba(255,255,255,0.2);
            --cyan: #22d3ee;
            --purple: #8b5cf6;
            --amber: #f59e0b;
            --green: #10b981;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'DM Sans', -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── LOADING / ERROR ─── */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text3);
        }
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── NAV BREADCRUMB ─── */
        .breadcrumb {
            padding: 120px 40px 0;
            max-width: 860px;
            margin: 0 auto;
        }
        .breadcrumb-inner {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text3);
        }
        .breadcrumb-inner a { color: var(--cyan); text-decoration: none; }
        .breadcrumb-inner a:hover { text-decoration: underline; }
        .breadcrumb-sep { color: var(--text3); }

        /* ─── ARTICLE ─── */
        .article-wrapper {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 40px 100px;
        }

        .article-meta-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .article-tag {
            font-family: var(--mono);
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(34,211,238,0.1);
            color: var(--cyan);
        }
        .article-date {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text3);
        }

        .article-headline {
            font-size: clamp(28px, 4vw, 46px);
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.15;
            margin-bottom: 20px;
            color: var(--text);
        }
        .article-subheadline {
            font-size: 18px;
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 40px;
            border-left: 3px solid rgba(34,211,238,0.25);
            padding-left: 20px;
        }

        .article-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 40px 0;
        }

        /* ─── ARTICLE BODY ─── */
        .article-body {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(255,255,255,0.75);
        }
        .article-body p {
            margin-bottom: 20px;
        }
        .article-body p:last-child { margin-bottom: 0; }
        /* Quotes within the body */
        .article-body .inline-quote {
            background: var(--surface);
            border-left: 3px solid var(--cyan);
            border-radius: 0 10px 10px 0;
            padding: 20px 24px;
            margin: 28px 0;
            font-style: italic;
            font-size: 17px;
            color: rgba(255,255,255,0.65);
        }

        /* ─── SOCIAL SHARE ─── */
        .share-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 60px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .share-label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text2);
            text-decoration: none;
            background: var(--surface);
            cursor: pointer;
            transition: all 0.2s;
        }
        .share-btn:hover {
            border-color: rgba(34,211,238,0.2);
            color: var(--cyan);
        }

        /* ─── BACK LINK ─── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 48px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--cyan);
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        /* ─── FOOTER ─── */
        .footer {
            padding: 32px 40px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 12px;
            color: var(--text3);
            font-family: var(--mono);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .breadcrumb { padding: 100px 20px 0; }
            .article-wrapper { padding: 32px 20px 80px; }
            .article-headline { font-size: 28px; }
        }
    </style>
</head>
<body>

<!-- NAV: Injected by dchub-nav.js (shared site-wide component) -->
<script src="/js/dchub-nav.js"></script>

<!-- LOADING STATE (replaced once data arrives) -->
<div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    Loading press release...
</div>

<!-- CONTENT (hidden until data arrives) -->
<div id="content-wrapper" style="display:none;">
    <div class="breadcrumb">
        <div class="breadcrumb-inner">
            <a href="/">DC Hub</a>
            <span class="breadcrumb-sep">/</span>
            <a href="/press">Press</a>
            <span class="breadcrumb-sep">/</span>
            <span id="breadcrumb-title">Press Release</span>
        </div>
    </div>

    <article class="article-wrapper">
        <div class="article-meta-bar">
            <span class="article-tag" id="article-tag">Press Release</span>
            <span class="article-date" id="article-date"></span>
        </div>

        <h1 class="article-headline" id="article-headline"></h1>
        <p class="article-subheadline" id="article-subheadline"></p>

        <hr class="article-divider">

        <div class="article-body" id="article-body"></div>

        <div class="share-bar">
            <span class="share-label">Share</span>
            <a href="#" id="share-linkedin" class="share-btn" target="_blank" rel="noopener">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn
            </a>
            <a href="#" id="share-x" class="share-btn" target="_blank" rel="noopener">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.625 5.905-5.625zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                X / Twitter
            </a>
            <button class="share-btn" id="share-copy">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                Copy Link
            </button>
        </div>

        <a href="/press" class="back-link">← Back to all press releases</a>
    </article>
</div>

<!-- ERROR STATE -->
<div id="error-state" style="display:none;" class="loading-state" style="flex-direction:column;gap:16px;">
    <p style="font-family:var(--mono);font-size:14px;color:var(--text2);text-align:center;">Press release not found.</p>
    <a href="/press" style="font-family:var(--mono);font-size:12px;color:var(--cyan);">← Back to newsroom</a>
</div>

<footer class="footer">
    <p>© 2026 DC Hub. All rights reserved. dchub.cloud</p>
</footer>

<script>
(function(){
    var MONTHS = {
        '01':'January','02':'February','03':'March','04':'April',
        '05':'May','06':'June','07':'July','08':'August',
        '09':'September','10':'October','11':'November','12':'December'
    };

    // Extract slug from URL path: /news/tony-bishop-founding-member
    var slug = window.location.pathname.replace(/\/+$/, '').split('/').pop();

    if (!slug || slug === 'news') {
        window.location.href = '/press';
        return;
    }

    // ──────────────────────────────────────────────────────────────────
    // DCHUB 2026-04-28: bare /press-release → render daily news brief
    // (slug-template /press-release/<slug> path below is untouched)
    // ──────────────────────────────────────────────────────────────────
    if (slug === 'press-release') {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('page-title').textContent = 'Daily Brief | DC Hub — Data Center Intelligence';
        document.getElementById('page-desc').content = 'DC Hub daily data center industry news brief, curated from 40+ sources.';
        document.getElementById('page-canonical').href = 'https://dchub.cloud/press-release';
        document.getElementById('breadcrumb-title').textContent = 'Daily Brief';
        document.getElementById('article-tag').textContent = 'DAILY BRIEF';
        document.getElementById('article-date').textContent = formatFullDate(new Date().toISOString().split('T')[0]);
        document.getElementById('article-headline').textContent = "Today's Headlines";
        var subEl = document.getElementById('article-subheadline');
        subEl.textContent = 'Curated data center industry news from 40+ sources, refreshed every morning.';

        var bodyEl = document.getElementById('article-body');
        bodyEl.innerHTML = '<div style="padding:20px;color:var(--text2);">Loading today\'s news…</div>';

        // Featured: Semantic Search Explorer (the new product to promote)
        var featured = '<div style="background:linear-gradient(135deg,#0d3a2e,#0a4538);border:1px solid #2a8068;border-radius:12px;padding:22px;margin:0 0 28px;">' +
            '<span style="display:inline-block;padding:3px 10px;background:#5bd4a3;color:#08231a;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.06em;">NEW</span>' +
            '<h3 style="margin:12px 0 8px;font-size:20px;color:#fff;">Semantic Search Explorer</h3>' +
            '<p style="margin:0 0 14px;color:rgba(255,255,255,0.78);font-size:14px;line-height:1.55;">Query 21,319 data center facilities by natural language. Backed by Cloudflare Vectorize + BGE-base-en-v1.5 embeddings. Filter by ISO/RTO, state, MW range, provider.</p>' +
            '<a href="/api/v1/explorer" style="display:inline-block;padding:9px 16px;background:#5bd4a3;color:#08231a;text-decoration:none;border-radius:6px;font-weight:700;font-size:13px;">Try the Explorer →</a>' +
            '</div>';

        var newsXhr = new XMLHttpRequest();
        newsXhr.open('GET', '/api/news?limit=12', true);
        newsXhr.timeout = 10000;
        newsXhr.onload = function () {
            var html = featured + '<h3 style="margin:0 0 16px;font-size:20px;font-weight:700;">Today\'s Headlines</h3>';
            if (newsXhr.status !== 200) {
                bodyEl.innerHTML = html + '<p>Could not load news right now. <a href="/news" style="color:var(--cyan);">View all news →</a></p>';
                return;
            }
            try {
                var data = JSON.parse(newsXhr.responseText);
                var items = (data.articles || data || []).slice(0, 12);
                if (!items.length) {
                    bodyEl.innerHTML = html + '<p>No headlines available right now.</p>';
                    return;
                }
                items.forEach(function (a) {
                    var title = escapeHtml(a.title || '');
                    var summary = escapeHtml((a.summary || '').slice(0, 220));
                    var src = escapeHtml(a.source || '');
                    var url = a.url || '#';
                    var cat = escapeHtml(a.category || '');
                    html += '<article style="border-bottom:1px solid var(--border);padding:16px 0;">' +
                        (cat ? '<div style="color:var(--cyan);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;font-family:var(--mono);">' + cat + '</div>' : '') +
                        '<h4 style="margin:0 0 8px;font-size:16px;line-height:1.4;font-weight:600;"><a href="' + url + '" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none;">' + title + '</a></h4>' +
                        '<p style="margin:0 0 8px;color:var(--text2);font-size:13px;line-height:1.5;">' + summary + (a.summary && a.summary.length > 220 ? '…' : '') + '</p>' +
                        '<div style="color:var(--text3);font-size:12px;">' + src + '</div>' +
                        '</article>';
                });
                html += '<div style="text-align:center;margin-top:24px;"><a href="/news" style="color:var(--cyan);text-decoration:none;font-size:14px;">View all news →</a></div>';
                bodyEl.innerHTML = html;
            } catch (e) {
                bodyEl.innerHTML = html + '<p>Could not parse news feed.</p>';
            }
        };
        newsXhr.onerror = newsXhr.ontimeout = function () {
            bodyEl.innerHTML = featured + '<p>News feed timed out. <a href="/news" style="color:var(--cyan);">View all news →</a></p>';
        };
        newsXhr.send();

        document.getElementById('content-wrapper').style.display = 'block';
        return;
    }
    // ──────────────────────────────────────────────────────────────────

    function formatFullDate(dateStr) {
        if (!dateStr) return '';
        var p = dateStr.split('T')[0].split('-');
        return (MONTHS[p[1]] || '') + ' ' + parseInt(p[2],10) + ', ' + p[0];
    }

    function renderBody(bodyText) {
        if (!bodyText) return '';
        // Split on double newlines for paragraphs
        var paragraphs = bodyText.split(/\n\n+/).filter(function(p){ return p.trim(); });
        return paragraphs.map(function(p) {
            var trimmed = p.trim();
            // Detect quotes: lines starting with "
            if (trimmed.startsWith('"') && trimmed.endsWith('"')) {
                return '<div class="inline-quote">' + escapeHtml(trimmed) + '</div>';
            }
            // Detect quote sections (Quote from X:)
            if (/^Quote from/i.test(trimmed)) {
                var lines = trimmed.split('\n');
                var speaker = escapeHtml(lines[0]);
                var quote = escapeHtml(lines.slice(1).join(' ').trim());
                return '<div class="inline-quote"><strong style="display:block;margin-bottom:8px;font-style:normal;color:var(--text2);font-size:13px;">' + speaker + '</strong>' + quote + '</div>';
            }
            return '<p>' + escapeHtml(trimmed).replace(/\n/g, '<br>') + '</p>';
        }).join('');
    }

    function escapeHtml(str) {
        return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://dchub-backend-production.up.railway.app/api/press-releases/' + encodeURIComponent(slug), true);
    xhr.timeout = 10000;

    xhr.onload = function() {
        document.getElementById('loading-state').style.display = 'none';

        if (xhr.status !== 200) {
            document.getElementById('error-state').style.display = 'flex';
            return;
        }

        try {
            var r = JSON.parse(xhr.responseText);

            // Update page meta
            var title = r.title || 'Press Release';
            document.getElementById('page-title').textContent = title + ' | DC Hub';
            document.getElementById('page-desc').content = r.meta_description || r.subheadline || title;
            document.getElementById('page-canonical').href = 'https://dchub.cloud/news/' + slug;

            // Breadcrumb
            document.getElementById('breadcrumb-title').textContent =
                title.length > 50 ? title.substring(0,50)+'…' : title;

            // Meta bar
            document.getElementById('article-tag').textContent = (r.category || 'Press Release').toUpperCase();
            document.getElementById('article-date').textContent = formatFullDate(r.date || r.published_date);

            // Headline & subheadline
            document.getElementById('article-headline').textContent = title;
            var sub = r.subheadline || '';
            var subEl = document.getElementById('article-subheadline');
            if (sub) {
                subEl.textContent = sub;
            } else {
                subEl.style.display = 'none';
            }

            // Body
            document.getElementById('article-body').innerHTML = renderBody(r.body || '');

            // Share links
            var pageUrl = encodeURIComponent(window.location.href);
            var pageTitle = encodeURIComponent(title);
            document.getElementById('share-linkedin').href =
                'https://www.linkedin.com/sharing/share-offsite/?url=' + pageUrl;
            document.getElementById('share-x').href =
                'https://x.com/intent/tweet?text=' + pageTitle + '&url=' + pageUrl;
            document.getElementById('share-copy').addEventListener('click', function(){
                navigator.clipboard.writeText(window.location.href).then(function(){
                    document.getElementById('share-copy').textContent = '✓ Copied!';
                    setTimeout(function(){ document.getElementById('share-copy').innerHTML =
                        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Link';
                    }, 2000);
                });
            });

            // Show content
            document.getElementById('content-wrapper').style.display = 'block';

        } catch(e) {
            document.getElementById('error-state').style.display = 'flex';
        }
    };

    xhr.onerror = xhr.ontimeout = function() {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display = 'flex';
    };

    xhr.send();
})();
</script>

</body>
</html>
