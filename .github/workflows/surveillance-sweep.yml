name: Surveillance Sweep (security / drift / errors / brain / media)

# 2026-05-24 — Unified surveillance cron that polls /api/v1/sentinel/sweep
# every 15 min. The endpoint composes:
#   - 5 security detectors (admin endpoint open, paywall holes, header
#     drift, secret patterns in body, repeated admin 401s)
#   - site_sentinel page health (every public URL polled)
#   - Neon backup + per-table data freshness
#   - data-drift detection (row count vs baseline; flags silent loss)
#   - 5xx spike detector (last 15 min)
#   - brain filter telemetry (why N proposals)
#   - dchub-media pulse (press cadence + LinkedIn velocity)
#
# Severity ≠ green emits ::warning:: in GitHub Actions logs so the run
# summary surfaces problems without needing to dig through JSON.

on:
  schedule:
    # Phase r28 cron-stagger: :11, :26, :41, :56 — off-cycle from
    # heartbeat-auto (:08,:23,:38,:53) and auto-rollback (:00/15) to
    # avoid pool contention spikes the brain_consistency_radar flags.
    - cron: '11-59/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write   # so amber/red runs can open a tracking issue if needed

env:
  BASE: https://dchub-backend-production.up.railway.app

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Poll /sentinel/sweep
        id: sweep
        run: |
          set -euo pipefail
          response=$(curl -sS --max-time 60 "$BASE/api/v1/sentinel/sweep" \
            || echo '{"severity":"red","error":"curl_fail"}')
          # Save full payload as a step output for downstream debugging.
          echo "$response" > sweep.json
          severity=$(echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception: d = {}
          print(d.get('severity', 'unknown'))
          ")
          echo "severity=$severity" >> "$GITHUB_OUTPUT"
          echo "::notice::Surveillance sweep severity=$severity"

      - name: Surface findings (amber / red)
        if: steps.sweep.outputs.severity != 'green'
        run: |
          python3 - <<'PY'
          import json
          with open("sweep.json") as f:
              d = json.load(f)
          actions = d.get("actions") or []
          print(f"::warning::Sweep severity={d.get('severity')} actions={len(actions)}")
          # Group by category for readable summary.
          from collections import defaultdict
          by_cat = defaultdict(list)
          for a in actions:
              by_cat[a.get("category","other")].append(a)
          for cat, items in by_cat.items():
              print(f"::warning::[{cat}] {len(items)} finding(s):")
              for a in items[:5]:
                  print(f"::warning::  - [{a.get('priority','?')}] {a.get('issue','')}: {a.get('detail','')[:200]}")
          # Surface check-level health.
          for name, check in (d.get("checks") or {}).items():
              if isinstance(check, dict) and check.get("ok") is False:
                  print(f"::warning::check.{name}: NOT OK — {json.dumps(check)[:300]}")
          PY

      - name: Hard fail on red (so the run shows red in the dashboard)
        if: steps.sweep.outputs.severity == 'red'
        run: |
          echo "::error::Surveillance sweep RED — critical or high-priority findings present. See ::warning:: lines above."
          exit 1

      - name: Trend digest (green ratio over last 100 sweeps)
        if: always()
        run: |
          curl -sS --max-time 15 "$BASE/api/v1/sentinel/sweep/history?limit=100" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          roll = d.get('severity_rollup') or {}
          pct = d.get('green_pct', 0)
          print(f\"::notice::Last 100 sweeps: green={roll.get('green',0)} amber={roll.get('amber',0)} red={roll.get('red',0)} | green_ratio={pct}%\")
          " || true
