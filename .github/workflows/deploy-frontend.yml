# Phase ZZZZ-cfdeploy v2 (2026-05-18): diagnostic-first CF Pages deploy.
# v1 failed with opaque "exit code 1". v2 lists projects first so we know
# the real project name, then deploys.
#
# Setup (one-time):
#   1. CF API token (Custom): Account · Cloudflare Pages · Edit
#                              Account · Workers Scripts · Edit
#                              User    · User Details    · Read
#   2. GitHub → Settings → Secrets → Actions:
#      CLOUDFLARE_API_TOKEN  + CLOUDFLARE_ACCOUNT_ID

name: Deploy frontend to Cloudflare Pages

on:
  # r43-H (2026-05-28): PUSH TRIGGER DISABLED — this was the endemic flap.
  # This workflow deploys the ~/dchub-backend/dchub-frontend/ SUBDIR, whose
  # _worker.js is the stale 4.24.0-switzerland. The CANONICAL frontend is the
  # standalone ~/dchub-frontend repo (4.34.25), deployed by its OWN
  # deploy-pages.yml. Running this on every backend push redeployed the stale
  # worker over the good one — and because the brain/cron commit to THIS repo
  # constantly, prod flapped continuously: /facilities 404'd and
  # /transactions + /markets timed out via Cloudflare while the backend itself
  # was healthy. Manual-only now (workflow_dispatch). Do NOT re-enable the push
  # trigger until the subdir worker is synced to the canonical version.
  # See memory reference_dchub_prod_alias_pin / reference_dchub_cf_pages_flap_*.
  workflow_dispatch:
    inputs:
      project_name:
        description: 'CF Pages project name (override auto-detect)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      # GitHub-hosted ubuntu-latest pins Node 20; wrangler@4 needs >=22.
      # Without this step v3 fix logs were misleading ("token missing
      # permission" was the secondary symptom, not the root cause).
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 0 — Secrets sanity check
        run: |
          echo "API_TOKEN set:  $([ -n \"$CLOUDFLARE_API_TOKEN\" ] && echo YES || echo NO)"
          echo "ACCOUNT_ID set: $([ -n \"$CLOUDFLARE_ACCOUNT_ID\" ] && echo YES || echo NO)"
          echo "ACCOUNT_ID length: ${#CLOUDFLARE_ACCOUNT_ID} (should be 32 hex chars)"
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ Fix at: github.com/azmartone67/dchub-backend/settings/secrets/actions"
            exit 1
          fi

      - name: 1 — List CF Pages projects (via REST API for clean JSON)
        id: list
        run: |
          echo "=== Calling CF REST API for clean JSON list ==="
          RESP=$(curl -sS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects")
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "❌ CF API rejected the request:"
            echo "$RESP" | jq '.errors // .'
            exit 1
          fi
          NAMES=$(echo "$RESP" | jq -r '.result[].name')
          echo "=== Projects in this account ==="
          echo "$NAMES"
          # Stash all names for the next step
          echo "all_names<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NAMES"          >> "$GITHUB_OUTPUT"
          echo "EOF"             >> "$GITHUB_OUTPUT"

      - name: 2 — Pick project name
        id: pick
        run: |
          INPUT='${{ github.event.inputs.project_name }}'
          ALL='${{ steps.list.outputs.all_names }}'
          if [ -n "$INPUT" ]; then
            NAME="$INPUT"
            echo "Using override: $NAME"
          else
            # Auto-pick first name matching dchub OR dc-hub
            NAME=$(echo "$ALL" | grep -iE '^(dchub|dc-hub|dc_hub)' | head -1)
            if [ -z "$NAME" ]; then
              # Fall back to ANY name containing dchub/dc-hub
              NAME=$(echo "$ALL" | grep -iE 'dchub|dc-hub|dc_hub' | head -1)
            fi
            if [ -z "$NAME" ]; then
              echo "❌ No project matching 'dchub' found in your account."
              echo "Names available:"
              echo "$ALL"
              echo ""
              echo "Re-run via Run workflow with project_name input set to the right one."
              exit 1
            fi
            echo "Auto-picked: $NAME"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: 3 — Deploy
        run: |
          NAME="${{ steps.pick.outputs.name }}"
          # Deploying with --branch=main created PREVIEW deployments because
          # the project's production branch is not "main" — that left the live
          # domain stale (the worker_version_drift symptom). Look up the real
          # production branch and deploy to it so we hit production.
          PROD_BRANCH=$(curl -sS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$NAME" \
            | jq -r '.result.production_branch // "main"')
          echo "Project: $NAME | production branch: $PROD_BRANCH"
          echo "Deploying dchub-frontend/ → $NAME (branch=$PROD_BRANCH)"
          npx --yes wrangler@latest pages deploy dchub-frontend \
            --project-name="$NAME" \
            --branch="$PROD_BRANCH" \
            --commit-dirty=true

      - name: 4 — Purge CF zone cache for / + any newly-added routes
        # r33-Q+cache-purge (2026-05-21): CF Pages deploys update the
        # Pages project, but the CF ZONE cache (separate layer in front of
        # Pages) was holding the old HTML for ~50+ min on age headers.
        # This caused the 2026-05-21 "new homepage shows old design"
        # incident: deploy was correct, origin served new, but cf-cache-status:HIT
        # with age:3089 meant browsers got the old cached HTML.
        #
        # Phase ZZZZZ-round3 (2026-05-23): also purge any path that became
        # newly-routable in this commit. The cache-poisoning class: a route
        # gets added to _routes.json + _worker.js PHASE_282, but the CF edge
        # has the previous 404 cached for an hour. Purging the explicit
        # paths makes the fix visible within ~30s instead of 60min.
        #
        # Look up the zone for dchub.cloud + purge / specifically.
        if: success()
        run: |
          ZONE_RESP=$(curl -sS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=dchub.cloud")
          ZONE_ID=$(echo "$ZONE_RESP" | jq -r '.result[0].id // ""')
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "::warning::Could not resolve zone ID for dchub.cloud — skipping cache purge"
            echo "$ZONE_RESP" | jq '.errors // .' | head -20
            exit 0
          fi

          # Always-purge: home page (most heavily cached)
          FILES='"https://dchub.cloud/","https://dchub.cloud","https://dchub.cloud/index.html"'

          # Extra-purge: any path added/changed in _routes.json or _worker.js
          # this commit. We diff vs the previous commit on main and extract any
          # bare-path additions from the diff. Splat routes (/foo/*) are
          # skipped — CF only purges exact URLs.
          PREV=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            EXTRA=$(git diff "$PREV"...HEAD -- dchub-frontend/_routes.json dchub-frontend/_worker.js 2>/dev/null \
              | grep -E "^\+" \
              | grep -oE "['\"](/[a-zA-Z0-9_-][a-zA-Z0-9_./?#-]*?)['\"]" \
              | grep -v '\*' \
              | tr -d "'\"" \
              | sort -u \
              | head -30)
            for path in $EXTRA; do
              FILES="$FILES,\"https://dchub.cloud${path}\""
            done
            EXTRA_COUNT=$(echo "$EXTRA" | grep -c . || echo 0)
            if [ "$EXTRA_COUNT" -gt 0 ]; then
              echo "Also purging $EXTRA_COUNT newly-added route(s):"
              echo "$EXTRA" | sed 's/^/  /'
            fi
          fi

          echo "Purging cache for zone $ZONE_ID (dchub.cloud)"
          PURGE_RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -d "{\"files\":[$FILES]}")
          SUCCESS=$(echo "$PURGE_RESP" | jq -r '.success')
          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Cache purged"
          else
            echo "::warning::Cache purge failed:"
            echo "$PURGE_RESP" | jq '.errors // .'
          fi

      - name: 5 — Verify live worker version + cache state
        if: success()
        run: |
          sleep 5
          echo "=== /api/health worker version ==="
          curl -sI https://dchub.cloud/api/health 2>/dev/null | grep -i x-dc-worker-version | tr -d '\r\n'
          echo
          echo "=== / cache-status (should be MISS after purge) ==="
          curl -sI https://dchub.cloud/ 2>/dev/null | grep -iE "cf-cache-status|age:"
          echo
          echo "=== Source declares: $(grep WORKER_VERSION dchub-frontend/_worker.js | head -1) ==="
