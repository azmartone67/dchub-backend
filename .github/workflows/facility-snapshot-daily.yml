name: Facility Count Daily Snapshot
# Phase HHHH (2026-05-16): writes facility_count_snapshots row daily so
# the brain detector check_facility_count_stagnant has 7+ days of
# baseline to compute the delta against. Without this, the detector
# would never fire because there's no historical baseline.
on:
  schedule:
    - cron: '17 5 * * *'   # 05:17 UTC daily — offset from DCPI/news crons
  workflow_dispatch: {}
jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Write daily facility count snapshot
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::error::DCHUB_ADMIN_KEY secret not set"; exit 1; fi
          curl -sS --max-time 30 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub.cloud/api/v1/facilities/snapshot" \
            | python3 -m json.tool
      # Phase MMMM (2026-05-16): also snapshot the brain radar finding
      # count so /transparency sparkline has 14d of baseline. Same cron
      # to avoid sprawl; idempotent UPSERT per day.
      - name: Write daily radar finding snapshot
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          curl -sS --max-time 30 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub.cloud/api/v1/radar/snapshot" \
            | python3 -m json.tool
      # Phase TTTT (2026-05-16): daily citation-hunter probe — asks
      # Claude 5 data-center research questions, tracks DC Hub mention
      # share. Requires ANTHROPIC_API_KEY env on Railway.
      - name: Citation hunter daily probe
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          curl -sS --max-time 120 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub.cloud/api/v1/citations/hunt?queries=5" \
            | python3 -m json.tool || true
      # Phase XXXX (2026-05-16): daily competitor snapshot.
      - name: Competitor intel scan
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          curl -sS --max-time 60 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub.cloud/api/v1/competitors/scan" \
            | python3 -m json.tool || true
      # Phase ZZZZ (2026-05-16): refresh 5 market deep-dives nightly.
      # Rotates through stalest first — full top-100 coverage in ~3 weeks.
      - name: Market deep-dive refresh (5 markets)
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          curl -sS --max-time 120 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub.cloud/api/v1/markets/deep-dive/cron?count=5" \
            | python3 -m json.tool || true
      # Phase HHHHH (2026-05-16): external mention hunter (HN + Reddit).
      - name: External backlink + mention hunt
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          curl -sS --max-time 60 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub.cloud/api/v1/mentions/hunt" \
            | python3 -m json.tool || true
