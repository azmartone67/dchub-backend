name: pre-merge-gauntlet
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: AST parse every .py
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import ast; ast.parse(open('$f').read())" 2>/tmp/err; then
              echo "::error file=$f::syntax error"
              cat /tmp/err
              fail=1
            fi
          done < <(find . -name '*.py' -not -path './.git/*' -not -path './node_modules/*' -not -path './.venv/*')
          exit $fail

  regression-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for merge-base
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch origin/main
        run: git fetch origin main
      - name: Run delta-mode regression lint
        run: python3 scripts/regression_lint.py --mode delta --base origin/main

  smoke-probe:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Probe production endpoints
        run: |
          for path in \
            "/api/v1/health" \
            "/api/energy-discovery/status" \
            "/api/v1/observability/route-audit" \
            "/grid" ; do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://dchub.cloud$path")
            echo "$path -> $S"
          done
