name: pre-merge-gauntlet
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: AST parse every .py
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import ast; ast.parse(open('$f').read())" 2>/tmp/err; then
              echo "::error file=$f::syntax error"
              cat /tmp/err
              fail=1
            fi
          done < <(find . -name '*.py' -not -path './.git/*' -not -path './node_modules/*' -not -path './.venv/*')
          exit $fail

  regression-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need full history for merge-base
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Fetch origin/main
        run: git fetch origin main
      - name: Run delta-mode regression lint
        run: python3 scripts/regression_lint.py --mode delta --base origin/main

  smoke-probe:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Probe production endpoints
        run: |
          for path in \
            "/api/v1/health" \
            "/api/energy-discovery/status" \
            "/api/v1/observability/route-audit" \
            "/grid" ; do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://dchub.cloud$path")
            echo "$path -> $S"
          done

  # Phase PP (2026-05-13): pure-function unit tests on the hot paths
  # that have shipped regressions this week. Tests use source-extraction
  # so they don't need Flask, the DB, or any network — sub-second on CI.
  # Adding more tests over time will shift these from a smoke-screen
  # toward a real safety net; today this covers brain v2 safety,
  # marketing topic picker, schema-aware feed query, MCP arg sanitizer,
  # and the system-loops classifier.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python3 -m pip install pytest
      - name: Run pure-function tests
        run: python3 -m pytest tests/ -v --tb=short
