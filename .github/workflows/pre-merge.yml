name: pre-merge-gauntlet
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: AST parse every .py
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import ast; ast.parse(open('$f').read())" 2>/tmp/err; then
              echo "::error file=$f::syntax error"
              cat /tmp/err
              fail=1
            fi
          done < <(find . -name '*.py' -not -path './.git/*' -not -path './node_modules/*' -not -path './.venv/*')
          exit $fail

  regression-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run regression lint
        run: python3 scripts/regression_lint.py .

  route-shadow-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Snapshot current shadow count from production
        run: |
          set -e
          BASELINE=$(python3 -c "
import requests
try:
    r = requests.get('https://dchub.cloud/api/v1/observability/route-audit',
                     headers={'User-Agent':'Mozilla/5.0 ShadowAudit'}, timeout=15)
    print(r.json().get('data',{}).get('shadowed_count', 999))
except Exception:
    print(999)
")
          echo "baseline_shadow_count=$BASELINE"
          echo "BASELINE_SHADOWS=$BASELINE" >> $GITHUB_ENV
      - name: Lint detects new route registrations
        run: python3 scripts/regression_lint.py .

  smoke-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe production endpoints (sanity, NOT blocking)
        continue-on-error: true
        run: |
          for path in \
            "/api/v1/health" \
            "/api/energy-discovery/status" \
            "/api/v1/observability/route-audit" \
            "/grid" ; do
            S=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://dchub.cloud$path")
            echo "$path -> $S"
            if [ "$S" -ge 500 ]; then
              echo "::warning::$path returned $S (5xx — may be flaky)"
            fi
          done
