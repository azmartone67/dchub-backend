name: weekly-shadow-audit
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1'   # Mondays 12:00 UTC
jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Dump shadows
        run: python3 scripts/dump_shadows.py
      - name: Commit if changed
        run: |
          git config user.email "azmartone@gmail.com"
          git config user.name "Shadow Audit Bot"
          git add docs/SHADOWED-ROUTES.md
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: weekly shadow route inventory refresh"
            git push origin main || true
          fi
