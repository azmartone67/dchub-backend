name: Brain v2 Layer 5 — PR opener (Phase GG)

# Phase GG (2026-05-14): the code-PR brain. Reads high-confidence
# proposals from Layer 5's brain_proposed_code_fixes table, applies
# each to a feature branch, opens a draft PR for human review.
#
# How the loop works:
#   1. Layer 5 cron (separate workflow) generates proposals for chronic
#      stale loops + actionable_backend_issues. Stores in DB.
#   2. THIS workflow runs every 4h. Fetches proposals with confidence
#      ≥ 0.85 that haven't been PR'd yet.
#   3. For each proposal: clone the file, apply search→replace, syntax
#      check, commit on a new branch, push, open a draft PR.
#   4. Calls back to Layer 5 (mark-pr endpoint) so the same proposal
#      isn't picked up next tick.
#   5. PRs are DRAFT — a human reviews + un-drafts + merges. Auto-merge
#      explicitly forbidden by design. Brain proposes, humans dispose.
#
# Required secrets:
#   DCHUB_ADMIN_KEY   X-Admin-Key for /api/v1/brain/proposed-code/*
#   GH_PAT (optional) personal access token if GITHUB_TOKEN can't open
#                      PRs across protected branches; otherwise the
#                      workflow's own GITHUB_TOKEN is used.

on:
  schedule:
    # Every 4 hours, offset by 23 min so it doesn't collide with the
    # brain_learn hourly cron or the dcpi 06:00 UTC cron.
    - cron: '23 */4 * * *'
  workflow_dispatch:
    inputs:
      min_confidence:
        description: 'Minimum proposal confidence to PR (0.0-1.0)'
        required: false
        type: string
        default: '0.85'
      limit:
        description: 'Max proposals to process per run'
        required: false
        type: string
        default: '5'

permissions:
  contents: write
  pull-requests: write

jobs:
  open-prs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'dchub-brain-v2'
          git config user.email 'brain@dchub.cloud'

      - name: Set up Python + pytest (Phase GG#1 test-runner gate)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: |
          pip install --quiet pytest requests psycopg2-binary 2>/dev/null || true
          # Best-effort: install whatever requirements.txt has so the
          # test suite's imports resolve. Don't fail the job if some
          # heavy dep won't install — the pure-function tests/ suite
          # only needs stdlib + a few light packages.
          pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Fetch high-confidence proposals
        id: fetch
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
          MIN_CONF: ${{ inputs.min_confidence || '0.85' }}
          LIMIT: ${{ inputs.limit || '5' }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::error::DCHUB_ADMIN_KEY not set"
            exit 1
          fi
          # Capture BOTH body and HTTP status. A stale/rotated admin key
          # makes pending-pr return 401 with a JSON error body; the old
          # code parsed that as items=[] -> "0 pending" -> exited clean,
          # silently hiding a broken secret for the loop's ENTIRE history.
          # Now we assert on the status and fail LOUD on auth errors.
          HTTP=$(curl -sS --max-time 30 \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -o /tmp/proposals.json -w "%{http_code}" \
            "https://dchub-backend-production.up.railway.app/api/v1/brain/proposed-code/pending-pr?min_confidence=${MIN_CONF}&limit=${LIMIT}")
          echo "pending-pr -> HTTP $HTTP"
          if [ "$HTTP" = "401" ] || [ "$HTTP" = "403" ]; then
            echo "::error::pending-pr returned $HTTP — the DCHUB_ADMIN_KEY GitHub secret is stale/invalid (rotated on Railway?). Re-set it (gh secret set DCHUB_ADMIN_KEY) to match the backend ADMIN_KEY. The PR-opener cannot read proposals until then."
            head -c 300 /tmp/proposals.json; echo
            exit 1
          fi
          if [ "$HTTP" != "200" ]; then
            echo "::error::pending-pr returned HTTP $HTTP (expected 200)"
            head -c 300 /tmp/proposals.json; echo
            exit 1
          fi
          count=$(python3 -c "import json; print(len(json.load(open('/tmp/proposals.json')).get('items', [])))")
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "::notice::Fetched $count pending proposals (min_conf=${MIN_CONF}, http=$HTTP)"
          if [ "$count" = "0" ]; then
            echo "Nothing to do — exiting clean (auth OK, queue genuinely empty)."
          fi

      - name: Apply proposals + open PRs
        if: steps.fetch.outputs.count != '0'
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys, urllib.request

          proposals = json.load(open('/tmp/proposals.json')).get('items', [])
          admin_key = os.environ['ADMIN_KEY']

          for p in proposals:
              pid = p['id']
              loop_name = p.get('loop_name', 'unknown')
              rationale = (p.get('rationale') or '')[:500]
              confidence = p.get('confidence', 0)

              # Phase GG#3 (2026-05-14): multi-file proposals. The
              # endpoint now returns a `changes` array — [{file, search,
              # replace}, ...]. Single-file proposals are a 1-element
              # array. Legacy rows the endpoint synthesizes the array
              # from the old columns. So the opener has ONE code path.
              changes = p.get('changes') or []
              if not changes:
                  # Ultra-defensive fallback for any malformed payload
                  fp = p.get('file_path', '')
                  if fp:
                      changes = [{
                          "file": fp,
                          "search": p.get('search_text', ''),
                          "replace": p.get('replace_text', ''),
                      }]
              file_path = changes[0].get('file', '') if changes else ''

              print(f"\n=== Proposal #{pid} for {loop_name} ===")
              print(f"  files={[c.get('file') for c in changes]}  conf={confidence}")

              if not changes:
                  print(f"  SKIP — no changes in proposal")
                  continue

              # 1+2. Apply EVERY change. Track originals so we can roll
              # back ALL of them if any single change fails — never
              # leave the working tree half-patched.
              originals = {}        # file → original content
              applied_ok = True
              fail_reason = ""
              for ch in changes:
                  cf = ch.get('file', '')
                  cs = ch.get('search', '')
                  cr = ch.get('replace', '')
                  if not os.path.exists(cf):
                      applied_ok = False
                      fail_reason = f"file not found: {cf}"
                      break
                  with open(cf) as f:
                      cur_content = f.read()
                  if cf not in originals:
                      originals[cf] = cur_content
                  if cs not in cur_content:
                      applied_ok = False
                      fail_reason = f"search text not found in {cf} (file changed since proposal)"
                      break
                  with open(cf, 'w') as f:
                      f.write(cur_content.replace(cs, cr, 1))

              def _revert_all():
                  for of, oc in originals.items():
                      with open(of, 'w') as f:
                          f.write(oc)

              if not applied_ok:
                  print(f"  SKIP — {fail_reason}")
                  _revert_all()
                  continue

              # 3. Syntax check EVERY changed .py file
              syntax_ok = True
              for cf in originals:
                  if cf.endswith('.py'):
                      rc = subprocess.run(
                          ['python3', '-c', f'import ast; ast.parse(open({cf!r}).read())'],
                          capture_output=True)
                      if rc.returncode != 0:
                          print(f"  SKIP — syntax check failed on {cf}: {rc.stderr.decode()[:200]}")
                          syntax_ok = False
                          break
              if not syntax_ok:
                  _revert_all()
                  continue

              # 3b. Phase GG#1 (2026-05-14): TEST-RUNNER GATE.
              # Run the pure-function test suite with the patch applied.
              # Before this gate, a syntactically-valid-but-wrong proposal
              # could become a draft PR with no signal about whether it
              # actually breaks anything. Now: pytest runs, and the
              # result is threaded into the PR body + a label so the
              # human reviewer sees "brain proposed this AND tests pass"
              # vs "...AND tests FAIL — here's the output".
              #
              # We do NOT skip on failure — a failing-test proposal is
              # still useful signal ("the brain spotted something but
              # its fix is wrong"). It just gets labeled tests-failing
              # so the human knows not to merge as-is.
              # Phase GG#3: run the test gate if ANY changed file is Python.
              _any_python = any(cf.endswith('.py') for cf in originals)
              test_status = "not_run"
              test_output = ""
              if _any_python:
                  print(f"  Running test suite with patch applied...")
                  try:
                      tr = subprocess.run(
                          ['python3', '-m', 'pytest', 'tests/', '-q',
                           '--no-header', '-x', '-p', 'no:cacheprovider'],
                          capture_output=True, text=True, timeout=300,
                      )
                      test_output = (tr.stdout + tr.stderr)[-1500:]
                      if tr.returncode == 0:
                          test_status = "pass"
                          print(f"  ✓ tests pass")
                      elif tr.returncode == 5:
                          # pytest exit 5 = no tests collected. Treat as
                          # "no coverage" not "fail" — don't block the PR.
                          test_status = "skipped_no_tests"
                          print(f"  ⏭ no tests collected")
                      else:
                          test_status = "fail"
                          print(f"  ✗ tests FAIL (exit {tr.returncode}) — "
                                f"PR will be labeled tests-failing")
                  except subprocess.TimeoutExpired:
                      test_status = "timeout"
                      test_output = "pytest exceeded 300s — suite too slow or hung"
                      print(f"  ⚠ test run timed out")
              else:
                  test_status = "skipped_non_python"

              # 4. Create branch, commit, push — stage EVERY changed file
              branch = f"brain-v2/auto-{loop_name}-{pid}"
              subprocess.run(['git', 'checkout', '-b', branch], check=True)
              for cf in originals:
                  subprocess.run(['git', 'add', cf], check=True)
              _files_line = ", ".join(sorted(originals.keys()))
              _test_line = {
                  "pass": "Test suite: PASS (pytest tests/ green with patch applied).",
                  "fail": "Test suite: FAIL — review the test output in the PR body before merging.",
                  "timeout": "Test suite: TIMEOUT — pytest exceeded 300s.",
                  "skipped_no_tests": "Test suite: no tests collected.",
                  "skipped_non_python": "Test suite: skipped (non-Python file).",
                  "not_run": "Test suite: not run.",
              }.get(test_status, "Test suite: unknown.")
              _files_count_note = (
                  f"{len(originals)} file(s): {_files_line}"
              )
              commit_msg = (
                  f"brain-v2 layer5: proposed fix for {loop_name}\n\n"
                  f"Auto-proposed by Brain v2 Layer 5 (proposal #{pid}, "
                  f"confidence {confidence:.2f}).\n\n"
                  f"Changes: {_files_count_note}\n\n"
                  f"Rationale: {rationale}\n\n"
                  f"{_test_line}\n\n"
                  f"This PR is a DRAFT. A human must review the diff + "
                  f"un-draft + merge. No auto-merge by design.\n\n"
                  f"Generated by: brain-layer5-pr-opener.yml"
              )
              subprocess.run(['git', 'commit', '-m', commit_msg], check=True)
              subprocess.run(['git', 'push', '-u', 'origin', branch], check=True)

              # 5. Open draft PR
              _test_badge = {
                  "pass": "✅ **Tests PASS** — `pytest tests/` green with this patch applied.",
                  "fail": "❌ **Tests FAIL** — this proposal breaks the suite. Do NOT merge as-is; the brain spotted a real issue but its fix is wrong. See output below.",
                  "timeout": "⚠️ **Tests TIMED OUT** (>300s). Review manually.",
                  "skipped_no_tests": "⏭️ No tests collected for this change.",
                  "skipped_non_python": "⏭️ Tests skipped (non-Python file).",
                  "not_run": "⚠️ Tests not run.",
              }.get(test_status, "⚠️ Test status unknown.")
              _test_block = ""
              if test_status in ("fail", "timeout") and test_output:
                  _test_block = f"\n### Test output (tail)\n```\n{test_output}\n```\n"
              # Phase GG#3: render every change in the PR body, not just one.
              _changes_md = ""
              for _i, _ch in enumerate(changes, 1):
                  _cf = _ch.get('file', '?')
                  _cs = (_ch.get('search') or '')[:400]
                  _cr = (_ch.get('replace') or '')[:400]
                  _changes_md += (
                      f"\n**Change {_i}/{len(changes)} — `{_cf}`**\n"
                      f"```\nSEARCH:\n{_cs}\n\nREPLACE:\n{_cr}\n```\n"
                  )
              _multi_note = (
                  f" (multi-file: {len(changes)} files)" if len(changes) > 1 else ""
              )
              pr_body = (
                  f"## Brain v2 Layer 5 — proposed fix{_multi_note}\n\n"
                  f"**Loop / issue:** `{loop_name}`\n"
                  f"**Files changed:** `{_files_line}`\n"
                  f"**Confidence:** {confidence:.2f}\n\n"
                  f"{_test_badge}\n"
                  f"{_test_block}\n"
                  f"### Rationale\n{rationale}\n\n"
                  f"### What changes{_changes_md}\n"
                  f"### Provenance\n"
                  f"- Proposal ID: {pid}\n"
                  f"- Auto-opened by brain-layer5-pr-opener.yml\n"
                  f"- This is a DRAFT. Review the diff, un-draft, then merge.\n"
                  f"- Auto-merge explicitly disabled — humans are the gate.\n"
              )
              # Write body to temp file (GH CLI handles multiline this way)
              with open('/tmp/pr_body.md', 'w') as f:
                  f.write(pr_body)
              # Phase GG#1: label tests-failing proposals so the human
              # reviewer can filter them out at a glance.
              _labels = ['autonomous-brain-layer5']
              if test_status == "fail":
                  _labels.append('tests-failing')
              elif test_status == "pass":
                  _labels.append('tests-passing')
              _label_args = []
              for _lb in _labels:
                  _label_args += ['--label', _lb]
              pr_result = subprocess.run([
                  'gh', 'pr', 'create',
                  '--draft',
                  '--title', f"brain-v2: proposed fix for {loop_name}",
                  '--body-file', '/tmp/pr_body.md',
              ] + _label_args, capture_output=True, text=True)
              if pr_result.returncode != 0:
                  print(f"  PR_CREATE_FAILED: {pr_result.stderr[:300]}")
                  # Roll back the branch checkout to main
                  subprocess.run(['git', 'checkout', 'main'], check=False)
                  continue
              pr_url = pr_result.stdout.strip()
              print(f"  ✓ PR opened: {pr_url}")

              # 6. Mark proposal as PR'd in the brain table
              req_url = (f"https://dchub-backend-production.up.railway.app"
                         f"/api/v1/brain/proposed-code/{pid}/mark-pr")
              try:
                  req = urllib.request.Request(
                      req_url,
                      data=json.dumps({"pr_url": pr_url}).encode(),
                      headers={"X-Admin-Key": admin_key, "Content-Type": "application/json"},
                      method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=15) as r:
                      pass  # success
                  print(f"  ✓ marked proposal #{pid} as PR'd in brain DB")
              except Exception as e:
                  print(f"  WARNING: mark-pr callback failed: {e}")
                  # Not fatal — PR is opened, this just means it may
                  # get re-selected on next tick. Idempotent: next run's
                  # branch name collides → push fails → workflow skips.

              # Return to main for next iteration
              subprocess.run(['git', 'checkout', 'main'], check=True)
          PYEOF
