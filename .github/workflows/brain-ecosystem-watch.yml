name: Brain Ecosystem Watch (Daily MCP-registry probe)

# r46 (2026-05-25): Watches Smithery / Glama / mcp.so for our presence
# + competitive entries. Daily probe → DB → L23 audit reads via the
# new ecosystem_position dim. Out-of-codebase competitive intel becomes
# in-loop signal.
#
# Daily at 06:43 UTC — off-cycle from other crons.

on:
  schedule:
    # r56 (2026-05-25): bumped from once daily to every 6 hours.
    # User report: /ecosystem stale + targets_known=0 → cron never
    # produced data. Quad-fires give us 4 chances per day to populate
    # the watch table even if registry probes 403 intermittently.
    - cron: '43 6,12,18,0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  BASE: https://dchub-backend-production.up.railway.app

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe registries
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "${ADMIN_KEY:-}" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping"
            exit 0
          fi
          # r56 (2026-05-25): capture http_code separately so silent
          # failures (admin-key drift, endpoint moved, Railway down)
          # surface as ::error:: in GH Actions logs instead of "ok"
          # confusion.
          http_code=$(curl -sS --max-time 60 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -o /tmp/eco.body -w "%{http_code}" \
            "$BASE/api/v1/brain/ecosystem/watch" || echo "000")
          body=$(cat /tmp/eco.body 2>/dev/null || echo "{}")
          echo "HTTP $http_code · body (first 2500 chars):"
          echo "$body" | head -c 2500
          echo
          if [ "$http_code" = "401" ] || [ "$http_code" = "403" ]; then
            echo "::error::Ecosystem watch returned $http_code — DCHUB_ADMIN_KEY drift"
            exit 1
          fi
          if [ "$http_code" != "200" ]; then
            echo "::warning::Ecosystem watch returned $http_code — endpoint may have moved"
            exit 0
          fi
          python3 - <<PY
          import json
          try:
              d = json.loads("""$body""")
              tc = d.get('targets_count', 0)
              wp = d.get('we_present_count', 0)
              cs = d.get('competition_seen_count', 0)
              print(f"::notice::Ecosystem watch: {tc} targets probed, we present in {wp}, competition in {cs}")
          except Exception as e:
              print(f"::warning::ecosystem parse: {e}")
          PY

      - name: Warm competitive moat radar
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "${ADMIN_KEY:-}" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping competitive warm"
            exit 0
          fi
          # Keep the competitive moat radar cache hot 24x7. The probe TTL is
          # 6h == this cron's cadence, so the agent-facing /positioning
          # endpoint is virtually always warm. /refresh returns immediately;
          # the actual probes run in a daemon thread on the backend (the
          # request path never blocks — 1-replica worker safety).
          code=$(curl -sS --max-time 30 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -o /tmp/ci.body -w "%{http_code}" \
            "$BASE/api/v1/competitive/refresh" || echo "000")
          echo "competitive/refresh -> HTTP $code · $(head -c 300 /tmp/ci.body 2>/dev/null)"
          if [ "$code" = "401" ] || [ "$code" = "403" ]; then
            echo "::error::competitive/refresh $code — DCHUB_ADMIN_KEY drift"
            exit 1
          fi
