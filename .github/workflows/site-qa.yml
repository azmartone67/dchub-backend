name: site-qa

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger QA run
        id: run
        run: |
          RESPONSE=$(curl -sS --max-time 90 -X POST \
            https://dchub-backend-production.up.railway.app/api/v1/qa/run)
          echo "$RESPONSE" | head -c 2000
          PASSED=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('passed', 0))" 2>/dev/null || echo 0)
          FAILED=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('failed', 0))" 2>/dev/null || echo 0)
          P0=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('p0_failures', [])))" 2>/dev/null || echo 0)
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "p0=$P0" >> $GITHUB_OUTPUT
          echo "::notice title=Site QA::passed=$PASSED failed=$FAILED p0_failures=$P0"

      - name: Open issue if P0 regressed
        if: steps.run.outputs.p0 != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = `🚨 P0 site QA regression detected — ${new Date().toISOString()}`;
            const resp = await fetch(
              'https://dchub-backend-production.up.railway.app/api/v1/qa/regressions'
            ).then(r => r.json());
            const body = `## P0 regressions detected\n\n` +
              resp.alerts.filter(a => a.severity === 'p0' && !a.resolved_at).map(a =>
                `- **${a.test_name}** (${a.consecutive_failures}x failures)\n` +
                `  - ${a.message}\n` +
                `  - Proposed fix: ${a.proposed_fix || '(none)'}\n`
              ).join('\n') +
              `\n\nDashboard: https://dchub.cloud/api/v1/qa/dashboard`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['p0', 'self-heal', 'site-qa']
            });
