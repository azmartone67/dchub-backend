name: Syntax Check
on:
  push:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check critical files
        run: |
          python -m py_compile main.py
          python -m py_compile energy_auto_discovery.py
          echo "✅ No syntax errors"
