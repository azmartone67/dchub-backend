# Phase FF+25-followup-r9 (2026-05-20) — Brain Inspector cron.
# Runs every 6 hours. Reads every surface, asks Opus 4.7 to write a
# Markdown brief, persists it. Public read at /brain/brief.

name: Brain Inspector — proactive scan

on:
  schedule:
    # Every 6 hours at :07 past the hour (offset from other crons so
    # we don't dogpile the DB)
    - cron: '7 */6 * * *'
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe deploy readiness
        run: |
          # Phase r24: probe-first pattern. Poll the endpoint until it
          # returns 200/401/403 (i.e. the route IS deployed) before
          # firing the actual call. 404 = deploy lag, retry. Caps at
          # 6 attempts × 30s = 3 min max wait, then fails the job
          # rather than silently misfiring.
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://dchub.cloud/api/v1/brain/models" \
              --max-time 10)
            if [ "$code" = "200" ]; then
              echo "deploy ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i: code=$code, waiting 30s…"
            sleep 30
          done
          echo "::error::Deploy probe failed after 6 attempts — endpoint not live"
          exit 1

      - name: Trigger Inspector
        id: gen
        run: |
          set -eo pipefail
          ADMIN_KEY="${{ secrets.DCHUB_ADMIN_KEY }}"
          if [ -z "$ADMIN_KEY" ]; then
            echo "::error::DCHUB_ADMIN_KEY secret not set"
            exit 1
          fi
          RESP=$(curl -sS -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -H "User-Agent: DCHub-Inspector-Cron/1.0" \
            "https://dchub.cloud/api/v1/brain/brief/generate")
          BRIEF_ID=$(echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('id') or '')
          ")
          echo "brief_id=$BRIEF_ID" >> "$GITHUB_OUTPUT"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          ok = d.get('ok')
          if not ok:
            print(f'::warning::Inspector returned: {d.get(\"error\")}')
            print(json.dumps(d, indent=2)[:600])
            sys.exit(0 if d.get('error') == 'ANTHROPIC_API_KEY not set' else 1)
          print(f'### Brain Brief #{d.get(\"id\")}')
          print()
          print(f'- Model: {d.get(\"model\")}')
          print(f'- Tokens: {d.get(\"tokens_in\")} in / {d.get(\"tokens_out\")} out')
          print(f'- Duration: {d.get(\"duration_ms\")}ms')
          print(f'- Healthy: {d.get(\"healthy_count\")} · Degrading: {d.get(\"degrading_count\")} · Attention: {d.get(\"attention_count\")}')
          print()
          print(f'> {d.get(\"summary\", \"\")[:280]}')
          print()
          print(f'Full brief: https://dchub.cloud/brain/brief')
          " >> "$GITHUB_STEP_SUMMARY"

      # ── Apply the Inspector's recommendations to the autopilot.
      # Inspector recommendations fire through the same rate-limit
      # path as autonomous detector findings — Inspector can't override
      # safety. Recommendations that are already in cooldown will be
      # logged as rate_limited and not actually executed.
      - name: Apply recommendations
        if: steps.gen.outputs.brief_id != ''
        run: |
          set -eo pipefail
          ADMIN_KEY="${{ secrets.DCHUB_ADMIN_KEY }}"
          BID="${{ steps.gen.outputs.brief_id }}"
          curl -sS -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -H "User-Agent: DCHub-Inspector-Cron/1.0" \
            "https://dchub.cloud/api/v1/brain/brief/${BID}/apply" \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'### Recommendations applied')
          print()
          print(f'- Found: {d.get(\"recommendations_found\", 0)}')
          print(f'- Fired: {d.get(\"fired\", 0)}')
          for r in (d.get('results') or [])[:10]:
              ok = '✓' if r.get('ok') else '✗'
              print(f'  - {ok} {r.get(\"pattern\")} · http {r.get(\"http_code\")}')
          " >> "$GITHUB_STEP_SUMMARY"

      # ── Hand any code-fix candidates to L22 so it can draft PRs.
      # L22 has its own safety whitelist; only 3 recipes auto-PR.
      - name: Draft PRs via L22
        if: steps.gen.outputs.brief_id != ''
        continue-on-error: true
        run: |
          set -eo pipefail
          ADMIN_KEY="${{ secrets.DCHUB_ADMIN_KEY }}"
          BID="${{ steps.gen.outputs.brief_id }}"
          curl -sS -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -H "User-Agent: DCHub-Inspector-Cron/1.0" \
            "https://dchub.cloud/api/v1/brain/brief/${BID}/draft-prs" \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          n = d.get('candidates_found', 0)
          print(f'### Code-fix candidates: {n}')
          for c in (d.get('candidates') or [])[:10]:
              print(f'- recipe={c.get(\"recipe\")} target={c.get(\"target\")}')
          if d.get('l22_status'):
              print(f'- L22 returned HTTP {d[\"l22_status\"]}')
          " >> "$GITHUB_STEP_SUMMARY"
