name: Heartbeat Auto-Refresh
on:
  schedule:
    # Phase QA-sweep (2026-05-16): offset by 3 minutes so we don't
    # collide with auto-rollback.yml at the same `*/15 * * * *`
    # boundary (consistency radar was flagging the collision). Now
    # fires at :03, :18, :33, :48 — still 15-min cadence, no overlap.
    - cron: '3-59/15 * * * *'
  workflow_dispatch: {}
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sS -X POST "https://dchub.cloud/api/v1/heartbeat/auto?batch=250" \
            | python3 -m json.tool
