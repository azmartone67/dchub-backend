name: Heartbeat Auto-Refresh
on:
  schedule:
    # Phase QA-sweep (2026-05-16): offset by 3 minutes so we don't
    # collide with auto-rollback.yml at the same `*/15 * * * *`
    # boundary (consistency radar was flagging the collision).
    # Phase ZZZZ-cron-stagger (2026-05-18): shifted :03→:08 to break
    # collision with data-pulse.yml which ALSO ran on `3-59/15`.
    # Now fires at :08, :23, :38, :53 — 15-min cadence, no overlap.
    - cron: '8-59/15 * * * *'
  workflow_dispatch: {}
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sS -X POST "https://dchub.cloud/api/v1/heartbeat/auto?batch=250" \
            | python3 -m json.tool
      # Phase FFFFF (2026-05-16): also verify pending autopilot outcomes
      # on every heartbeat tick. Cheap (small SQL) and closes the
      # 'did the action actually succeed?' blind spot every 15min.
      - name: Verify pending autopilot outcomes
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then exit 0; fi
          curl -sS --max-time 30 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub.cloud/api/v1/brain/autopilot/verify-pending" \
            | python3 -m json.tool || true
