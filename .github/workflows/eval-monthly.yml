name: Monthly MCP Tool-Description Eval
on:
  schedule:
    - cron: '0 13 1 * *'   # 1st of month, 13:00 UTC
  workflow_dispatch:
jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - name: Install deps
        run: pip install anthropic requests
      - name: Run golden eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DCHUB_API_KEY: ${{ secrets.DCHUB_API_KEY }}
          DCHUB_MCP_URL: ${{ secrets.DCHUB_MCP_URL }}
        run: |
          if [ -f eval_runner.py ] && [ -f dchub-mcp-golden-eval.jsonl ]; then
            python eval_runner.py --golden dchub-mcp-golden-eval.jsonl --report eval-report.md
          else
            echo "::warning::eval_runner.py or golden file not in repo — commit them to activate this job"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report-${{ github.run_number }}
          path: eval-report.md
          if-no-files-found: ignore

      - name: Notify on workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create -R azmartone67/dchub-backend \
            --title "[workflow-failed] ${{ github.workflow }} on $(date -u +%Y-%m-%d_%H:%M)" \
            --body "Workflow run ${{ github.run_id }} failed. View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label workflow-failure || true
