name: Backfill facility states (k-NN)

# Triggers the admin endpoint on Railway (which HAS DATABASE_URL). GitHub
# Actions has NO DB secret, so we can't run the psycopg2 script here directly —
# same reason eia-pricing-ingest.yml POSTs a Railway endpoint. Dry-run by
# default; set apply=true to persist.

'on':
  workflow_dispatch:
    inputs:
      apply:
        description: 'Write changes? false = dry-run (default), true = persist'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger backfill on Railway
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::error::DCHUB_ADMIN_KEY secret not set"
            exit 1
          fi
          BASE="https://dchub-backend-production.up.railway.app"
          if [ "${{ inputs.apply }}" = "true" ]; then
            echo "::notice::APPLY mode (writing)"
            QS=""
          else
            echo "::notice::DRY-RUN mode (no writes)"
            QS="?dry=1"
          fi
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "$BASE/api/v1/admin/backfill-facility-states$QS")
          echo "HTTP $code"; cat /tmp/resp.json
          if [ "$code" != "200" ]; then exit 1; fi
