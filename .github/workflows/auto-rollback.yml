name: auto-rollback
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min
jobs:
  check-and-rollback:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Probe /api/v1/health
        id: probe
        run: |
          set +e
          BODY=$(curl -s --max-time 12 https://dchub.cloud/api/v1/health)
          SCORE=$(echo "$BODY" | python3 -c 'import sys,json;d=json.loads(sys.stdin.read() or "{}");print(d.get("data",{}).get("score","-1"))' 2>/dev/null || echo -1)
          ROUTES=$(curl -s --max-time 12 https://dchub.cloud/api/v1/observability/route-audit | python3 -c 'import sys,json;d=json.loads(sys.stdin.read() or "{}");print(d.get("data",{}).get("shadowed_count",0))' 2>/dev/null || echo 0)
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "shadows=$ROUTES" >> $GITHUB_OUTPUT
          echo "Health score: $SCORE | Shadowed routes: $ROUTES"
      - name: Decide
        id: decide
        run: |
          SCORE='${{ steps.probe.outputs.score }}'
          SHADOWS='${{ steps.probe.outputs.shadows }}'
          # Rollback if score < 70 OR shadowed_count > 0
          if [ -z "$SCORE" ] || [ "$SCORE" = "-1" ]; then
            echo "rollback=false" >> $GITHUB_OUTPUT
            echo "  unable to read score — skipping"
            exit 0
          fi
          if [ "$(printf '%.0f' $SCORE 2>/dev/null || echo 100)" -lt 70 ] || [ "$SHADOWS" -gt 0 ]; then
            echo "rollback=true" >> $GITHUB_OUTPUT
          else
            echo "rollback=false" >> $GITHUB_OUTPUT
          fi
      - name: Auto-revert HEAD
        if: steps.decide.outputs.rollback == 'true'
        run: |
          git config user.email "azmartone@gmail.com"
          git config user.name "Auto-Rollback Bot"
          git revert --no-edit HEAD || { echo "revert failed"; exit 1; }
          git push origin main
      - name: Open issue
        if: steps.decide.outputs.rollback == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `auto-rollback: HEAD reverted (score=${{ steps.probe.outputs.score }}, shadows=${{ steps.probe.outputs.shadows }})`,
              body: 'Health score dropped below 70 or a shadowed route was detected. The latest commit on main has been auto-reverted.',
              labels: ['auto-rollback','phase22']
            })
