name: auto-repair-on-smoke-fail
on:
  workflow_run:
    workflows: ["Post-Deploy Smoke Test"]
    types: [completed]

jobs:
  repair:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Download smoke log
        run: |
          mkdir -p /tmp/smoke
          gh run download ${{ github.event.workflow_run.id }} -D /tmp/smoke || true
          find /tmp/smoke -type f | head -10
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Identify failed endpoint from log
        id: identify
        run: |
          set +e
          FAILED=$(grep -hoE '❌ [a-z_]+' /tmp/smoke/*.txt 2>/dev/null | head -1 | sed 's/❌ //')
          echo "failed_endpoint=$FAILED" >> $GITHUB_OUTPUT
          echo "Identified failed endpoint: $FAILED"

      - name: Run auto-repair patterns
        run: |
          python3 scripts/auto_repair.py --all || true
          if [ -n "${{ steps.identify.outputs.failed_endpoint }}" ]; then
            python3 scripts/auto_repair.py --endpoint-5xx "${{ steps.identify.outputs.failed_endpoint }}" || true
          fi

      - name: Open PR if changes
        run: |
          if git diff --quiet; then
            echo "no repairs to apply"
            exit 0
          fi
          BRANCH="auto-repair-$(date +%Y%m%d-%H%M%S)"
          git config user.email "azmartone@gmail.com"
          git config user.name "Auto-Repair Bot"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "auto-repair: pattern-based fix for smoke failure ${{ github.event.workflow_run.id }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "[auto-repair] proposed fix for smoke failure" \
            --body "Generated by auto-repair-on-smoke-fail.yml in response to smoke test run ${{ github.event.workflow_run.html_url }}.

Failed endpoint: ${{ steps.identify.outputs.failed_endpoint }}

Patterns applied: see scripts/auto_repair.py.

**REVIEW BEFORE MERGE.** This is a proposal, not an automatic fix. The pre-merge gauntlet must pass before merge." \
            --label "auto-repair" \
            --base main || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
