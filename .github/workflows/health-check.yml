name: Health Check
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://dchub.cloud/api/health)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check FAILED — got $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"
