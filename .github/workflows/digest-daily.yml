name: Daily Digest
on:
  schedule:
    # Phase VV-1 (2026-05-15): offset by 15min to avoid Mon 14:00 collision.
    - cron: '15 14 * * 1-5'  # Mon-Fri 14:15 UTC (was 14:00)
  workflow_dispatch: {}
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sS -X POST "https://dchub.cloud/api/v1/digest/send?dry=0" \
            -H "X-Admin-Key: ${{ secrets.DCHUB_ADMIN_KEY }}" \
            | python3 -m json.tool
