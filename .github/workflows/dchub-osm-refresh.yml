name: DC Hub OSM Refresh
# Phase 13: refresh substations/power_plants/transmission/pipelines from OSM
# Overpass weekly. Sunday 02:00 UTC (Overpass least loaded).
on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RAILWAY: https://dchub-backend-production.up.railway.app
      INTERNAL_KEY: ${{ secrets.DCHUB_INTERNAL_KEY }}
    steps:
      - name: Default INTERNAL_KEY if secret missing
        run: |
          if [ -z "$INTERNAL_KEY" ]; then
            echo "INTERNAL_KEY=dchub-internal-sync-2026" >> $GITHUB_ENV
          fi

      - name: Snapshot baseline
        run: |
          echo "=== BEFORE freshness ==="
          curl -sf "https://dchub.cloud/api/v1/data-freshness?_t=$(date +%s)" \
            | python3 -m json.tool | grep -E '"latest"|"source"|"rows"' | head -25

      - name: Fire OSM loaders sequentially
        run: |
          for ep in load-osm-substations-live load-osm-power-plants-live load-osm-transmission-live load-osm-pipelines-live; do
            echo ""
            echo "→ Firing $ep"
            curl -sfS --max-time 15 -X POST "$RAILWAY/api/admin/$ep" \
              -H "X-Internal-Key: $INTERNAL_KEY" -H "Content-Type: application/json" \
              | python3 -m json.tool || echo "(non-200)"
            sleep 480
          done

      - name: Final loader-status
        run: |
          curl -sf "$RAILWAY/api/admin/loader-status" \
            -H "X-Internal-Key: $INTERNAL_KEY" \
            | python3 -m json.tool | head -100

      - name: AFTER freshness
        run: |
          curl -sf "https://dchub.cloud/api/v1/data-freshness?_t=$(date +%s)" \
            | python3 -m json.tool | grep -E '"latest"|"source"|"rows"' | head -25

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create -R azmartone67/dchub-backend \
            --title "[OSM refresh failed] $(date -u +%Y-%m-%d)" \
            --body "OSM refresh workflow failed. Investigate Railway loader-status." \
            --label watchdog || true
