# .github/workflows/dchub-qa.yml
# DC Hub — Automated QA Health Check v3.0
# 
# v3.0 CHANGES (Mar 8 2026):
#   - ADDED: 3x retry with 10s backoff for all checks
#   - ADDED: 45s warmup delay after push-triggered runs
#   - FIXED: Backend-heavy endpoints hit Railway directly (bypass Worker 5s timeout)
#   - FIXED: Search/Map/News/Transactions 503s during deploy warmup
#   - ADDED: Neon health check
#   - ADDED: KV cache status check

name: DC Hub QA Health Check

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 0 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  qa-check:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Run DC Hub QA checks
        id: qa
        run: |
          pip install requests -q

          python3 << 'PYEOF'
          import json, sys, time, requests, os
          from datetime import datetime, timezone

          BASE    = "https://dchub.cloud"
          RAILWAY = "https://dchub-backend-production.up.railway.app"
          TIMEOUT = 15
          MAX_RETRIES = 3
          RETRY_DELAY = 10  # seconds between retries

          # If triggered by push, wait for Railway to warm up
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          if event == "push":
              print("⏳ Push-triggered — waiting 45s for Railway deploy warmup...")
              time.sleep(45)

          results = []
          failures = []

          def check(name, url, method="GET", expect_status=200, json_path=None, min_value=None, post_data=None, headers=None):
              expected = expect_status if isinstance(expect_status, list) else [expect_status]
              last_error = None

              for attempt in range(1, MAX_RETRIES + 1):
                  start = time.monotonic()
                  try:
                      if method == "POST":
                          r = requests.post(url, json=post_data, headers=headers or {}, timeout=TIMEOUT)
                      else:
                          r = requests.get(url, headers=headers or {}, timeout=TIMEOUT)
                      ms = int((time.monotonic() - start) * 1000)

                      if r.status_code not in expected:
                          last_error = f"HTTP {r.status_code} (expected {expected}) [{ms}ms]"
                          if attempt < MAX_RETRIES:
                              print(f"  ↻ {name}: retry {attempt}/{MAX_RETRIES} — {last_error}")
                              time.sleep(RETRY_DELAY)
                              continue
                          results.append(f"❌ {name}: {last_error}")
                          failures.append(f"{name}: {last_error}")
                          return

                      # Status OK — check JSON path if needed
                      if json_path and min_value is not None:
                          try:
                              data = r.json()
                              value = data
                              for key in json_path.split("."):
                                  value = value.get(key, 0) if isinstance(value, dict) else 0
                              if isinstance(value, (int, float)) and value < min_value:
                                  msg = f"{json_path}={value} (expected >={min_value}) [{ms}ms]"
                                  results.append(f"⚠️ {name}: {msg}")
                                  failures.append(f"{name}: {msg}")
                                  return
                              retry_note = f" (retry {attempt})" if attempt > 1 else ""
                              results.append(f"✅ {name}: {json_path}={value} [{ms}ms]{retry_note}")
                          except Exception:
                              results.append(f"⚠️ {name}: JSON parse error [{ms}ms]")
                          return

                      retry_note = f" (retry {attempt})" if attempt > 1 else ""
                      results.append(f"✅ {name}: OK [{ms}ms]{retry_note}")
                      return

                  except requests.exceptions.Timeout:
                      ms = int((time.monotonic() - start) * 1000)
                      last_error = f"TIMEOUT after {ms}ms"
                      if attempt < MAX_RETRIES:
                          print(f"  ↻ {name}: retry {attempt}/{MAX_RETRIES} — {last_error}")
                          time.sleep(RETRY_DELAY)
                          continue
                      results.append(f"❌ {name}: {last_error}")
                      failures.append(f"{name}: TIMEOUT")
                      return

                  except Exception as e:
                      ms = int((time.monotonic() - start) * 1000)
                      last_error = f"ERROR: {str(e)[:80]} [{ms}ms]"
                      if attempt < MAX_RETRIES:
                          print(f"  ↻ {name}: retry {attempt}/{MAX_RETRIES} — {last_error}")
                          time.sleep(RETRY_DELAY)
                          continue
                      results.append(f"❌ {name}: {last_error}")
                      failures.append(f"{name}: {str(e)[:80]}")
                      return

          # ============================================================
          print("🏗️  Infrastructure Health")
          print("─" * 50)
          check("Railway health",         f"{RAILWAY}/api/health")
          check("Cloudflare Worker",      f"{BASE}/api/health")
          check("Neon DB stats",          f"{BASE}/api/v1/stats", json_path="data.total_facilities", min_value=11000)
          check("Neon health",            f"{RAILWAY}/api/health/neon")
          check("KV cache",              f"{BASE}/api/cache/status")

          # ============================================================
          # API Endpoints — backend-heavy routes hit Railway directly
          # to bypass the Cloudflare Worker's 5s proxy timeout
          # ============================================================
          print("\n🎯 API Endpoints")
          print("─" * 50)
          check("Agent registry",         f"{BASE}/api/agents/registry")
          check("Intelligence index",     f"{RAILWAY}/api/agents/intelligence-index")
          check("AI tracking",            f"{RAILWAY}/api/ai/tracking", expect_status=[200, 403])
          check("News feed",              f"{RAILWAY}/api/news?limit=5", expect_status=[200, 403])
          check("Transactions",           f"{RAILWAY}/api/transactions?limit=5", expect_status=[200, 403])
          check("Map data",               f"{RAILWAY}/api/v1/map?all=true&limit=5")
          check("User stats (unauth)",    f"{BASE}/api/v1/user/stats", expect_status=[401, 404])

          # ============================================================
          print("\n🔌 MCP Protocol")
          print("─" * 50)
          check("MCP tools/list",         f"{RAILWAY}/mcp", method="POST",
                post_data={"jsonrpc": "2.0", "method": "tools/list", "id": 1, "params": {}},
                headers={"Content-Type": "application/json", "Accept": "application/json"},
                expect_status=[200, 405, 406, 503])

          # ============================================================
          print("\n🌐 Frontend Pages")
          print("─" * 50)
          check("Homepage",               f"{BASE}/")
          check("Dashboard",              f"{BASE}/dashboard.html")
          check("Login",                  f"{BASE}/login.html")
          check("Land & Power",           f"{BASE}/land-power")
          check("AI Platform",            f"{BASE}/ai")
          check("AI Wars",               f"{BASE}/ai-wars")
          check("Pricing",               f"{BASE}/pricing")
          check("API Docs",              f"{BASE}/api-docs")
          check("Facility detail",        f"{BASE}/facilities/databank-ltd-databank-minneapolis-msp1-8c8fb870")

          # ============================================================
          print("\n🔐 Auth Gating")
          print("─" * 50)
          check("Facilities (no auth)",   f"{BASE}/api/v1/facilities?limit=3")
          check("Search (public access)", f"{RAILWAY}/api/v1/search?q=equinix", expect_status=[200, 429])

          # ============================================================
          print("\n🤖 AI Discovery Files")
          print("─" * 50)
          check("llms.txt",              f"{BASE}/llms.txt")
          check("llms-full.txt",         f"{BASE}/llms-full.txt")
          check("robots.txt",            f"{BASE}/robots.txt")
          check("sitemap.xml",           f"{BASE}/sitemap.xml")
          check("ai-plugin.json",         f"{BASE}/.well-known/ai-plugin.json", expect_status=[200, 500])

          # ============================================================
          print("\n" + "=" * 60)
          print("📊 RESULTS")
          print("=" * 60)
          for r in results:
              print(f"  {r}")
          total = len(results)
          passed = sum(1 for r in results if r.startswith("✅"))
          failed_count = sum(1 for r in results if r.startswith("❌"))
          warned = sum(1 for r in results if r.startswith("⚠️"))
          print(f"\n  Total: {total}  |  ✅ {passed}  |  ❌ {failed_count}  |  ⚠️ {warned}")
          if failures:
              print(f"\n🚨 {len(failures)} FAILURE(S):")
              for f in failures:
                  print(f"   • {f}")
              with open("qa_failures.txt", "w") as fh:
                  fh.write(f"DC Hub QA — {len(failures)} failure(s) at {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}\n\n")
                  for f in failures:
                      fh.write(f"• {f}\n")
              sys.exit(1)
          else:
              print("\n🎉 ALL CHECKS PASSED!")
          PYEOF

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtpout.secureserver.net
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚨 DC Hub QA Failed — ${{ github.run_id }}"
          to: jonathan@dchub.cloud
          from: jonathan@dchub.cloud
          body: |
            DC Hub automated QA check failed.

            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Trigger: ${{ github.event_name }}
            Time: ${{ github.event.head_commit.timestamp || 'scheduled' }}

            See the Actions log for full details.
