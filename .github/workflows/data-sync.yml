# .github/workflows/data-sync.yml
# DC Hub — Automated Data Sync & Discovery Cron v2

name: DC Hub Data Sync

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'    # Main sync: every 6 hours
    - cron: '30 */3 * * *'          # Keep-alive + news: every 3 hours
  workflow_dispatch:

jobs:
  keep-alive-and-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Keep alive + News refresh
        run: |
          RAILWAY="https://dchub-backend-production.up.railway.app"
          echo "🏥 Keep-alive ping..."
          curl -sf "$RAILWAY/api/jobs/keep-alive" | head -1
          echo ""
          echo "📰 News/deals refresh..."
          curl -sf --max-time 60 -X POST "$RAILWAY/api/jobs/news-refresh" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('success','?'), d.get('result','')[:200])" 2>/dev/null || echo "News refresh timed out or failed"

  sync-infrastructure:
    if: github.event.schedule == '0 0,6,12,18 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Infrastructure discovery
        run: |
          RAILWAY="https://dchub-backend-production.up.railway.app"
          ADMIN_KEY="${{ secrets.DCHUB_ADMIN_KEY }}"
          echo "🔄 Starting infrastructure sync at $(date -u)"
          
          echo "📡 1/4: Infrastructure discovery (fiber, substations, gas)..."
          curl -sf --max-time 90 -X POST "$RAILWAY/api/jobs/discovery?admin_key=$ADMIN_KEY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('success','?'))" 2>/dev/null || echo "Discovery timed out"
          sleep 5
          
          echo "⚡ 2/4: Energy discovery (power plants, pipelines per market)..."
          MARKETS="phoenix dallas northern_virginia atlanta las_vegas salt_lake_city columbus des_moines chicago silicon_valley new_york seattle portland denver san_antonio houston miami reno sacramento minneapolis kansas_city richmond nashville"
          for MARKET in $MARKETS; do
            curl -sf --max-time 60 "$RAILWAY/api/energy-discovery/power-plants?market=$MARKET&limit=500" > /dev/null 2>&1 && echo "  ✅ $MARKET" || echo "  ❌ $MARKET"
            sleep 3
          done
          
          echo "📦 3/4: KMZ fiber source processing..."
          curl -sf --max-time 90 -X POST "$RAILWAY/api/kmz-discovery/run" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('success','?'))" 2>/dev/null || echo "KMZ processing timed out"
          sleep 5
          
          echo "🧬 4/4: Evolution engine + auto-approve..."
          curl -sf --max-time 60 -X POST "$RAILWAY/api/jobs/evolution?admin_key=$ADMIN_KEY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('success','?'))" 2>/dev/null || echo "Evolution timed out"
          curl -sf --max-time 30 -X POST "$RAILWAY/api/jobs/auto-approve?admin_key=$ADMIN_KEY" > /dev/null 2>&1
          
          echo "✅ Infrastructure sync complete at $(date -u)"

      - name: Warm caches
        run: |
          RAILWAY="https://dchub-backend-production.up.railway.app"
          for COORDS in "39.0,-77.4" "32.8,-96.8" "33.4,-112.0" "37.4,-122.0" "41.9,-87.6"; do
            IFS=',' read LAT LNG <<< "$COORDS"
            curl -sf "$RAILWAY/api/v2/connectivity/summary?lat=$LAT&lng=$LNG" > /dev/null
            sleep 2
          done
          echo "🔗 PeeringDB + H3 cache warmed"

      - name: Health check
        run: |
          curl -sf "https://dchub-backend-production.up.railway.app/api/health" | python3 -m json.tool | head -10
          echo ""
          curl -sf "https://dchub-backend-production.up.railway.app/api/energy-discovery/status" | python3 -c "import json,sys; d=json.load(sys.stdin).get('data',{}); print(f\"Plants: {d.get('total_power_plants',0)} | Pipelines: {d.get('total_pipelines',0)} | TX Lines: {d.get('total_transmission_lines',0)}\")" 2>/dev/null
