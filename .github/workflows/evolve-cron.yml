            -H "Content-Type: application/json" \
            -d '{"mode":"personalized","limit":5,"min_signals":20,"confirm_send":true}' \
            "https://dchub-backend-production.up.railway.app/api/v1/admin/funnel-leads/broadcast" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2500
          echo
          echo "$response" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if d.get('mode') == 'sent':
              print(f\"::notice::Top-5 outreach sent={d.get('sent_count',0)} failed={d.get('failed_count',0)} of {d.get('eligible_count',0)} eligible\")
          else:
              print(f\"::warning::Top-5 outreach: mode={d.get('mode')} error={d.get('error','none')}\")
          " || true

  hot_leads_send_top_50:
    # Phase PP (2026-05-15): also fires on the weekly Thursday 17:00 UTC
