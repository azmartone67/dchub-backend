name: evolve cron (Phase I/J/K autonomy)

# Drives the three autonomous loops from phase 287-292:
#   I — Brain v2 Layer 4 self-learning (hourly)
#   J — Cap-exceeded outreach           (every 6h)
#   K — Ingestion audit snapshot         (every 6h, offset by 15 min)
#
# All three are READ-ONLY against the live site by default. Phase J defaults
# to send=true here because the cohort is already filtered + cooldown-gated
# in routes/outreach_cap_exceeded.py (won't re-send within 14 days, won't
# email internal domains, dry-run when DCHUB_RESEND_API_KEY isn't set).
#
# Required secrets (Settings → Secrets and variables → Actions → New repo secret):
#   DCHUB_ADMIN_KEY   — same value as the env var on Railway (admin gate on
#                        /api/v1/brain/learn + /api/v1/outreach/cap-exceeded/run)
#   DCHUB_API_KEY     — your enterprise key (X-API-Key header for the
#                        ingestion audit; uses the same key the verifier uses)

on:
  schedule:
    # Phase I — hourly Brain v2 learning pass
    - cron: '0 * * * *'
    # Phase J + K — every 6h, K offset 15 min after J
    - cron: '0 */6 * * *'
    - cron: '15 */6 * * *'
    # Phase BB (2026-05-12) — daily 13:00 UTC autonomous press release
    # (09:00 ET, when buyers + journalists check news). Idempotent —
    # the /auto-generate endpoint no-ops if today already has output.
    - cron: '0 13 * * *'
    # Phase EE (2026-05-12) — 30 min after the press release lands,
    # email today's LinkedIn-ready post to DCHUB_LINKEDIN_EMAIL_TO.
    # Idempotent: skips if today's post already has linkedin_sent_at.
    - cron: '30 13 * * *'
    # Phase FF (2026-05-12) — testimonial ingestion every 6h (15 min
    # offset from ingestion_audit so they don't collide).
    - cron: '45 */6 * * *'
    # Phase FF — agent vendor outreach digest, weekly Monday 14:00 UTC
    # (after the press + LinkedIn fire). Idempotent.
    - cron: '0 14 * * 1'
    # Phase TT Increment 3b (2026-05-14) — weekly market digest to every
    # identified MCP key, Monday 15:00 UTC (after the agent vendor
    # digest). Deduped once-per-week per key on mcp_dev_keys.metadata.
    - cron: '0 15 * * 1'
    # Phase FF (2026-05-14) — market-movement alerts, daily 16:00 UTC.
    # Snapshots every DCPI market, diffs day-over-day, fans movement out
    # to email + webhook subscribers. Idempotent: the 20h snapshot-gap
    # guard means a same-day re-run won't corrupt the diff baseline.
    - cron: '0 16 * * *'
    # Phase GG (2026-05-14) — data-freshness radar scan, every 6h. Walks
    # every data domain's source table and upserts data_domain_freshness.
    # The self-heal detector reads this registry (fast); this cron is the
    # primary writer so the radar stays current without loading the
    # timeout-prone /heal/findings request path.
    - cron: '20 */6 * * *'
    # Phase GG (2026-05-15) — Bundle 4 outcome verification, daily 05:45 UTC.
    # Walks approved brain_proposed_fixes from the last 30 days and records
    # whether the underlying pattern is still being detected by the healer.
    # This populates brain_fix_outcomes, which is the headline metric in
    # /api/v1/brain/effectiveness and the fix_success component of the
    # brain self-assessment grade. Runs 15 min before the 06:00 brain_learn
    # tick so outcomes settle before next learn pass.
    - cron: '45 5 * * *'
    # Phase GG (2026-05-15) — Bundle 5C: DC Hub Weekly Digest broadcast.
    # Monday 14:30 UTC (Phase QA-sweep 2026-05-16: offset from
    # `0 14 * * 1` agent_vendor cron at line 39 to clear the
    # cron_schedule_collision finding flagged by the consistency
    # radar). Targets ALL free + identified + newsletter subscribers.
    # Auto-builds from DCPI movers + ISO comparison + changes-since
    # + brain self-assessment. Idempotent via 6-day dedup.
    - cron: '30 14 * * 1'
    # Phase PP (2026-05-15) — hot-leads outreach, weekly Thursday 17:00 UTC.
    # Lands 1pm ET — peak business hours mid-week, after Mon/Tue ramp-up
    # but with enough runway to follow up before Friday. Targets the top
    # 50 free users by MCP upgrade-signal volume; per-lead personalized
    # body via /admin/funnel-leads/broadcast with confirm_send=true. The
    # endpoint enforces a 14-day cooldown so a same-lead repeat is
    # impossible — duplicate-firing this cron is safe.
    - cron: '0 17 * * 4'
    # Phase PP (2026-05-15) — active testimonial probe, daily 03:30 UTC.
    # Asks Claude (and any other configured agent) "what is dchub.cloud?"
    # and records the response as a testimonial citation. Runs 6h before
    # any morning content cron so /api/v1/testimonials never goes stale.
    - cron: '30 3 * * *'
    # Phase QQ (2026-05-15) — auto-publish daily press release at 13:25 UTC.
    # 25 min after the 13:00 UTC auto-press cron — gives the press release
    # generation, _write_release, and _queue_distribution_posts enough
    # runway to land + insert distribution rows before this fires
    # publish-now to actually push them to LinkedIn + X.
    - cron: '25 13 * * *'
    # Phase II (2026-05-17) — weekly AI citation probe, Mondays 12:00 UTC.
    # Asks Claude each canonical prompt ("best DC market intelligence?",
    # "where to build a 100MW DC in the US?", etc.) and records whether
    # the response cites dchub.cloud, DCHawk, or dcByte. Drives the
    # share-of-voice metric at /api/v1/ai-citations/share-of-voice and
    # surfaces in the brain's source-of-truth score. Weekly is intentional
    # — citation drift moves slowly + we want a clean time-series, not
    # noise. Off-cycle from other Monday crons (14:00/15:00) to avoid
    # thundering herd.
    - cron: '0 12 * * 1'
    # Phase FFFFF (2026-05-16) — verify autopilot outcomes every 4 hours.
    # The verifier polls autopilot_outcomes for fired-but-not-verified
    # actions and confirms whether each ACTION actually had the intended
    # downstream effect. Without it, autopilot is fire-and-forget; with it,
    # we close the loop. Currently 8+ unverified actions are backlogged
    # because this cron was never scheduled (Phase FFFFF shipped the
    # endpoint but not the cron). Phase KK detector flags backlogs >5.
    - cron: '50 */4 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Which phase to run on demand'
        required: true
        type: choice
        options: [all, brain, outreach, audit, marketing, linkedin, testimonials, agent_vendor, weekly_digest, market_alerts, freshness_radar, brain_probe_outcomes, weekly_media_digest, marketing_rescue, marketing_publish_now, hot_leads_preview, hot_leads_send_top_5, hot_leads_send_top_50, free_users_dryrun, free_users_send, energy_verify, testimonial_probe, ai_citations_probe, autopilot_verify]
        default: all
      dry_run:
        description: 'Dry-run (preview audience + body, do NOT send emails) — DEFAULT TRUE for manual dispatch'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  brain_learn:
    # Phase RR (2026-05-14): run on EVERY scheduled tick, not just the
    # exact '0 * * * *' string. Same GitHub-Actions-drops-scheduled-runs
    # problem fixed for marketing_auto_press in PR #116 — gating on one
    # cron string meant brain_learn skipped on most evolve-cron runs
    # (it fired via '0 */6', '15 */6', '30 13', etc.) and was dropped
    # outright whenever GH skipped the hourly tick. /api/v1/brain/learn
    # is safe to run often: per-pattern cooldowns + the 2-cycle approval
    # gate prevent any over-action, and a no-op pass (no learnable
    # findings) is cheap.
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'brain'))
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Brain v2 learn pass
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY secret not set — skipping Phase I"
            exit 0
          fi
          echo "Triggering Brain v2 Layer 4 learn pass…"
          response=$(curl -sS -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            --max-time 60 \
            "https://dchub-backend-production.up.railway.app/api/v1/brain/learn" || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 1500
          echo
          # Summarize for the Actions log
          echo "$response" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if d.get('ok'):
              print(f\"::notice::Brain v2 learned {len(d.get('results',[]))} attempts, {d.get('accepted_total','?')} proposed total\")
          else:
              print(f\"::warning::Brain v2 returned: {d.get('error','unknown')}\")
          " || true

  outreach_run:
    # Run on the 0-min 6h cron OR manual "all" / "outreach"
    if: github.event.schedule == '0 */6 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'outreach'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Cap-exceeded outreach run
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY secret not set — skipping Phase J"
            exit 0
          fi
          echo "Triggering cap-exceeded outreach (send=true)…"
          response=$(curl -sS -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            --max-time 120 \
            "https://dchub-backend-production.up.railway.app/api/v1/outreach/cap-exceeded/run?send=true" || echo '{"mode":"error"}')
          echo "$response" | head -c 1500
          echo
          echo "$response" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          mode = d.get('mode','?')
          if mode == 'sent':
              print(f\"::notice::Outreach sent={d.get('sent',0)} of eligible={d.get('eligible_total',0)}\")
          elif mode == 'dry_run':
              print(f\"::notice::Outreach DRY-RUN — would_send={d.get('would_send',0)} (set DCHUB_RESEND_API_KEY in Railway to enable delivery)\")
          else:
              print(f\"::warning::Outreach mode={mode}\")
          " || true

  ingestion_audit:
    # Run on the 15-min 6h cron OR manual "all" / "audit"
    if: github.event.schedule == '15 */6 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'audit'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Ingestion audit snapshot
        env:
          DCHUB_API_KEY: ${{ secrets.DCHUB_API_KEY }}
        run: |
          if [ -z "$DCHUB_API_KEY" ]; then
            echo "::warning::DCHUB_API_KEY secret not set — running audit without auth (some endpoints will 401)"
          fi
          chmod +x scripts/dchub_ingestion_audit.sh
          bash scripts/dchub_ingestion_audit.sh --json > /tmp/audit.json
          # Surface a summary in the Actions log
          cat /tmp/audit.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          s = d.get('summary', {})
          print(f\"::notice::Ingestion audit — total={s.get('total','?')} ok={s.get('ok','?')} gated={s.get('gated','?')} unreachable={s.get('unreachable','?')}\")
          if s.get('unreachable', 0) > 0:
              eps = [e for e in d.get('endpoints', []) if str(e.get('status','')).startswith(('4','5')) and e.get('status') not in (401, 403)]
              print(f\"::warning::Unreachable endpoints: {[e.get('endpoint') for e in eps[:10]]}\")
          " || true
      - name: Upload audit snapshot as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-audit-${{ github.run_number }}
          path: /tmp/audit.json
          retention-days: 30

  # Phase BB (2026-05-12) — autonomous press release.
  # Phase RR (2026-05-14): run on EVERY scheduled tick, not just the
  # exact '0 13 * * *' string. GitHub Actions routinely delays and
  # DROPS scheduled runs — gating this job to one specific cron string
  # meant that whenever GH dropped the 13:00 tick, that day got no post
  # at all. Result: ~3 posts in 30 days instead of 30. /auto-generate
  # is idempotent per-day (date+source lookup → no-op), so firing it on
  # every evolve-cron tick is safe: the first run of the UTC day
  # generates that day's themed post, every later run cheaply no-ops —
  # and a transient failure on one tick is simply retried by the next.
  marketing_auto_press:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'marketing'))
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Trigger autonomous press generation
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY secret not set — skipping marketing run"
            exit 0
          fi
          # POST with admin gate. Endpoint is idempotent per-day so
          # re-runs after a failed deploy are safe.
          response=$(curl -sS --max-time 60 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            "https://dchub-backend-production.up.railway.app/api/v1/marketing/auto-generate" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          # Summarize for Actions log
          echo "$response" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
          except Exception:
              print('::warning::Marketing endpoint returned non-JSON')
              sys.exit(0)
          if d.get('skipped'):
              print(f\"::notice::Marketing skipped — {d.get('reason','?')}\")
          elif d.get('generated'):
              print(f\"::notice::Auto-press generated · slug={d.get('slug')} · title={d.get('title','')[:80]}\")
          else:
              print(f\"::warning::Marketing pass failed — {d.get('error','unknown')}\")
          " || true

  # Phase EE (2026-05-12) — daily LinkedIn email (30 min after press release).
  marketing_linkedin_email:
    if: github.event.schedule == '30 13 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'linkedin'))
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Send today's LinkedIn-ready post email
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY secret not set — skipping LinkedIn email"
            exit 0
          fi
          response=$(curl -sS --max-time 30 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/marketing/linkedin/send-daily-email" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 1500
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::LinkedIn email endpoint returned non-JSON'); sys.exit(0)
          if d.get('skipped'):
              print(f\"::notice::LinkedIn skipped — {d.get('reason','?')}\")
          elif d.get('sent'):
              print(f\"::notice::LinkedIn email sent to {d.get('to')} for slug={d.get('slug')}\")
          else:
              print(f\"::warning::LinkedIn email failed — {d.get('error','unknown')}\")
          " || true

  # Phase FF (2026-05-12) — testimonial ingestion (HackerNews + Reddit + MCP-derived).
  testimonials_ingest:
    if: github.event.schedule == '45 */6 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'testimonials'))
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run testimonial ingestion sources
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping testimonial ingest"
            exit 0
          fi
          response=$(curl -sS --max-time 60 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/testimonials/ingest" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::Testimonials ingest returned non-JSON'); sys.exit(0)
          if d.get('ok'):
              print(f\"::notice::Testimonials ingest — total_new={d.get('total_new',0)}\")
          else:
              print(f\"::warning::Testimonials ingest failed — {d.get('error','unknown')}\")
          " || true

  # Phase FF — weekly agent vendor outreach digest (Monday 14:00 UTC).
  agent_vendor_digest:
    if: github.event.schedule == '0 14 * * 1' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'agent_vendor'))
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Send agent vendor outreach digest
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping agent vendor digest"
            exit 0
          fi
          response=$(curl -sS --max-time 30 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/outreach/agents/email-digest" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 1500
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::Agent vendor digest returned non-JSON'); sys.exit(0)
          if d.get('skipped'):
              print(f\"::notice::Agent vendor digest skipped — {d.get('reason','?')}\")
          elif d.get('sent'):
              print(f\"::notice::Agent vendor digest sent to {d.get('to')} ({d.get('vendor_count',0)} vendors)\")
          else:
              print(f\"::warning::Agent vendor digest failed — {d.get('error','unknown')}\")
          " || true

  # Phase TT Increment 3b (2026-05-14) — weekly market digest.
  # Monday 15:00 UTC, after the agent vendor digest. Emails every
  # identified MCP key a recap of the markets its assistant queried in
  # the last 7 days, enriched with a fresh energy-rate stat. Deduped
  # once-per-week per key (mcp_dev_keys.metadata.digest_sent_at), so a
  # retry after a failed deploy is safe. send=true; the endpoint
  # no-ops to a dry-run when DCHUB_RESEND_API_KEY isn't set in Railway.
  weekly_market_digest:
    if: github.event.schedule == '0 15 * * 1' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'weekly_digest'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send weekly market digest
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping weekly digest"
            exit 0
          fi
          response=$(curl -sS --max-time 120 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/digest/weekly/run?send=true" \
            || echo '{"mode":"error","error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::Weekly digest returned non-JSON'); sys.exit(0)
          mode = d.get('mode','?')
          if mode == 'sent':
              print(f\"::notice::Weekly digest sent={d.get('sent',0)} of eligible={d.get('eligible_total',0)} (dedup_skip={d.get('skipped_dedup',0)}, failed={d.get('send_failed',0)})\")
          elif mode == 'no_provider':
              print(f\"::notice::Weekly digest DRY-RUN — eligible={d.get('eligible_total',0)} (set DCHUB_RESEND_API_KEY in Railway to enable delivery)\")
          elif mode == 'dry_run':
              print(f\"::notice::Weekly digest dry-run — eligible={d.get('eligible_total',0)}\")
          else:
              print(f\"::warning::Weekly digest mode={mode} error={d.get('error','unknown')}\")
          " || true

  # Phase FF (2026-05-14) — market-movement alerts, daily 16:00 UTC.
  # Snapshots every DCPI-scored market, diffs day-over-day, and fans
  # detected movement (verdict flips, constraint / time-to-power shifts)
  # out to email + webhook subscribers. Idempotent — the 20h snapshot-gap
  # guard keeps the diff baseline clean across same-day re-runs.
  market_alerts_run:
    if: github.event.schedule == '0 16 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'market_alerts'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run market-movement alerts
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping market alerts"
            exit 0
          fi
          response=$(curl -sS --max-time 120 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/alerts/run?send=true" \
            || echo '{"mode":"error","error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::Market alerts returned non-JSON'); sys.exit(0)
          mode = d.get('mode','?')
          dv = d.get('deliveries',{})
          if mode == 'sent':
              print(f\"::notice::Market alerts — scanned={d.get('markets_scanned',0)} moved={d.get('movements_detected',0)} email={dv.get('email',0)} webhook={dv.get('webhook',0)} failed={dv.get('failed',0)}\")
          elif mode == 'no_provider':
              print(f\"::notice::Market alerts — moved={d.get('movements_detected',0)} but DCHUB_RESEND_API_KEY not set (webhooks still fire; email skipped)\")
          elif mode == 'dry_run':
              print(f\"::notice::Market alerts dry-run — moved={d.get('movements_detected',0)}\")
          else:
              print(f\"::warning::Market alerts mode={mode} error={d.get('error','unknown')}\")
          " || true

  # Phase GG (2026-05-14) — data-freshness radar scan, every 6h. Walks
  # every data domain's source table, upserts data_domain_freshness, and
  # surfaces breached / missing-source domains. The self-heal detector
  # reads this registry; this cron is the primary writer so the radar
  # stays current without loading the timeout-prone /heal/findings path.
  freshness_radar:
    if: github.event.schedule == '20 */6 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'freshness_radar'))
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Run data-freshness radar scan
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping freshness radar"
            exit 0
          fi
          response=$(curl -sS --max-time 90 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/freshness/radar/scan" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::Freshness radar returned non-JSON'); sys.exit(0)
          if d.get('ok'):
              br = d.get('breaches', []); un = d.get('unknown', [])
              msg = f\"scanned={d.get('scanned',0)}\"
              if br: msg += f\" · BREACH: {','.join(br)}\"
              if un: msg += f\" · unknown: {','.join(un)}\"
              lvl = 'warning' if br else 'notice'
              print(f\"::{lvl}::Freshness radar — {msg}\")
          else:
              print(f\"::warning::Freshness radar failed — {d.get('error','unknown')}\")
          " || true

  # Phase GG (2026-05-15) — Bundle 4 outcome verification, daily 05:45 UTC.
  # Walks approved brain_proposed_fixes from the last 30 days and records
  # whether the underlying pattern is still being detected by the healer.
  # Populates brain_fix_outcomes (the headline metric in /brain/effectiveness
  # and the fix_success component of /brain/self-assessment).
  brain_probe_outcomes:
    if: github.event.schedule == '45 5 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'brain_probe_outcomes'))
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe brain proposal outcomes
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping brain probe-outcomes"
            exit 0
          fi
          response=$(curl -sS --max-time 60 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/brain/probe-outcomes" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::Brain probe-outcomes returned non-JSON'); sys.exit(0)
          if d.get('ok'):
              ck = d.get('candidates_checked', 0)
              no = d.get('new_outcomes_recorded', 0)
              er = d.get('errors', [])
              lvl = 'warning' if er else 'notice'
              msg = f\"checked={ck} recorded={no}\"
              if er: msg += f\" · errors={len(er)}: {er[:2]}\"
              print(f\"::{lvl}::Brain probe-outcomes — {msg}\")
          else:
              print(f\"::warning::Brain probe-outcomes failed — {d.get('error','unknown')}\")
          " || true

  # Phase GG (2026-05-15) — Bundle 5C: weekly DC Hub Media digest to all
  # free + identified + newsletter subscribers. Monday 14:00 UTC. The
  # endpoint auto-builds the body from DCPI movers + ISO comparison +
  # changes-since + brain self-assessment, then broadcasts via Resend.
  # Idempotent: 6-day dedup window so a same-week retry is safe.
  # NOTE: Phase QA-sweep (2026-05-16) — moved from '0 14 * * 1' to
  # '30 14 * * 1' to clear the cron_schedule_collision finding. Now
  # fires 30 min after agent_vendor_digest at the top of the hour.
  weekly_media_digest:
    if: github.event.schedule == '30 14 * * 1' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'all' || inputs.phase == 'weekly_media_digest'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send weekly DC Hub Media digest broadcast
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          IS_SCHEDULE: ${{ github.event_name == 'schedule' }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping weekly digest"
            exit 0
          fi
          # Bundle 6A safety: workflow_dispatch defaults to dry_run unless
          # explicitly false. Scheduled cron always confirms large audience
          # (it's the sanctioned weekly send path). Manual dispatches must
          # pass dry_run=false explicitly to actually deliver.
          URL="https://dchub-backend-production.up.railway.app/api/v1/digest/weekly-auto"
          QS=""
          if [ "$IS_SCHEDULE" = "true" ]; then
            QS="?confirm_large_send=true"
            echo "::notice::Scheduled cron — auto-confirming large audience"
          elif [ "$DRY_RUN" = "true" ] || [ -z "$DRY_RUN" ]; then
            QS="?dry_run=true"
            echo "::notice::Dry-run mode — no emails will be sent."
          else
            QS="?confirm_large_send=true"
            echo "::warning::Manual dispatch with dry_run=false — emails WILL be sent."
          fi
          URL="${URL}${QS}"
          response=$(curl -sS --max-time 120 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            "$URL" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::Weekly digest returned non-JSON'); sys.exit(0)
          mode = d.get('mode', '?')
          if mode == 'sent':
              print(f\"::notice::Weekly digest sent={d.get('sent_count',0)} of eligible={d.get('eligible_count',0)} failed={d.get('failed_count',0)}\")
          elif mode == 'no_provider':
              print(f\"::notice::Weekly digest no_provider — eligible={d.get('eligible_count',0)} (set DCHUB_RESEND_API_KEY in Railway to enable delivery)\")
          elif mode == 'dry_run':
              print(f\"::notice::Weekly digest dry-run — eligible={d.get('eligible_count',0)}\")
          else:
              print(f\"::warning::Weekly digest mode={mode} error={d.get('error','unknown')}\")
          " || true

  # Phase MM (2026-05-15): manual rescue path for stuck LinkedIn distribution.
  # When marketing pulse shows linkedin_posts_7d == 0 despite auto_press_7d > 0,
  # today's release exists but never got queued. This job re-runs auto-generate
  # with ?requeue=1 to insert missing social_media_posts rows.
  marketing_rescue:
    if: github.event_name == 'workflow_dispatch' && (inputs.phase == 'marketing_rescue' || inputs.phase == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Force-requeue today's auto-press distribution
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping"; exit 0; fi
          response=$(curl -sS --max-time 60 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/marketing/auto-generate?requeue=1" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::Marketing rescue non-JSON'); sys.exit(0)
          mode = d.get('mode', '?')
          if mode == 'requeued':
              print(f\"::notice::Marketing rescue requeued today's distribution rows\")
          elif d.get('skipped'):
              print(f\"::notice::Marketing rescue skipped — {d.get('reason','already_done')}\")
          else:
              print(f\"::warning::Marketing rescue: {d.get('error','unknown')}\")
          " || true

  # Phase MM (2026-05-15): immediate publish path — calls publish-now to force
  # LinkedIn + X posts using the most-recent auto-press release. Use after a
  # rescue when the 6h auto-publisher cadence is too slow.
  #
  # Phase QQ (2026-05-15): also fires on a 25-min-past-press cron. The
  # in-process auto-publisher daemon (content_publisher.py) didn't reliably
  # survive deploys, so published_7d.linkedin = 0 even with 4 generated
  # releases. This cron makes publishing a workflow-level guarantee.
  # 25-min offset from the 13:00 UTC press release leaves enough time for
  # the press to land + queue distribution rows before we try to publish.
  marketing_publish_now:
    if: github.event.schedule == '25 13 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.phase == 'marketing_publish_now' || inputs.phase == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish today's piece to LinkedIn + X now
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::warning::DCHUB_ADMIN_KEY not set — skipping"; exit 0; fi
          response=$(curl -sS --max-time 90 -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/marketing/publish-now" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2500
          echo
          echo "$response" | python3 -c "
          import json, sys
          try: d = json.load(sys.stdin)
          except Exception:
              print('::warning::publish-now non-JSON'); sys.exit(0)
          li = d.get('linkedin') or {}
          tw = d.get('twitter') or {}
          li_ok = bool(li.get('success'))
          tw_ok = bool(tw.get('success'))
          msg = f\"linkedin={'OK' if li_ok else (li.get('error') or 'fail')[:80]} · twitter={'OK' if tw_ok else (tw.get('error') or 'fail')[:80]}\"
          lvl = 'notice' if (li_ok or tw_ok) else 'warning'
          print(f\"::{lvl}::publish-now — {msg}\")
          " || true

  # Phase MM (2026-05-15) Bundle 9: hot-leads outreach via workflow_dispatch.
  # Three options for safety:
  #   hot_leads_preview      — print top 10 personalized email previews (no send)
  #   hot_leads_send_top_5   — send to top 5 (min_signals=20) — safest first run
  #   hot_leads_send_top_50  — send to top 50 (min_signals=5) — full broadcast
  # Uses the GitHub Actions DCHUB_ADMIN_KEY secret, no local shell env needed.
  hot_leads_preview:
    if: github.event_name == 'workflow_dispatch' && inputs.phase == 'hot_leads_preview'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Diagnose admin key length
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          echo "::notice::Admin key length: ${#ADMIN_KEY}"
          # First 4 chars (masked beyond that). Helps verify it's the
          # expected key vs. a random fallback.
          echo "::notice::Admin key prefix (first 4): ${ADMIN_KEY:0:4}"
          # Test the brain endpoint with this same key. If that works,
          # the key matches Railway's DCHUB_ADMIN_KEY → my funnel_leads
          # endpoint has a different bug. If that fails too, the secret
          # itself is wrong.
          brain_resp=$(curl -sS --max-time 30 -H "X-Admin-Key: $ADMIN_KEY" \
            -o /dev/null -w "%{http_code}" \
            "https://dchub-backend-production.up.railway.app/api/v1/brain/status")
          echo "::notice::brain/status with this admin key: $brain_resp"
          funnel_resp=$(curl -sS --max-time 30 -H "X-Admin-Key: $ADMIN_KEY" \
            -o /dev/null -w "%{http_code}" \
            "https://dchub-backend-production.up.railway.app/api/v1/admin/funnel-leads/preview?limit=1")
          echo "::notice::funnel-leads/preview with this admin key: $funnel_resp"
      - name: Preview top 10 personalized hot-lead emails
        env:
          ADMIN_KEY: ${{ secrets.DCHUB_ADMIN_KEY }}
        run: |
          if [ -z "$ADMIN_KEY" ]; then
            echo "::error::DCHUB_ADMIN_KEY secret not set in repo settings"; exit 1; fi
          response=$(curl -sS --max-time 30 -H "X-Admin-Key: $ADMIN_KEY" \
            "https://dchub-backend-production.up.railway.app/api/v1/admin/funnel-leads/preview?limit=10" \
            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if not d.get('ok'):
              print(f'::error::Preview failed: {d.get(\"error\",\"unknown\")}'); sys.exit(1)
          previews = d.get('previews', [])
          print(f'::notice::Found {len(previews)} hot leads (min_signals={d.get(\"min_signals\")})')
          for p in previews:
              print(f\"  • {p.get('email')} · signals={p.get('signals')} · {p.get('primary_tool')}\")
              print(f\"    SUBJECT: {p.get('subject')}\")
          "

  hot_leads_send_top_5:
