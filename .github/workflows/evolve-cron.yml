            || echo '{"ok":false,"error":"curl_fail"}')
          echo "$response" | head -c 2000
          echo
          echo "$response" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if d.get('ok'):
              print(f\"::notice::Testimonial probe captured={d.get('captured',0)} skipped={d.get('skipped',0)} errors={d.get('errors',0)}\")
          else:
              print(f\"::warning::Testimonial probe failed: {d.get('error','?')}\")
