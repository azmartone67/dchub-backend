  autopilot_verify:
    # Phase FFFFF/KK (2026-05-17) — verify autopilot outcomes every 4h.
    # Polls autopilot_outcomes for fired-but-unverified actions and checks
    # whether each ACTION actually had the intended effect (e.g. did the
