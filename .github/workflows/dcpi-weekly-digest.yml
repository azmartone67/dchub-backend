name: DCPI Weekly Digest
on:
  schedule:
    # Phase VV-1 (2026-05-15): offset by 10min from 14:00 anchor to avoid
    # the 4-way Monday 14:00 collision flagged by brain consistency radar.
    - cron: '10 14 * * 1'  # Mondays 14:10 UTC (was 14:00)
  workflow_dispatch: {}
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sS -X POST "https://dchub.cloud/api/v1/dcpi/digest/send?dry=0" \
            -H "X-Admin-Key: ${{ secrets.DCHUB_ADMIN_KEY }}" \
            | python3 -m json.tool
