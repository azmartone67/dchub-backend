<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry News - DC Hub</title>
    <meta name="description" content="Real-time data center industry news from 16+ RSS sources. Track M&A activity, expansions, technology trends, and market movements.">
    <link rel="canonical" href="https://dchub.cloud/news">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
        <script src="/static/js/api-config.js"></script>
<script>
(function() {
    var b = window.DCHUB_API_BASE || '';
    window.API_BASE = b;
    window.DCHUB_CONFIG = { apiBase: b, version: 'v93' };
    if (!window.dchubFetch) {
        window.dchubFetch = function(path, opts) {
            opts = opts || {};
            if (b) { opts.mode = opts.mode || 'cors'; opts.credentials = opts.credentials || 'include'; }
            return fetch(b + path, opts);
        };
    }
})();
</script>
    <style>
        :root {
            --bg1: #08080c; --bg2: #0f0f14; --bg3: #16161d; --bg4: #1e1e26;
            --border: #2a2a35; --border2: #3a3a48;
            --text: #f4f4f6; --text2: #a8a8b3; --text3: #6b6b78;
            --accent: #6366f1; --accent2: #818cf8; --accent-glow: rgba(99,102,241,0.3);
            --green: #10b981; --green-glow: rgba(16,185,129,0.2);
            --orange: #f59e0b; --red: #ef4444; --purple: #a855f7; --cyan: #06b6d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', -apple-system, sans-serif; background: var(--bg1); color: var(--text); line-height: 1.6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg2); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(8,8,12,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.5rem; color: var(--text); text-decoration: none; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { color: var(--text2); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent2); }
        .main { max-width: 1200px; margin: 80px auto 40px; padding: 20px 32px; }
        .page-header { margin-bottom: 32px; }
        .page-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .page-subtitle { color: var(--text2); font-size: 1rem; }
        .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent2); }
        .stat-label { font-size: 0.8rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
        .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .search-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; color: var(--text); font-size: 0.9rem; flex: 1; min-width: 200px; outline: none; font-family: inherit; }
        .search-input:focus { border-color: var(--accent); }
        .filter-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; color: var(--text2); cursor: pointer; font-size: 0.85rem; font-family: inherit; transition: all 0.2s; }
        .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .news-grid { display: grid; gap: 16px; }
        .news-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s, transform 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .news-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .news-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .news-source { background: var(--bg4); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; color: var(--accent2); font-weight: 600; }
        .news-date { font-size: 0.75rem; color: var(--text3); }
        .news-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        .news-summary { color: var(--text2); font-size: 0.9rem; line-height: 1.5; }
        .load-more { display: block; width: 100%; padding: 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; color: var(--accent2); font-size: 0.95rem; font-weight: 600; cursor: pointer; text-align: center; margin-top: 20px; font-family: inherit; transition: all 0.2s; }
        .load-more:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .loading { text-align: center; padding: 60px 20px; color: var(--text3); }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px; color: var(--text3); }
        @media (max-width: 768px) { .header { padding: 12px 16px; } .main { padding: 16px; } .nav-links { gap: 12px; } .stats-row { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="logo"><div class="logo-icon">D</div> DC Hub</a>
        <div class="nav-links">
            <a href="/app">Dashboard</a>
            <a href="/news" class="active">News</a>
            <a href="/market-intelligence">Markets</a>
            <a href="/announcements">Pipeline</a>
            <a href="/developers">Developers</a>
        </div>
    </div>

    <div class="main">
        <div class="page-header">
            <h1 class="page-title">Industry News</h1>
            <p class="page-subtitle">Real-time data center news from <span id="sourceCount">--</span> sources</p>
        </div>

        <div class="stats-row">
            <div class="stat-card"><div class="stat-value" id="totalArticles">--</div><div class="stat-label">Total Articles</div></div>
            <div class="stat-card"><div class="stat-value" id="todayCount">--</div><div class="stat-label">Today</div></div>
            <div class="stat-card"><div class="stat-value" id="topSource">--</div><div class="stat-label">Top Source</div></div>
            <div class="stat-card"><div class="stat-value" id="lastUpdate">--</div><div class="stat-label">Last Updated</div></div>
        </div>

        <div class="controls">
            <input type="text" class="search-input" id="searchInput" placeholder="Search news articles...">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="today">Today</button>
            <button class="filter-btn" data-filter="week">This Week</button>
        </div>

        <div id="newsContainer" class="news-grid">
            <div class="loading"><div class="spinner"></div>Loading news...</div>
        </div>

        <button class="load-more" id="loadMore" style="display:none">Load More Articles</button>
    </div>

    <script>
        const API_BASE = window.DCHUB_API_BASE || '';
        let allArticles = [];
        let displayedCount = 0;
        const PAGE_SIZE = 30;
        let currentFilter = 'all';

        async function loadNews() {
            try {
                const res = await fetch(API_BASE + '/api/news?limit=500', { mode: API_BASE ? 'cors' : 'same-origin' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();

                allArticles = data.articles || [];
                const total = data.total || allArticles.length;

                document.getElementById('totalArticles').textContent = total.toLocaleString();

                const today = new Date().toISOString().slice(0, 10);
                const todayArticles = allArticles.filter(a => (a.published_at || '').slice(0, 10) === today);
                document.getElementById('todayCount').textContent = todayArticles.length;

                const sources = {};
                allArticles.forEach(a => { sources[a.source] = (sources[a.source] || 0) + 1; });
                const topSrc = Object.entries(sources).sort((a, b) => b[1] - a[1])[0];
                document.getElementById('topSource').textContent = topSrc ? topSrc[0] : '--';
                document.getElementById('sourceCount').textContent = Object.keys(sources).length;

                if (allArticles.length > 0) {
                    const latest = allArticles[0].published_at;
                    if (latest) {
                        const d = new Date(latest);
                        document.getElementById('lastUpdate').textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    }
                }

                displayedCount = 0;
                renderArticles();
            } catch (e) {
                document.getElementById('newsContainer').innerHTML = '<div class="empty-state">Unable to load news. Please try again later.</div>';
            }
        }

        function getFilteredArticles() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const now = new Date();
            return allArticles.filter(a => {
                if (query && !(a.title || '').toLowerCase().includes(query) && !(a.source || '').toLowerCase().includes(query) && !(a.summary || '').toLowerCase().includes(query)) return false;
                if (currentFilter === 'today') {
                    return (a.published_at || '').slice(0, 10) === now.toISOString().slice(0, 10);
                }
                if (currentFilter === 'week') {
                    const weekAgo = new Date(now.getTime() - 7 * 86400000);
                    return new Date(a.published_at) >= weekAgo;
                }
                return true;
            });
        }

        function renderArticles() {
            const filtered = getFilteredArticles();
            const page = filtered.slice(0, displayedCount + PAGE_SIZE);
            displayedCount = page.length;

            if (page.length === 0) {
                document.getElementById('newsContainer').innerHTML = '<div class="empty-state">No articles match your search.</div>';
                document.getElementById('loadMore').style.display = 'none';
                return;
            }

            document.getElementById('newsContainer').innerHTML = page.map(a => {
                const date = a.published_at ? new Date(a.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
                const summary = (a.summary || '').slice(0, 200);
                return `<a class="news-card" href="${a.url || '#'}" target="_blank" rel="noopener">
                    <div class="news-meta">
                        <span class="news-source">${a.source || 'DC Hub'}</span>
                        <span class="news-date">${date}</span>
                    </div>
                    <div class="news-title">${a.title || 'Untitled'}</div>
                    ${summary ? `<div class="news-summary">${summary}</div>` : ''}
                </a>`;
            }).join('');

            document.getElementById('loadMore').style.display = displayedCount < filtered.length ? 'block' : 'none';
        }

        document.getElementById('loadMore').addEventListener('click', renderArticles);
        document.getElementById('searchInput').addEventListener('input', () => { displayedCount = 0; renderArticles(); });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                displayedCount = 0;
                renderArticles();
            });
        });

        loadNews();
        setInterval(loadNews, 120000);
    </script>
</body>
</html>
