<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Hub — The Source AI Agents Cite</title>
<meta name="description" content="See what AI platforms like Google Gemini, ChatGPT, and Claude say about DC Hub's data center intelligence.">
<link rel="canonical" href="https://dchub.cloud/testimonials">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0a0b0f;
    --bg-card: #111318;
    --bg-card-hover: #161820;
    --gold: #c9a84c;
    --gold-light: #e8d48b;
    --gold-dim: rgba(201, 168, 76, 0.15);
    --gold-glow: rgba(201, 168, 76, 0.08);
    --text-primary: #e8e6e1;
    --text-secondary: #9a978f;
    --text-dim: #5c5a54;
    --border: rgba(201, 168, 76, 0.12);
    --border-strong: rgba(201, 168, 76, 0.25);
    --google-blue: #4285f4;
    --openai-green: #10a37f;
    --anthropic-orange: #cc785c;
    --accent-cyan: #4ecdc4;
  }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .page-header {
    text-align: center;
    padding: 80px 40px 40px;
    position: relative;
  }

  .page-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse at center, rgba(201, 168, 76, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 16px;
  }

  .page-header h1 em {
    color: var(--gold-light);
    font-style: italic;
  }

  .page-header p {
    font-size: 18px;
    color: var(--text-secondary);
    max-width: 600px;
    margin: 0 auto;
  }

  .testimonial-section {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px 100px;
  }

  .testimonial-section::before {
    content: '';
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(ellipse at center, rgba(201, 168, 76, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .source-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px 8px 12px;
    background: rgba(66, 133, 244, 0.08);
    border: 1px solid rgba(66, 133, 244, 0.2);
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    color: var(--google-blue);
    letter-spacing: 0.02em;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards;
    animation-delay: 0.2s;
  }

  .source-badge.openai {
    background: rgba(16, 163, 127, 0.08);
    border-color: rgba(16, 163, 127, 0.2);
    color: var(--openai-green);
  }

  .source-badge.anthropic {
    background: rgba(204, 120, 92, 0.08);
    border-color: rgba(204, 120, 92, 0.2);
    color: var(--anthropic-orange);
  }

  .source-badge svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .hero-quote {
    position: relative;
    margin-bottom: 64px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards;
    animation-delay: 0.4s;
  }

  .hero-quote blockquote {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 400;
    line-height: 1.3;
    color: var(--text-primary);
    max-width: 900px;
    position: relative;
    padding-left: 32px;
    border-left: 3px solid var(--gold);
  }

  .hero-quote blockquote em {
    color: var(--gold-light);
    font-style: italic;
  }

  .hero-quote .attribution {
    margin-top: 24px;
    padding-left: 32px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
  }

  .hero-quote .attribution span {
    color: var(--google-blue);
  }

  .gold-standard {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 28px 36px;
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.06) 0%, rgba(201, 168, 76, 0.02) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards;
    animation-delay: 0.6s;
  }

  .gold-standard-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(145deg, var(--gold), #a8862e);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 8px 32px rgba(201, 168, 76, 0.2);
  }

  .gold-standard-icon svg {
    width: 28px;
    height: 28px;
    color: #0a0b0f;
  }

  .gold-standard-text h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .gold-standard-text p {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.35;
  }

  .pillars-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 56px;
  }

  @media (max-width: 768px) {
    .pillars-grid { grid-template-columns: 1fr; }
    .testimonial-section { padding: 60px 20px; }
    .page-header { padding: 60px 20px 30px; }
  }

  .pillar-card {
    position: relative;
    padding: 32px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    opacity: 0;
    animation: fadeSlideUp 0.6s ease forwards;
  }

  .pillar-card:nth-child(1) { animation-delay: 0.8s; }
  .pillar-card:nth-child(2) { animation-delay: 0.95s; }
  .pillar-card:nth-child(3) { animation-delay: 1.1s; }
  .pillar-card:nth-child(4) { animation-delay: 1.25s; }

  .pillar-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .pillar-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-strong);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px var(--gold-glow);
  }

  .pillar-card:hover::before { opacity: 1; }

  .pillar-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pillar-number::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .pillar-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .pillar-description {
    font-size: 14.5px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  .closing-statement {
    text-align: center;
    padding: 48px 40px;
    background: linear-gradient(180deg, rgba(201, 168, 76, 0.04) 0%, transparent 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards;
    animation-delay: 1.4s;
  }

  .closing-statement::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 20%;
    right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .closing-statement .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
  }

  .closing-statement blockquote {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 400;
    line-height: 1.4;
    color: var(--text-primary);
    max-width: 780px;
    margin: 0 auto;
  }

  .closing-statement blockquote em {
    color: var(--gold-light);
    font-style: italic;
  }

  .stat-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 36px;
    flex-wrap: wrap;
  }

  .stat-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-chip .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--gold-light);
  }

  .stat-chip .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .testimonial-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
    margin: 80px 0;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 20px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold); }
</style>
</head>
<body>

<header class="page-header">
  <a href="https://dchub.cloud" class="back-link">← Back to DC Hub</a>
  <h1>The Source <em>AI Agents Cite</em></h1>
  <p>See what leading AI platforms say about DC Hub's data center intelligence</p>
</header>

<div id="testimonials-container">
  <!-- Testimonials loaded dynamically -->
</div>

<script>
const API_BASE = 'https://dchub.cloud';

const GOOGLE_ICON = `<svg viewBox="0 0 24 24" fill="none">
  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
</svg>`;

const STAR_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
</svg>`;

function renderTestimonial(t, index) {
  const iconMap = { google: GOOGLE_ICON };
  const icon = iconMap[t.source_icon] || GOOGLE_ICON;
  const badgeClass = t.source_icon === 'openai' ? 'openai' : t.source_icon === 'anthropic' ? 'anthropic' : '';
  
  let pillarsHtml = t.pillars.map(p => `
    <div class="pillar-card">
      <div class="pillar-number">${p.number} — ${p.label}</div>
      <div class="pillar-title">${p.title}</div>
      <div class="pillar-description">${p.description}</div>
    </div>
  `).join('');

  let statsHtml = t.stats.map(s => `
    <div class="stat-chip">
      <span class="value">${s.value}</span>
      <span class="stat-label">${s.label}</span>
    </div>
  `).join('');

  return `
    <section class="testimonial-section">
      <div class="source-badge ${badgeClass}">
        ${icon}
        ${t.source_type}
      </div>

      <div class="hero-quote">
        <blockquote>${t.hero_quote.replace(/"/g, '<em>"').replace(/"/g, '"</em>')}</blockquote>
        <div class="attribution">— <span>${t.source}</span>, ${t.source_type}</div>
      </div>

      <div class="gold-standard">
        <div class="gold-standard-icon">${STAR_ICON}</div>
        <div class="gold-standard-text">
          <h3>${t.gold_standard.year} ${t.gold_standard.title}</h3>
          <p>${t.gold_standard.description}</p>
        </div>
      </div>

      <div class="pillars-grid">${pillarsHtml}</div>

      <div class="closing-statement">
        <div class="label">${t.closing.label}</div>
        <blockquote>${t.closing.quote.replace(/"/g, '<em>"').replace(/"/g, '"</em>')}</blockquote>
        <div class="stat-row">${statsHtml}</div>
      </div>
    </section>
    ${index < window.totalTestimonials - 1 ? '<div class="testimonial-divider"></div>' : ''}
  `;
}

async function loadTestimonials() {
  try {
    const resp = await fetch(`${API_BASE}/api/testimonials`);
    const data = await resp.json();
    const container = document.getElementById('testimonials-container');
    window.totalTestimonials = data.testimonials.length;
    container.innerHTML = data.testimonials.map((t, i) => renderTestimonial(t, i)).join('');
  } catch (err) {
    console.error('Failed to load testimonials:', err);
  }
}

loadTestimonials();
</script>
</body>
</html>
