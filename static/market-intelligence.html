<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Intelligence - DC Hub</title>
    <meta name="description" content="Data center market intelligence for 28 global markets. Vacancy rates, pricing, absorption, pipeline data sourced from CBRE and JLL.">
    <link rel="canonical" href="https://dchub.cloud/market-intelligence">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
        <script src="/static/js/api-config.js"></script>
<script>
(function() {
    var b = window.DCHUB_API_BASE || '';
    window.API_BASE = b;
    window.DCHUB_CONFIG = { apiBase: b, version: 'v93' };
    if (!window.dchubFetch) {
        window.dchubFetch = function(path, opts) {
            opts = opts || {};
            if (b) { opts.mode = opts.mode || 'cors'; opts.credentials = opts.credentials || 'include'; }
            return fetch(b + path, opts);
        };
    }
})();
</script>
    <style>
        :root {
            --bg1: #08080c; --bg2: #0f0f14; --bg3: #16161d; --bg4: #1e1e26;
            --border: #2a2a35; --border2: #3a3a48;
            --text: #f4f4f6; --text2: #a8a8b3; --text3: #6b6b78;
            --accent: #6366f1; --accent2: #818cf8; --accent-glow: rgba(99,102,241,0.3);
            --green: #10b981; --green-glow: rgba(16,185,129,0.2);
            --orange: #f59e0b; --red: #ef4444; --purple: #a855f7; --cyan: #06b6d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', -apple-system, sans-serif; background: var(--bg1); color: var(--text); line-height: 1.6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg2); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(8,8,12,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.5rem; color: var(--text); text-decoration: none; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { color: var(--text2); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent2); }
        .main { max-width: 1400px; margin: 80px auto 40px; padding: 20px 32px; }
        .page-header { margin-bottom: 32px; }
        .page-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .page-subtitle { color: var(--text2); font-size: 1rem; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent2); }
        .stat-label { font-size: 0.8rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
        .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .search-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; color: var(--text); font-size: 0.9rem; flex: 1; min-width: 200px; outline: none; font-family: inherit; }
        .search-input:focus { border-color: var(--accent); }
        .filter-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; color: var(--text2); cursor: pointer; font-size: 0.85rem; font-family: inherit; transition: all 0.2s; }
        .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
        .market-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
        .market-card:hover { border-color: var(--accent); }
        .market-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .market-region { font-size: 0.8rem; color: var(--cyan); font-weight: 500; margin-bottom: 12px; }
        .market-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .metric { padding: 8px 12px; background: var(--bg4); border-radius: 8px; }
        .metric-value { font-size: 1rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .metric-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; }
        .metric-value.green { color: var(--green); }
        .metric-value.orange { color: var(--orange); }
        .metric-value.red { color: var(--red); }
        .market-providers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .provider-tag { background: var(--bg1); padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; color: var(--text2); border: 1px solid var(--border); }
        .highlights-list { margin-top: 10px; padding-left: 16px; }
        .highlights-list li { font-size: 0.8rem; color: var(--text2); margin-bottom: 4px; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text3); }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .vacancy-bar { height: 6px; background: var(--bg1); border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .vacancy-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        @media (max-width: 768px) { .header { padding: 12px 16px; } .main { padding: 16px; } .market-grid { grid-template-columns: 1fr; } .nav-links { gap: 12px; } }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="logo"><div class="logo-icon">D</div> DC Hub</a>
        <div class="nav-links">
            <a href="/app">Dashboard</a>
            <a href="/news">News</a>
            <a href="/market-intelligence" class="active">Markets</a>
            <a href="/announcements">Pipeline</a>
        </div>
    </div>

    <div class="main">
        <div class="page-header">
            <h1 class="page-title">Market Intelligence</h1>
            <p class="page-subtitle">Data center market analytics across <span id="marketCount">--</span> global markets</p>
        </div>

        <div class="stats-row">
            <div class="stat-card"><div class="stat-value" id="totalMarkets">--</div><div class="stat-label">Markets Tracked</div></div>
            <div class="stat-card"><div class="stat-value" id="totalMW">--</div><div class="stat-label">Total Inventory (MW)</div></div>
            <div class="stat-card"><div class="stat-value" id="underConstruction">--</div><div class="stat-label">Under Construction (MW)</div></div>
            <div class="stat-card"><div class="stat-value" id="avgVacancy">--</div><div class="stat-label">Avg Vacancy Rate</div></div>
            <div class="stat-card"><div class="stat-value" id="avgPrice">--</div><div class="stat-label">Avg Asking Rate</div></div>
        </div>

        <div class="controls">
            <input type="text" class="search-input" id="searchInput" placeholder="Search markets...">
            <button class="filter-btn active" data-region="all">All Regions</button>
            <button class="filter-btn" data-region="North America">North America</button>
            <button class="filter-btn" data-region="Europe">Europe</button>
            <button class="filter-btn" data-region="Asia Pacific">Asia Pacific</button>
        </div>

        <div id="marketContainer" class="market-grid">
            <div class="loading"><div class="spinner"></div>Loading market intelligence...</div>
        </div>
    </div>

    <script>
        const API_BASE = window.DCHUB_API_BASE || '';
        let allMarkets = [];

        async function loadMarkets() {
            try {
                const res = await fetch(API_BASE + '/api/market-intelligence', { mode: API_BASE ? 'cors' : 'same-origin' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();

                allMarkets = data.markets || [];

                document.getElementById('totalMarkets').textContent = allMarkets.length;
                document.getElementById('marketCount').textContent = allMarkets.length;

                const totalMW = allMarkets.reduce((s, m) => s + (m.inventory_mw || 0), 0);
                document.getElementById('totalMW').textContent = totalMW.toLocaleString();

                const ucMW = allMarkets.reduce((s, m) => s + (m.under_construction_mw || 0), 0);
                document.getElementById('underConstruction').textContent = ucMW.toLocaleString();

                const avgVac = allMarkets.reduce((s, m) => s + (m.vacancy_rate || 0), 0) / (allMarkets.length || 1);
                document.getElementById('avgVacancy').textContent = avgVac.toFixed(1) + '%';

                const avgRate = allMarkets.reduce((s, m) => s + (m.avg_asking_rate || 0), 0) / (allMarkets.length || 1);
                document.getElementById('avgPrice').textContent = '$' + Math.round(avgRate);

                renderMarkets();
            } catch (e) {
                console.error('Market intelligence fetch failed:', e);
                document.getElementById('marketContainer').innerHTML = '<div class="loading" style="color:#ef4444;">Unable to load market data. Please refresh the page.</div>';
            }
        }

        function getVacancyColor(rate) {
            if (rate <= 2) return 'red';
            if (rate <= 5) return 'orange';
            return 'green';
        }

        function renderMarkets() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const regionFilter = document.querySelector('.filter-btn.active')?.dataset.region || 'all';

            const filtered = allMarkets.filter(m => {
                if (query && !m.market.toLowerCase().includes(query) && !(m.region || '').toLowerCase().includes(query)) return false;
                if (regionFilter !== 'all' && m.region !== regionFilter) return false;
                return true;
            });

            if (filtered.length === 0) {
                document.getElementById('marketContainer').innerHTML = '<div class="loading">No markets match your search.</div>';
                return;
            }

            document.getElementById('marketContainer').innerHTML = filtered.map(m => {
                const vacColor = getVacancyColor(m.vacancy_rate);
                const providers = (m.top_providers || []).slice(0, 4).map(p => `<span class="provider-tag">${p}</span>`).join('');
                const highlights = (m.highlights || []).slice(0, 3).map(h => `<li>${h}</li>`).join('');
                const priceChange = m.yoy_price_change ? (m.yoy_price_change > 0 ? `+${m.yoy_price_change}%` : `${m.yoy_price_change}%`) : '';
                const priceColor = m.yoy_price_change > 10 ? 'red' : m.yoy_price_change > 0 ? 'orange' : 'green';
                return `<div class="market-card">
                    <div class="market-name">${m.market}</div>
                    <div class="market-region">${m.region || 'Global'}</div>
                    <div class="market-metrics">
                        <div class="metric">
                            <div class="metric-value ${vacColor}">${m.vacancy_rate}%</div>
                            <div class="metric-label">Vacancy Rate</div>
                            <div class="vacancy-bar"><div class="vacancy-fill" style="width:${Math.min(m.vacancy_rate * 10, 100)}%;background:var(--${vacColor})"></div></div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">$${m.avg_asking_rate || '--'}</div>
                            <div class="metric-label">${m.asking_rate_unit || '$/kW/mo'} ${priceChange ? `<span class="${priceColor}" style="color:var(--${priceColor})">${priceChange} YoY</span>` : ''}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">${(m.inventory_mw || 0).toLocaleString()} MW</div>
                            <div class="metric-label">Total Inventory</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value green">${(m.under_construction_mw || 0).toLocaleString()} MW</div>
                            <div class="metric-label">Under Construction</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">${(m.absorption_mw || 0).toLocaleString()} MW</div>
                            <div class="metric-label">Absorption (${m.absorption_period || 'H1'})</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value orange">${m.pre_leased_pct || '--'}%</div>
                            <div class="metric-label">Pre-Leased</div>
                        </div>
                    </div>
                    ${providers ? `<div class="market-providers">${providers}</div>` : ''}
                    ${highlights ? `<ul class="highlights-list">${highlights}</ul>` : ''}
                </div>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', renderMarkets);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderMarkets();
            });
        });

        loadMarkets();
    </script>
</body>
</html>
