<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Asset Explorer | DC Hub Nexus</title>
    <meta name="description" content="Explore 10,000+ global data center facilities with AI-powered search and filtering">
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-hover: #22222e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #666680;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --border-color: #2a2a3a;
            --gradient-1: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --gradient-2: linear-gradient(135deg, #06b6d4 0%, #10b981 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-blue);
        }
        
        .main-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: calc(100vh - 60px);
        }
        
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            overflow-y: auto;
        }
        
        .content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .search-section {
            margin-bottom: 1.5rem;
        }
        
        .search-section h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .search-box input:focus {
            border-color: var(--accent-blue);
        }
        
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }
        
        .filter-section {
            margin-bottom: 1.5rem;
        }
        
        .filter-section h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-group {
            margin-bottom: 1rem;
        }
        
        .filter-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        
        .filter-group select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }
        
        .filter-group select:focus {
            border-color: var(--accent-blue);
        }
        
        .power-range {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .power-range input {
            flex: 1;
            padding: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            text-align: center;
        }
        
        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .filter-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.65rem;
            background: var(--accent-blue);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .filter-tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            opacity: 0.8;
        }
        
        .filter-tag button:hover {
            opacity: 1;
        }
        
        .clear-filters {
            background: none;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            width: 100%;
            transition: all 0.2s;
        }
        
        .clear-filters:hover {
            background: var(--accent-red);
            color: white;
        }
        
        .view-toggle {
            display: flex;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 0.25rem;
            margin-bottom: 1rem;
        }
        
        .view-toggle button {
            flex: 1;
            padding: 0.5rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .view-toggle button.active {
            background: var(--accent-blue);
            color: white;
        }
        
        .facilities-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
        }
        
        .facilities-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .results-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .sort-select {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .facilities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        
        .facility-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .facility-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }
        
        .facility-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        
        .facility-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            line-height: 1.3;
        }
        
        .facility-provider {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            margin-top: 0.25rem;
        }
        
        .facility-status {
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .facility-status.active, .facility-status.operational {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }
        
        .facility-status.planned, .facility-status.under-construction {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-orange);
        }
        
        .facility-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .facility-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .power-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.2rem 0.5rem;
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .load-more {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: var(--bg-card);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .load-more:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
        
        .map-view {
            height: 100%;
            display: none;
        }
        
        .map-view.active {
            display: block;
        }
        
        .grid-view.active {
            display: block;
        }
        
        #asset-map {
            height: 100%;
            width: 100%;
        }
        
        .loading-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .export-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--gradient-2);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }
        
        .export-btn:hover {
            opacity: 0.9;
        }
        
        .ai-insights {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .ai-insights h4 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--accent-purple);
            margin-bottom: 0.75rem;
        }
        
        .ai-insight-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
    <script src="/static/js/api-config.js"></script>
<script>
(function() {
    var b = window.DCHUB_API_BASE || '';
    window.API_BASE = b;
    window.DCHUB_CONFIG = { apiBase: b, version: 'v93' };
    if (!window.dchubFetch) {
        window.dchubFetch = function(path, opts) {
            opts = opts || {};
            if (b) { opts.mode = opts.mode || 'cors'; opts.credentials = opts.credentials || 'include'; }
            return fetch(b + path, opts);
        };
    }
})();
</script>
</head>
<body>
    <header class="header">
        <div class="logo">DC Hub Nexus</div>
        <nav class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/land-power">Land & Power</a>
            <a href="/assets" class="active">Asset Explorer</a>
            <a href="/ai-inventory">AI Inventory</a>
            <a href="/api/v1/stats">API</a>
        </nav>
    </header>
    
    <div class="main-container">
        <aside class="sidebar">
            <div class="ai-insights">
                <h4>🧠 AI Insights</h4>
                <p class="ai-insight-text" id="ai-insight">Analyzing market trends...</p>
            </div>
            
            <div class="search-section">
                <h3>Search</h3>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search facilities, providers, cities...">
                </div>
            </div>
            
            <div class="filter-section">
                <h3>Filters</h3>
                
                <div class="filter-group">
                    <label>Provider</label>
                    <select id="filter-provider">
                        <option value="">All Providers</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Country</label>
                    <select id="filter-country">
                        <option value="">All Countries</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Market</label>
                    <select id="filter-market">
                        <option value="">All Markets</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Status</label>
                    <select id="filter-status">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="operational">Operational</option>
                        <option value="planned">Planned</option>

                <div class="filter-group">

                <button class="clear-filters" id="clear-filters" style="display: none;">Clear All Filters</button>
            </div>
            
            <div class="view-toggle">
                <button id="grid-btn" class="active">Grid View</button>
                <button id="map-btn">Map View</button>
            </div>
            
            <button class="export-btn" onclick="exportData()">
                📥 Export to CSV
            </button>
        </aside>
        
        <main class="content">
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-value" id="total-facilities">-</div>
                    <div class="stat-label">Total Facilities</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-providers">-</div>
                    <div class="stat-label">Providers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-power">-</div>
                    <div class="stat-label">Total MW</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-countries">-</div>
                    <div class="stat-label">Countries</div>
                </div>
            </div>
            
            <div class="facilities-container grid-view active" id="grid-container">
                <div class="facilities-header">
                    <span class="results-count" id="results-count">Loading...</span>
                    <select class="sort-select" id="sort-select">
                        <option value="name">Sort by Name</option>
                        <option value="power_desc">Power (High to Low)</option>
                        <option value="power_asc">Power (Low to High)</option>
                        <option value="provider">Provider</option>
                        <option value="country">Country</option>
                    </select>
                </div>
                
                <div class="facilities-grid" id="facilities-grid">
                    <div class="loading-indicator">
                        <div class="spinner"></div>
                        <span>Loading facilities...</span>
                    </div>
                </div>
                
                <button class="load-more" id="load-more" style="display: none;">

            <div class="map-view" id="map-container">

    <script>
        let allFacilities = [];
        let filteredFacilities = [];
        let displayedCount = 0;
        const PAGE_SIZE = 50;
        const MAP_MARKER_LIMIT = 3000;
        let map = null;
        let markers = [];
        let isLoading = false;
        let totalAvailable = 0;
        
        async function loadFacilities() {
            if (isLoading) return;
            isLoading = true;
            
            try {
                document.getElementById('facilities-grid').innerHTML = 
                    '<div class="loading-indicator"><div class="spinner"></div><span>Loading all facilities...</span></div>';
                
                const response = await dchubFetch('/api/v1/map?all=true&limit=15000');
                const data = await response.json();
                
                if (data.success && data.data) {
                    allFacilities = data.data;
                    totalAvailable = data.total || data.data.length;
                    filteredFacilities = [...allFacilities];
                    
                    console.log(`Loaded ${allFacilities.length} facilities`);
                    
                    updateStats();
                    await populateFiltersAsync();
                    renderFacilities();
                    generateAIInsight();
                }
            } catch (error) {
                console.error('Error loading facilities:', error);
                document.getElementById('facilities-grid').innerHTML = 
                    '<div class="loading-indicator">Error loading facilities. Please try again.</div>';
            } finally {
                isLoading = false;
            }
        }
        
        function updateStats() {
            const providers = new Set(filteredFacilities.map(f => f.provider).filter(Boolean));
            const countries = new Set(filteredFacilities.map(f => f.country).filter(Boolean));
            const totalPower = filteredFacilities.reduce((sum, f) => sum + (f.power_mw || 0), 0);
            
            document.getElementById('total-facilities').textContent = filteredFacilities.length.toLocaleString();
            document.getElementById('total-providers').textContent = providers.size.toLocaleString();
            document.getElementById('total-power').textContent = Math.round(totalPower).toLocaleString();
            document.getElementById('total-countries').textContent = countries.size.toLocaleString();
        }
        
        async function populateFiltersAsync() {
            const providerCounts = {};
            const countryCounts = {};
            const marketCounts = {};
            
            allFacilities.forEach(f => {
                if (f.provider) providerCounts[f.provider] = (providerCounts[f.provider] || 0) + 1;
                if (f.country) countryCounts[f.country] = (countryCounts[f.country] || 0) + 1;
                const m = f.region || f.market;
                if (m) marketCounts[m] = (marketCounts[m] || 0) + 1;
            });
            
            const providerSelect = document.getElementById('filter-provider');
            const providerOptions = Object.entries(providerCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 200)
                .map(([p, count]) => `<option value="${escapeHtml(p)}">${escapeHtml(p)} (${count})</option>`)
                .join('');
            providerSelect.innerHTML = '<option value="">All Providers</option>' + providerOptions;
            
            const countrySelect = document.getElementById('filter-country');
            const countryOptions = Object.entries(countryCounts)
                .sort((a, b) => a[0].localeCompare(b[0]))
                .map(([c, count]) => `<option value="${escapeHtml(c)}">${escapeHtml(c)} (${count})</option>`)
                .join('');
            countrySelect.innerHTML = '<option value="">All Countries</option>' + countryOptions;
            
            const marketSelect = document.getElementById('filter-market');
            const marketOptions = Object.entries(marketCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 100)
                .map(([m, count]) => `<option value="${escapeHtml(m)}">${escapeHtml(m)} (${count})</option>`)
                .join('');
            marketSelect.innerHTML = '<option value="">All Markets</option>' + marketOptions;
        }
        
        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const provider = document.getElementById('filter-provider').value;
            const country = document.getElementById('filter-country').value;
            const market = document.getElementById('filter-market').value;
            const status = document.getElementById('filter-status').value;
            const powerMin = parseFloat(document.getElementById('power-min').value) || 0;
            const powerMax = parseFloat(document.getElementById('power-max').value) || Infinity;
            
            filteredFacilities = allFacilities.filter(f => {
                if (search && !matchesSearch(f, search)) return false;
                if (provider && f.provider !== provider) return false;
                if (country && f.country !== country) return false;
                if (market && (f.region || f.market) !== market) return false;
                if (status && (f.status || 'active').toLowerCase() !== status) return false;
                if (f.power_mw && (f.power_mw < powerMin || f.power_mw > powerMax)) return false;
                return true;
            });
            
            applySorting();
            updateStats();
            updateActiveFilters();
            displayedCount = 0;
            renderFacilities();
            
            if (map) updateMapMarkers();
        }
        
        function matchesSearch(facility, search) {
            const searchFields = [
                facility.name,
                facility.provider,
                facility.city,
                facility.state,
                facility.country,
                facility.region,
                facility.market
            ].filter(Boolean).map(s => s.toLowerCase());
            
            return searchFields.some(field => field.includes(search));
        }
        
        function applySorting() {
            const sort = document.getElementById('sort-select').value;
            
            filteredFacilities.sort((a, b) => {
                switch (sort) {
                    case 'name':
                        return (a.name || '').localeCompare(b.name || '');
                    case 'power_desc':
                        return (b.power_mw || 0) - (a.power_mw || 0);
                    case 'power_asc':
                        return (a.power_mw || 0) - (b.power_mw || 0);
                    case 'provider':
                        return (a.provider || '').localeCompare(b.provider || '');
                    case 'country':
                        return (a.country || '').localeCompare(b.country || '');
                    default:
                        return 0;
                }
            });
        }
        
        function updateActiveFilters() {
            const container = document.getElementById('active-filters');
            const clearBtn = document.getElementById('clear-filters');
            const tags = [];
            
            const provider = document.getElementById('filter-provider').value;
            const country = document.getElementById('filter-country').value;
            const market = document.getElementById('filter-market').value;
            const status = document.getElementById('filter-status').value;
            const search = document.getElementById('search-input').value;
            
            if (search) tags.push({type: 'search', value: search});
            if (provider) tags.push({type: 'provider', value: provider});
            if (country) tags.push({type: 'country', value: country});
            if (market) tags.push({type: 'market', value: market});
            if (status) tags.push({type: 'status', value: status});
            
            container.innerHTML = tags.map(tag => `
                <span class="filter-tag">
                    ${tag.type}: ${escapeHtml(tag.value)}
                    <button onclick="clearFilter('${tag.type}')">&times;</button>
                </span>
            `).join('');
            
            clearBtn.style.display = tags.length > 0 ? 'block' : 'none';
        }
        
        function clearFilter(type) {
            switch (type) {
                case 'search':
                    document.getElementById('search-input').value = '';
                    break;
                case 'provider':
                    document.getElementById('filter-provider').value = '';
                    break;
                case 'country':
                    document.getElementById('filter-country').value = '';
                    break;
                case 'market':
                    document.getElementById('filter-market').value = '';
                    break;
                case 'status':
                    document.getElementById('filter-status').value = '';
                    break;
            }
            applyFilters();
        }
        
        function clearAllFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('filter-provider').value = '';
            document.getElementById('filter-country').value = '';
            document.getElementById('filter-market').value = '';
            document.getElementById('filter-status').value = '';
            document.getElementById('power-min').value = '';
            document.getElementById('power-max').value = '';
            applyFilters();
        }
        
        function renderFacilities() {
            const container = document.getElementById('facilities-grid');
            const loadMoreBtn = document.getElementById('load-more');
            const toRender = filteredFacilities.slice(displayedCount, displayedCount + PAGE_SIZE);
            
            if (displayedCount === 0) {
                container.innerHTML = '';
            }
            
            const fragment = document.createDocumentFragment();
            toRender.forEach(f => {
                const card = document.createElement('div');
                card.className = 'facility-card';
                card.innerHTML = `
                    <div class="facility-header">
                        <div>
                            <div class="facility-name">${escapeHtml(f.name || 'Unknown Facility')}</div>
                            <div class="facility-provider">${escapeHtml(f.provider || 'Unknown Provider')}</div>
                        </div>
                        <span class="facility-status ${(f.status || 'active').toLowerCase()}">${escapeHtml(f.status || 'Active')}</span>
                    </div>
                    <div class="facility-meta">
                        <span>📍 ${escapeHtml([f.city, f.state, f.country].filter(Boolean).join(', '))}</span>
                        ${f.power_mw ? `<span class="power-badge">⚡ ${f.power_mw} MW</span>` : ''}
                    </div>
                `;
                card.onclick = () => showFacilityOnMap(f);
                fragment.appendChild(card);
            });
            
            requestAnimationFrame(() => {
                container.appendChild(fragment);
            });
            
            displayedCount += toRender.length;
            
            document.getElementById('results-count').textContent = 
                `Showing ${displayedCount.toLocaleString()} of ${filteredFacilities.length.toLocaleString()} facilities`;
            
            loadMoreBtn.style.display = displayedCount < filteredFacilities.length ? 'block' : 'none';
        }
        
        function showFacilityOnMap(facility) {
            if (facility.lat && facility.lng) {
                document.getElementById('map-btn').click();
                setTimeout(() => {
                    if (map) {
                        map.setView([facility.lat, facility.lng], 15);
                    }
                }, 100);
            }
        }
        
        function initMap() {
            map = L.map('asset-map', {
                center: [30, 0],
                zoom: 2,
                minZoom: 2
            });
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                maxZoom: 19
            }).addTo(map);
            
            updateMapMarkers();
        }
        
        function updateMapMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            const toShow = filteredFacilities.filter(f => f.lat && f.lng).slice(0, MAP_MARKER_LIMIT);
            
            const addMarkersInChunks = (facilities, chunkSize = 200) => {
                let index = 0;
                
                const addChunk = () => {
                    const chunk = facilities.slice(index, index + chunkSize);
                    chunk.forEach(f => {
                        const marker = L.circleMarker([f.lat, f.lng], {
                            radius: Math.min(8, 3 + (f.power_mw || 0) / 50),
                            color: '#3b82f6',
                            fillColor: '#3b82f6',
                            fillOpacity: 0.6,
                            weight: 1
                        }).addTo(map);
                        
                        marker.bindPopup(`
                            <strong>${escapeHtml(f.name || 'Unknown')}</strong><br>
                            ${escapeHtml(f.provider || 'Unknown Provider')}<br>
                            ${escapeHtml([f.city, f.country].filter(Boolean).join(', '))}<br>
                            ${f.power_mw ? `<strong>${f.power_mw} MW</strong>` : ''}
                        `);
                        
                        markers.push(marker);
                    });
                    
                    index += chunkSize;
                    if (index < facilities.length) {
                        requestAnimationFrame(addChunk);
                    }
                };
                
                requestAnimationFrame(addChunk);
            };
            
            addMarkersInChunks(toShow);
        }
        
        function generateAIInsight() {
            const insights = [
                `${allFacilities.length.toLocaleString()} facilities tracked across ${new Set(allFacilities.map(f => f.country).filter(Boolean)).size} countries`,
                `Northern Virginia remains the largest market with concentrated hyperscale presence`,
                `APAC showing 23% YoY growth in new facility announcements`,
                `Top providers by capacity: Equinix, Digital Realty, NTT lead global footprint`,
                `AI/ML workload demand driving record power density requirements`
            ];
            
            document.getElementById('ai-insight').textContent = insights[Math.floor(Math.random() * insights.length)];
        }
        
        function exportData() {
            const headers = ['Name', 'Provider', 'City', 'State', 'Country', 'Power (MW)', 'Status'];
            const rows = filteredFacilities.map(f => [
                f.name || '',
                f.provider || '',
                f.city || '',
                f.state || '',
                f.country || '',
                f.power_mw || '',
                f.status || 'Active'
            ]);
            
            const csv = [headers.join(','), ...rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))].join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dc-hub-facilities-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('search-input').addEventListener('input', debounce(applyFilters, 300));
        document.getElementById('filter-provider').addEventListener('change', applyFilters);
        document.getElementById('filter-country').addEventListener('change', applyFilters);
        document.getElementById('filter-market').addEventListener('change', applyFilters);
        document.getElementById('filter-status').addEventListener('change', applyFilters);
        document.getElementById('power-min').addEventListener('input', debounce(applyFilters, 300));
        document.getElementById('power-max').addEventListener('input', debounce(applyFilters, 300));
        document.getElementById('sort-select').addEventListener('change', () => {
            applySorting();
            displayedCount = 0;
            renderFacilities();
        });
        document.getElementById('load-more').addEventListener('click', renderFacilities);
        document.getElementById('clear-filters').addEventListener('click', clearAllFilters);
        
        document.getElementById('grid-btn').addEventListener('click', () => {
            document.getElementById('grid-btn').classList.add('active');
            document.getElementById('map-btn').classList.remove('active');
            document.getElementById('grid-container').classList.add('active');
            document.getElementById('map-container').classList.remove('active');
        });
        
        document.getElementById('map-btn').addEventListener('click', () => {
            document.getElementById('map-btn').classList.add('active');
            document.getElementById('grid-btn').classList.remove('active');
            document.getElementById('map-container').classList.add('active');
            document.getElementById('grid-container').classList.remove('active');
            
            if (!map) {
                setTimeout(initMap, 100);
            } else {
                map.invalidateSize();
                updateMapMarkers();
            }
        });
        
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
        
        loadFacilities();
    </script>
</body>
</html>
