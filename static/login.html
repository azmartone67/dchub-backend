<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — DC Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#04080e;color:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#0a1220;border:1px solid #1a2d44;border-radius:20px;padding:40px 36px;width:min(440px,92vw);box-shadow:0 40px 100px rgba(0,0,0,.6)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#00c9a7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text{font-size:22px;font-weight:800;color:#f0f4f8}
h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:#5d7590;text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#8fa3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
input{width:100%;padding:12px 14px;background:#0f1c2e;border:1px solid #1a2d44;border-radius:10px;color:#f0f4f8;font-size:14px;outline:none;transition:border .2s}
input:focus{border-color:#6366f1}
.btn{width:100%;padding:14px;background:#6366f1;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.btn:hover{background:#818cf8;transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ef4444;margin-bottom:16px;display:none}
.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#22c55e;margin-bottom:16px;display:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#3d556e;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1a2d44}
.google-btn{width:100%;padding:12px;background:transparent;border:1px solid #1a2d44;border-radius:12px;color:#f0f4f8;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.google-btn:hover{border-color:#2a4060;background:#0f1c2e}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#3d556e}
.footer a{color:#6366f1;text-decoration:none}
.links{display:flex;justify-content:space-between;margin-top:12px;font-size:12px}
.links a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">DC Hub</span>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to access your account</p>
  <div class="error" id="error-msg"></div>
  <div class="success" id="success-msg"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
  <div class="links">
    <a href="/forgot-password.html">Forgot password?</a>
  </div>
  <div class="divider">or</div>
  <button class="google-btn" onclick="doGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.76-2.7.76-2.08 0-3.84-1.4-4.47-3.29H1.85v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.51 10.52A4.8 4.8 0 0 1 4.26 9c0-.53.09-1.04.25-1.52V5.41H1.85A8 8 0 0 0 .98 9c0 1.29.31 2.51.87 3.59l2.66-2.07z"/><path fill="#EA4335" d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 8.98 1a8 8 0 0 0-7.13 4.41l2.66 2.07c.63-1.89 2.39-3.3 4.47-3.3z"/></svg>
    Continue with Google
  </button>
  <div class="footer">Don't have an account? <a href="/pricing">Sign up free →</a></div>
</div>
<script>
var API_BASE = window.location.origin.indexOf('dchub.cloud') > -1
  ? 'https://dchub.cloud'
  : window.location.origin;

var REDIRECT = new URLSearchParams(window.location.search).get('redirect') || '/land-power';

var TOKEN_KEY = 'dchub_token';
var SESSION_KEY = 'dchub_session';
var USER_KEY = 'dchub_user';

(function checkAlreadyLoggedIn() {
  var token = localStorage.getItem(TOKEN_KEY) || localStorage.getItem(SESSION_KEY);
  if (token) {
    window.location.href = REDIRECT;
  }
})();

if (new URLSearchParams(window.location.search).get('logged_out') === 'true') {
  var s = document.getElementById('success-msg');
  s.textContent = 'You have been signed out.';
  s.style.display = 'block';
}

async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('error-msg');
  err.style.display = 'none';
  if (!email || !password) { showError('Please enter your email and password.'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    var res = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });
    var data = await res.json();

    if (!res.ok || !data.success) {
      showError(data.error || 'Login failed. Please check your credentials.');
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }

    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(SESSION_KEY, data.token);
    if (data.user) {
      localStorage.setItem(USER_KEY, JSON.stringify(data.user));
    }

    window.location.href = REDIRECT;
  } catch (e) {
    showError('Connection error. Please try again.');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function doGoogle() {
  sessionStorage.setItem('dchub_redirect', REDIRECT);
  localStorage.setItem('dchub_last_page', REDIRECT);
  window.location.href = '/api/auth/google/redirect?redirect=' + encodeURIComponent(REDIRECT);
}

function showError(msg) {
  var e = document.getElementById('error-msg');
  e.textContent = msg; e.style.display = 'block';
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
